<svg viewBox="0 0 920 470" xmlns="http://www.w3.org/2000/svg" role="img" font-family="system-ui, -apple-system, sans-serif">
  <title>Affinity sets the step size: AIRS and energy strategies</title>
  <desc>Left panel: the AIRS mutation rate r = c·exp(-a/T) falls as affinity a rises, drawn as a decaying curve with a broad mutation cloud at low affinity and a tight cloud at high affinity. Right panel: the energy strategy as a trust region, a step capped at radius sqrt(E0(1-a)^2). A low-affinity antibody gets a large ball of allowed moves, a high-affinity antibody gets a small one.</desc>
  <text x="460" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">Affinity is the learning-rate schedule</text>
  <text x="460" y="52" text-anchor="middle" font-size="13" fill="#64748b">Both strategies shrink the step as a binder matures, by variance or by a hard cap</text>
  <line x1="460" y1="74" x2="460" y2="404" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3 5"/>
  <text x="240" y="92" text-anchor="middle" font-size="11" font-weight="600" letter-spacing="1.5" fill="#0d9488">AIRS &#8226; FITNESS-SCALED RATE</text>
  <text x="240" y="112" text-anchor="middle" font-size="13" fill="#0f766e">r = c · exp(−a / T)</text>
  <line x1="60" y1="380" x2="430" y2="380" stroke="#94a3b8" stroke-width="1"/>
  <line x1="60" y1="130" x2="60" y2="380" stroke="#94a3b8" stroke-width="1"/>
  <text x="245" y="402" text-anchor="middle" font-size="11" fill="#64748b">affinity a  →</text>
  <text x="46" y="255" text-anchor="middle" font-size="11" fill="#64748b" transform="rotate(-90 46 255)">mutation rate r  →</text>
  <polyline fill="none" stroke="#0d9488" stroke-width="2"
    points="60,130 96,175 132,213 168,243 204,268 240,288 276,305 312,318 348,330 384,339 420,346"/>
  <g fill="#f59e0b" opacity="0.5">
    <circle cx="78" cy="118" r="2.5"/><circle cx="92" cy="142" r="2.5"/><circle cx="66" cy="150" r="2.5"/>
    <circle cx="100" cy="120" r="2.5"/><circle cx="84" cy="160" r="2.5"/><circle cx="110" cy="148" r="2.5"/>
    <circle cx="70" cy="128" r="2.5"/><circle cx="104" cy="138" r="2.5"/>
  </g>
  <circle cx="88" cy="138" r="34" fill="none" stroke="#f59e0b" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="88" y="100" text-anchor="middle" font-size="11" fill="#b45309">broad search</text>
  <g fill="#0d9488" opacity="0.7">
    <circle cx="412" cy="344" r="2"/><circle cx="420" cy="350" r="2"/><circle cx="416" cy="338" r="2"/>
    <circle cx="424" cy="345" r="2"/><circle cx="409" cy="349" r="2"/>
  </g>
  <circle cx="417" cy="345" r="11" fill="none" stroke="#0d9488" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="380" y="372" text-anchor="middle" font-size="11" fill="#0f766e">high affinity: fine-tune</text>
  <text x="690" y="92" text-anchor="middle" font-size="11" font-weight="600" letter-spacing="1.5" fill="#0d9488">ENERGY &#8226; TRUST REGION</text>
  <text x="690" y="112" text-anchor="middle" font-size="13" fill="#0f766e">‖Δ‖ ≤ √(E&#8320; · (1 − a)&#178;) = √E&#8320; (1 − a)</text>
  <circle cx="585" cy="265" r="78" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.3" stroke-dasharray="4 4"/>
  <circle cx="585" cy="265" r="3.5" fill="#475569"/>
  <g stroke="#f59e0b" stroke-width="1">
    <line x1="585" y1="265" x2="640" y2="230"/>
    <line x1="585" y1="265" x2="545" y2="320"/>
    <line x1="585" y1="265" x2="630" y2="300"/>
  </g>
  <g fill="#f59e0b"><circle cx="640" cy="230" r="2.5"/><circle cx="545" cy="320" r="2.5"/><circle cx="630" cy="300" r="2.5"/></g>
  <text x="585" y="362" text-anchor="middle" font-size="11" fill="#b45309">a = 0.25  →  large radius</text>
  <circle cx="800" cy="265" r="20" fill="#f0fdfa" stroke="#0d9488" stroke-width="1.3" stroke-dasharray="4 4"/>
  <circle cx="800" cy="265" r="3.5" fill="#475569"/>
  <g stroke="#0d9488" stroke-width="1">
    <line x1="800" y1="265" x2="813" y2="253"/>
    <line x1="800" y1="265" x2="789" y2="278"/>
  </g>
  <g fill="#0d9488"><circle cx="813" cy="253" r="2"/><circle cx="789" cy="278" r="2"/></g>
  <text x="800" y="362" text-anchor="middle" font-size="11" fill="#0f766e">a = 0.80  →  small radius</text>
  <text x="460" y="432" text-anchor="middle" font-size="12" fill="#475569">AIRS scales the noise variance smoothly. Energy caps the step length inside a shrinking ball. Both read affinity as distance from the optimum.</text>
  <text x="460" y="452" text-anchor="middle" font-size="12" font-style="italic" fill="#64748b">Late in maturation, mutation stops roaming and starts polishing.</text>
</svg>
