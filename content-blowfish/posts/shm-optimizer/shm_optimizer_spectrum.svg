<svg viewBox="0 0 920 560" xmlns="http://www.w3.org/2000/svg" role="img" font-family="system-ui, -apple-system, sans-serif">
  <title>Five SHM strategies as an optimizer spectrum</title>
  <desc>Five rows mapping an immune mutation mechanism to a bHIVE SHMEngine strategy to a computational optimizer primitive. Rows run from simplest (uniform random mutation, annealed random search) to most sophisticated (iterative affinity maturation, the Adam optimizer).</desc>
  <text x="460" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">Somatic hypermutation is a spectrum of optimizers</text>
  <text x="460" y="52" text-anchor="middle" font-size="13" fill="#64748b">Each bHIVE mutation strategy ports one immune mechanism onto one search primitive</text>
  <text x="145" y="84" text-anchor="middle" font-size="11" font-weight="600" letter-spacing="1.5" fill="#94a3b8">IMMUNE MECHANISM</text>
  <text x="465" y="84" text-anchor="middle" font-size="11" font-weight="600" letter-spacing="1.5" fill="#0d9488">bHIVE STRATEGY</text>
  <text x="790" y="84" text-anchor="middle" font-size="11" font-weight="600" letter-spacing="1.5" fill="#94a3b8">OPTIMIZER PRIMITIVE</text>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <!-- ROW 1: uniform -->
  <rect x="20" y="98" width="250" height="58" rx="6" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="145" y="122" text-anchor="middle" font-size="13" font-weight="600" fill="#475569">Random point mutation</text>
  <text x="145" y="142" text-anchor="middle" font-size="11" fill="#64748b">untargeted, cools over time</text>
  <line x1="272" y1="127" x2="318" y2="127" stroke="#475569" stroke-width="1.2" marker-end="url(#arr)"/>
  <rect x="320" y="98" width="290" height="58" rx="6" fill="#f0fdfa" stroke="#0d9488"/>
  <text x="465" y="120" text-anchor="middle" font-size="13" font-weight="600" fill="#0f766e">uniform</text>
  <text x="465" y="143" text-anchor="middle" font-size="12" fill="#0d9488">r = (1 − a) · decay^(i−1) , x ← x + N(0, r)</text>
  <line x1="612" y1="127" x2="678" y2="127" stroke="#475569" stroke-width="1.2" marker-end="url(#arr)"/>
  <rect x="680" y="98" width="220" height="58" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="790" y="122" text-anchor="middle" font-size="13" font-weight="600" fill="#475569">Annealed random search</text>
  <text x="790" y="142" text-anchor="middle" font-size="11" fill="#64748b">isotropic noise, cooling</text>
  <!-- ROW 2: airs -->
  <rect x="20" y="176" width="250" height="58" rx="6" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="145" y="200" text-anchor="middle" font-size="13" font-weight="600" fill="#475569">Affinity-tuned load</text>
  <text x="145" y="220" text-anchor="middle" font-size="11" fill="#64748b">poor binders mutate more</text>
  <line x1="272" y1="205" x2="318" y2="205" stroke="#475569" stroke-width="1.2" marker-end="url(#arr)"/>
  <rect x="320" y="176" width="290" height="58" rx="6" fill="#f0fdfa" stroke="#0d9488"/>
  <text x="465" y="198" text-anchor="middle" font-size="13" font-weight="600" fill="#0f766e">airs</text>
  <text x="465" y="221" text-anchor="middle" font-size="12" fill="#0d9488">r = c · exp(−a / T)</text>
  <line x1="612" y1="205" x2="678" y2="205" stroke="#475569" stroke-width="1.2" marker-end="url(#arr)"/>
  <rect x="680" y="176" width="220" height="58" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="790" y="200" text-anchor="middle" font-size="13" font-weight="600" fill="#475569">Fitness-scaled rate</text>
  <text x="790" y="220" text-anchor="middle" font-size="11" fill="#64748b">step size from loss</text>
  <!-- ROW 3: energy -->
  <rect x="20" y="254" width="250" height="58" rx="6" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="145" y="278" text-anchor="middle" font-size="13" font-weight="600" fill="#475569">Bounded mutational burden</text>
  <text x="145" y="298" text-anchor="middle" font-size="11" fill="#64748b">a cell can only afford so much</text>
  <line x1="272" y1="283" x2="318" y2="283" stroke="#475569" stroke-width="1.2" marker-end="url(#arr)"/>
  <rect x="320" y="254" width="290" height="58" rx="6" fill="#f0fdfa" stroke="#0d9488"/>
  <text x="465" y="276" text-anchor="middle" font-size="13" font-weight="600" fill="#0f766e">energy</text>
  <text x="465" y="299" text-anchor="middle" font-size="12" fill="#0d9488">‖Δ‖ ≤ √(E&#8320; · (1 − a)&#178;)</text>
  <line x1="612" y1="283" x2="678" y2="283" stroke="#475569" stroke-width="1.2" marker-end="url(#arr)"/>
  <rect x="680" y="254" width="220" height="58" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="790" y="278" text-anchor="middle" font-size="13" font-weight="600" fill="#475569">Trust region</text>
  <text x="790" y="298" text-anchor="middle" font-size="11" fill="#64748b">capped step radius</text>
  <!-- ROW 4: hotspot -->
  <rect x="20" y="332" width="250" height="58" rx="6" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="145" y="356" text-anchor="middle" font-size="13" font-weight="600" fill="#475569">AID targets WRCY hotspots</text>
  <text x="145" y="376" text-anchor="middle" font-size="11" fill="#64748b">mutate where it matters</text>
  <line x1="272" y1="361" x2="318" y2="361" stroke="#475569" stroke-width="1.2" marker-end="url(#arr)"/>
  <rect x="320" y="332" width="290" height="58" rx="6" fill="#f0fdfa" stroke="#0d9488"/>
  <text x="465" y="354" text-anchor="middle" font-size="13" font-weight="600" fill="#0f766e">hotspot</text>
  <text x="465" y="377" text-anchor="middle" font-size="12" fill="#0d9488">r&#7522; ∝ |x&#7522; − a&#7522;|  (gradient magnitude)</text>
  <line x1="612" y1="361" x2="678" y2="361" stroke="#475569" stroke-width="1.2" marker-end="url(#arr)"/>
  <rect x="680" y="332" width="220" height="58" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="790" y="356" text-anchor="middle" font-size="13" font-weight="600" fill="#475569">Feature weighting</text>
  <text x="790" y="376" text-anchor="middle" font-size="11" fill="#64748b">coordinate-wise steps</text>
  <!-- ROW 5: adaptive -->
  <rect x="20" y="410" width="250" height="58" rx="6" fill="#faf5ff" stroke="#7c3aed"/>
  <text x="145" y="434" text-anchor="middle" font-size="13" font-weight="600" fill="#7c3aed">Iterative affinity maturation</text>
  <text x="145" y="454" text-anchor="middle" font-size="11" fill="#7c3aed">memory of past rounds</text>
  <line x1="272" y1="439" x2="318" y2="439" stroke="#475569" stroke-width="1.2" marker-end="url(#arr)"/>
  <rect x="320" y="410" width="290" height="58" rx="6" fill="#faf5ff" stroke="#7c3aed"/>
  <text x="465" y="432" text-anchor="middle" font-size="13" font-weight="600" fill="#7c3aed">adaptive</text>
  <text x="465" y="455" text-anchor="middle" font-size="12" fill="#7c3aed">m&#8321;, m&#8322; moments → per-feature step</text>
  <line x1="612" y1="439" x2="678" y2="439" stroke="#475569" stroke-width="1.2" marker-end="url(#arr)"/>
  <rect x="680" y="410" width="220" height="58" rx="6" fill="#faf5ff" stroke="#7c3aed"/>
  <text x="790" y="434" text-anchor="middle" font-size="13" font-weight="600" fill="#7c3aed">Adam optimizer</text>
  <text x="790" y="454" text-anchor="middle" font-size="11" fill="#7c3aed">bias-corrected moments</text>
  <text x="460" y="500" text-anchor="middle" font-size="12" fill="#475569">Top to bottom: rising sophistication. Each strategy keeps a mutation only if it raises affinity, so selection is greedy hill-climbing.</text>
  <text x="460" y="520" text-anchor="middle" font-size="12" font-style="italic" fill="#64748b">The same operator that diversifies antibodies is, formally, an optimizer choosing a step.</text>
</svg>
