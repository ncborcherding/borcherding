# =============================================================================
# Blowfish config (Phase 1 of the redesign) - ISOLATED from Wowchemy
#
# Isolation approach: a SEPARATE config ROOT, loaded with --configDir.
#
#   hugo --configDir config-blowfish ...
#
# Why --configDir and not --config or config/blowfish/:
#   * Hugo ALWAYS reads config/_default/ as the base config dir when it exists,
#     and both `--config <file>` and `--environment <env>` MERGE on top of it.
#     We verified both still leak the Wowchemy module.imports
#     (github.com/wowchemy/wowchemy-hugo-modules/*) into the Blowfish build.
#   * --configDir REPLACES the config root entirely, so config/_default/ is
#     never read. `hugo --configDir config-blowfish config | grep -i wowchemy`
#     returns nothing -> clean isolation, only the Blowfish module is imported.
#
# Wowchemy still builds via its own default config dir (untouched):
#   hugo            (reads config/_default/*)
# Blowfish builds via:
#   hugo --configDir config-blowfish
#
# Blowfish also uses its own contentDir (content-blowfish/) so it does not try
# to render the Wowchemy-shaped content/ tree (Wowchemy CMS front matter, the
# wowchemycms_config output format, etc.). Real content migrates in Phase 3.
# =============================================================================

baseURL = "https://borch.dev/"
title = "Nick Borcherding"
defaultContentLanguage = "en"
contentDir = "content-blowfish"
themesDir = "themes"

enableRobotsTXT = true
enableEmoji = true
summaryLength = 0

buildDrafts = false
buildFuture = false

# -- Theme module import (Blowfish) ------------------------------------------
[module]
  [[module.imports]]
    path = "github.com/nunocoracao/blowfish/v2"

[pagination]
  pagerSize = 100

[imaging]
  anchor = "Center"

[taxonomies]
  tag = "tags"
  category = "categories"
  author = "authors"
  series = "series"

[sitemap]
  changefreq = "daily"
  filename = "sitemap.xml"
  priority = 0.5

[outputs]
  home = ["HTML", "RSS", "JSON"]

[related]
  threshold = 0
  toLower = false
  [[related.indices]]
    name = "tags"
    weight = 100
  [[related.indices]]
    name = "categories"
    weight = 100
  [[related.indices]]
    name = "series"
    weight = 50
  [[related.indices]]
    name = "authors"
    weight = 20
  [[related.indices]]
    name = "date"
    weight = 10
  [[related.indices]]
    applyFilter = false
    name = "fragmentrefs"
    type = "fragments"
    weight = 10

# -- Markup (required by Blowfish) -------------------------------------------
[markup]
  [markup.goldmark]
    [markup.goldmark.parser]
      wrapStandAloneImageWithinParagraph = false
      [markup.goldmark.parser.attribute]
        block = true
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.passthrough]
        enable = true
        [markup.goldmark.extensions.passthrough.delimiters]
          block = [['\[', '\]'], ['$$', '$$']]
          inline = [['\(', '\)']]
  [markup.highlight]
    noClasses = false
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4

# -- Theme parameters --------------------------------------------------------
[params]
  colorScheme = "blowfish"
  defaultAppearance = "light"   # light, with the dark toggle available
  autoSwitchAppearance = false  # honor defaultAppearance; user toggles manually

  enableSearch = true
  enableCodeCopy = true

  disableImageOptimization = false
  fingerprintAlgorithm = "sha512"

  [params.header]
    layout = "basic"

  [params.footer]
    showMenu = true
    showCopyright = true
    showThemeAttribution = true
    showAppearanceSwitcher = true
    showScrollToTop = true

  [params.homepage]
    layout = "profile"     # profile homepage uses the author block below
    showRecent = false
    showRecentItems = 5
    showMoreLink = false

  [params.article]
    showDate = true
    showAuthor = true
    showReadingTime = true
    showWordCount = true
    showHeadingAnchors = true
    showPagination = true
    showTaxonomies = false

  [params.list]
    showSummary = true
    groupByYear = true

# -- Language / author identity ----------------------------------------------
[languages]
  [languages.en]
    disabled = false
    locale = "en"
    label = "English"
    weight = 1
    title = "Nick Borcherding"

    [languages.en.params]
      displayName = "EN"
      isoCode = "en"
      rtl = false
      dateFormat = "2 January 2006"
      description = "Nick Borcherding - Physician-scientist and Assistant Professor of Pathology & Immunology at Washington University School of Medicine in St. Louis. Computational immunology, single-cell analysis, and open-source bioinformatics tools."

      [languages.en.params.author]
        name = "Nick Borcherding"
        headline = "Assistant Professor of Pathology & Immunology, Washington University School of Medicine in St. Louis"
        bio = "Physician-scientist working at the intersection of computational immunology, clinical pathology, and transplant immunogenetics."
        links = [
          { orcid = "https://orcid.org/0000-0003-1427-6342" },
          { github = "https://github.com/BorchLab" },
          { linkedin = "https://www.linkedin.com/in/thehumanborch/" },
          { link = "https://scholar.google.com/citations?user=_n4TRuIAAAAJ" },
          { link = "https://pathology.wustl.edu/" },
        ]

# -- Main menu ---------------------------------------------------------------
# CV points to the static PDF (works now). Home links to "/" (works now).
# Research/Software/Publications/Posts/Talks use `url` (not pageRef) so they
# render as real, clickable links. Their target pages do not exist yet, so
# they will 404 until the corresponding sections are built in later phases.
# (pageRef silently drops the href when the page is missing, which would make
#  the items unclickable; url keeps them clickable and 404 honestly.)
[menu]
  [[menu.main]]
    name = "Home"
    pageRef = "/"
    weight = 10
  [[menu.main]]
    name = "Research"
    url = "/research/"
    weight = 20
  [[menu.main]]
    name = "Software"
    url = "/software/"
    weight = 30
  [[menu.main]]
    name = "Publications"
    url = "/publications/"
    weight = 40
  [[menu.main]]
    name = "Posts"
    url = "/posts/"
    weight = 50
  [[menu.main]]
    name = "Talks"
    url = "/talks/"
    weight = 60
  [[menu.main]]
    name = "CV"
    url = "files/Borcherding_CV.pdf"
    weight = 70
