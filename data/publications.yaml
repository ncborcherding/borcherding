  title: Mapping the immune environment in clear cell renal carcinoma by single-cell
    genomics
  authors:
  - Nicholas Borcherding
  - Ajaykumar Vishwakarma
  - Andrew P Voigt
  - Andrew Bellizzi
  - Jacob Kaplan
  - Kenneth Nepple
  - Aliasger K Salem
  - Russell W Jenkins
  - Yousef Zakharia
  - Weizhou Zhang
  journal: Communications biology
  year: 2021
  volume: '4'
  number: '1'
  pages: '122'
  doi: 10.1038/s42003-020-01625-6
  pubmed: https://pubmed.ncbi.nlm.nih.gov/33504936/
  abstract: Clear cell renal cell carcinoma (ccRCC) is one of the most immunologically
    distinct tumor types due to high response rate to immunotherapies, despite low
    tumor mutational burden. To characterize the tumor immune microenvironment of
    ccRCC, we applied single-cell-RNA sequencing (SCRS) along with T-cell-receptor
    (TCR) sequencing to map the transcriptomic heterogeneity of 25,688 individual
    CD45<sup>+</sup> lymphoid and myeloid cells in matched tumor and blood from three
    patients with ccRCC. We also included 11,367 immune cells from four other individuals
    derived from the kidney and peripheral blood to facilitate the identification
    and assessment of ccRCC-specific differences. There is an overall increase in
    CD8<sup>+</sup> T-cell and macrophage populations in tumor-infiltrated immune
    cells compared to normal renal tissue. We further demonstrate the divergent cell
    transcriptional states for tumor-infiltrating CD8<sup>+</sup> T cells and identify
    a MKI67 + proliferative subpopulation being a potential culprit for the progression
    of ccRCC. Using the SCRS gene expression, we found preferential prediction of
    clinical outcomes and pathological diseases by subcluster assignment. With further
    characterization and functional validation, our findings may reveal certain subpopulations
    of immune cells amenable to therapeutic intervention.
- key: PMID33452311
  pmid: '33452311'
  title: The anti-tumor effects of cetuximab in combination with VTX-2337 are T cell
    dependent
  authors:
