  title: Ubiquitin-conjugating enzyme Ubc13 controls breast cancer metastasis through
    a TAK1-p38 MAP kinase cascade
  authors:
  - Xuefeng Wu
  - Weizhou Zhang
  - Joan Font-Burgada
