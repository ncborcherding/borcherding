  journal: Cell metabolism
  year: 2022
  volume: '34'
  number: '10'
  pages: 1499-1513.e8
  doi: 10.1016/j.cmet.2022.08.010
  pubmed: https://pubmed.ncbi.nlm.nih.gov/36070756/
  abstract: Adipocytes transfer mitochondria to macrophages in white and brown adipose
    tissues to maintain metabolic homeostasis. In obesity, adipocyte-to-macrophage
    mitochondria transfer is impaired, and instead, adipocytes release mitochondria
    into the blood to induce a protective antioxidant response in the heart. We found
    that adipocyte-to-macrophage mitochondria transfer in white adipose tissue is
    inhibited in murine obesity elicited by a lard-based high-fat diet, but not a
    hydrogenated-coconut-oil-based high-fat diet, aging, or a corn-starch diet. The
    long-chain fatty acids enriched in lard suppress mitochondria capture by macrophages,
    diverting adipocyte-derived mitochondria into the blood for delivery to other
    organs, such as the heart. The depletion of macrophages rapidly increased the
    number of adipocyte-derived mitochondria in the blood. These findings suggest
    that dietary lipids regulate mitochondria uptake by macrophages locally in white
    adipose tissue to determine whether adipocyte-derived mitochondria are released
    into systemic circulation to support the metabolic adaptation of distant organs
    in response to nutrient stress.
- key: PMID36245043
  pmid: '36245043'
  title: HSF1 is a driver of leukemia stem cell self-renewal in acute myeloid leukemia
  authors:
  - Qianze Dong
  - Yan Xiu
  - Yang Wang
  - Christina Hodgson
  - Nick Borcherding
  - Craig Jordan
  - Jane Buchanan
  - Eric Taylor
