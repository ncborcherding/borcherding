  pubmed: https://pubmed.ncbi.nlm.nih.gov/34594558/
  abstract: Type 1 diabetes and insulinoma can co-occur in pediatric patients and
    may present with episodes of hypo- and hyperglycemia, significant glycemic variability,
    and weight gain. Surgical resection leads to development of fulminant diabetes.
- key: PMID34877491
  pmid: '34877491'
  title: TIFAB accelerates MLL-AF9-Induced acute myeloid leukemia through upregulation
    of HOXA9
  authors:
  - Jinming Zhao
  - Yan Xiu
  - Lin Fu
  - Qianze Dong
  - Nicholas Borcherding
  - Yang Wang
  - Qingchang Li
  - Nilushi S De Silva
  - Ulf Klein
  - Brendan F Boyce
  - Chen Zhao
  journal: iScience
  year: 2021
  volume: '24'
  number: '12'
  pages: '103425'
  doi: 10.1016/j.isci.2021.103425
  pubmed: https://pubmed.ncbi.nlm.nih.gov/34877491/
  abstract: We previously showed stabilization of NIK-induced activation of NF-κB
    non-canonical signaling suppresses MLL-AF9-induced AML. In the current study,
    we demonstrate that deletion of NF-κB non-canonical RelB prevents the inhibitory
    effect of NIK stabilization in MLL-AF9 AML. Mechanistically, RelB suppresses its
    direct target, TIFAB, which is upregulated in human AML and correlates negatively
    with the survival of AML patients. Forced expression of TIFAB reverses NIK-induced
    impaired AML development through downregulation of RelB and upregulation of HOXA9.
    Consistent with upregulation of HOXA9, gene set enrichment analysis shows that
    forced expression of TIFAB blocks myeloid cell development, upregulates leukemia
    stem cell signature and induces similar gene expression patterns to those of HOXA9-MEIS1
    and HOXA9-NUP98, and upregulates oxidative phosphorylation. Accordingly, forced
    expression of HOXA9 also largely releases the inhibitory impact of NIK stabilization
    via downregulation of RelB and upregulation of RelA. Our data suggest that NIK/RelB
    suppresses MLL-AF9-induced AML mainly through downregulation of TIFAB/HOXA9.
- key: PMID32789006
  pmid: '32789006'
  title: 'scRepertoire: An R-based toolkit for single-cell immune receptor analysis'
  authors:
  - Nicholas Borcherding
  - Nicholas L Bormann
  - Gloria Kraus
  journal: F1000Research
  year: 2020
  volume: '9'
  number: ''
  pages: '47'
  doi: 10.12688/f1000research.22139.2
  pubmed: https://pubmed.ncbi.nlm.nih.gov/32789006/
  abstract: Single-cell sequencing is an emerging technology in the field of immunology
    and oncology that allows researchers to couple RNA quantification and other modalities,
    like immune cell receptor profiling at the level of an individual cell. A number
    of workflows and software packages have been created to process and analyze single-cell
    transcriptomic data. These packages allow users to take the vast dimensionality
    of the data generated in single-cell-based experiments and distill the data into
    novel insights. Unlike the transcriptomic field, there is a lack of options for
    software that allow for single-cell immune receptor profiling. Enabling users
    to easily combine mRNA and immune profiling, scRepertoire was built to process
    data derived from 10x Genomics Chromium Immune Profiling for both T-cell receptor
    (TCR) and immunoglobulin (Ig) enrichment workflows and subsequently interacts
    with a number of popular R packages for single-cell expression, such as Seurat.
    The scRepertoire R package and processed data are open source and available on
    GitHub and provides in-depth tutorials on the capability of the package.
- key: PMID32453712
  pmid: '32453712'
  title: A transcriptomic map of murine and human alopecia areata
  authors:
  - Nicholas Borcherding
  - Sydney B Crotts
  - Luana S Ortolan
  - Nicholas Henderson
  - Nicholas L Bormann
  - Ali Jabbari
  journal: JCI insight
  year: 2020
  volume: '5'
  number: '13'
  pages: ''
  doi: 10.1172/jci.insight.137424
  pubmed: https://pubmed.ncbi.nlm.nih.gov/32453712/
  abstract: Alopecia areata (AA) is a common autoimmune condition, presenting initially
    with loss of hair without other overt skin changes. The unremarkable appearance
    of the skin surface contrasts with the complex immune activity occurring at the
    hair follicle. AA pathogenesis is due to the loss of immune privilege of the hair
    follicle, leading to autoimmune attack. Although the literature has focused on
    CD8+ T cells, vital roles for CD4+ T cells and antigen-presenting cells have been
    suggested. Here, we use single-cell sequencing to reveal distinct expression profiles
    of immune cells in murine AA. We found clonal expansions of both CD4+ and CD8+
    T cells, with shared clonotypes across varied transcriptional states. The murine
    AA data were used to generate highly predictive models of human AA disease. Finally,
    single-cell sequencing of T cells in human AA recapitulated the clonotypic findings
    and the gene expression of the predictive models.
- key: PMID33239864
  pmid: '33239864'
  title: Repurposing Anti-Cancer Drugs for COVID-19 Treatment
  authors:
  - Nicholas Borcherding
  - Yogesh Jethava
  - Praveen Vikas
  journal: Drug design, development and therapy
  year: 2020
  volume: '14'
  number: ''
  pages: 5045-5058
  doi: 10.2147/DDDT.S282252
  pubmed: https://pubmed.ncbi.nlm.nih.gov/33239864/
  abstract: The novel coronavirus disease 2019 (COVID-19) pandemic has caused catastrophic
    damage to human life across the globe along with social and financial hardships.
    According to the Johns Hopkins University Coronavirus Resource Center, more than
    41.3 million people worldwide have been infected, and more than 1,133,000 people
    have died as of October 22, 2020. At present, there is no available vaccine and
    a scarcity of efficacious therapies. However, there is tremendous ongoing effort
    towards identifying effective drugs and developing novel vaccines. Early data
    from Adaptive COVID-19 Treatment Trials (ACTT) sponsored by the National Institute
    of Allergy and Infectious Diseases (NIAID) and compassionate use study have shown
    promise for remdesivir, leading to emergency authorization by the Food and Drug
    Administration (FDA) for treatment of hospitalized COVID-19 patients. However,
    several randomized studies have now shown no benefit or increased adverse events
    associated with remdesivir treatment. Drug development is a time-intensive process
    and requires extensive safety and efficacy evaluations. In contrast, drug repurposing
    is a time-saving and cost-effective drug discovery strategy geared towards using
    existing drugs instead of de novo drug discovery. Treatments for cancer and COVID-19
    often have similar goals of controlling inflammation, inhibiting cell division,
    and modulating the host microenvironment to control the disease. In this review,
    we focus on anti-cancer drugs that can potentially be repurposed for COVID-19
    and are currently being tested in clinical trials.
- key: PMID32719138
  pmid: '32719138'
  title: 'CD4 T cell-intrinsic role for the T helper 17 signature cytokine IL-17:
    Effector resistance to immune suppression'
  authors:
  - Michael P Crawford
  - Sushmita Sinha
  - Pranav S Renavikar
  - Nicholas Borcherding
  - Nitin J Karandikar
  journal: Proceedings of the National Academy of Sciences of the United States of
    America
  year: 2020
  volume: '117'
  number: '32'
  pages: 19408-19414
  doi: 10.1073/pnas.2005010117
  pubmed: https://pubmed.ncbi.nlm.nih.gov/32719138/
  abstract: Untoward effector CD4+ T cell responses are kept in check by immune regulatory
    mechanisms mediated by CD4+ and CD8+ T cells. CD4+ T helper 17 (Th17) cells, characterized
    by IL-17 production, play important roles in the pathogenesis of autoimmune diseases
    (such as arthritis, multiple sclerosis, psoriasis, inflammatory bowel disease,
    among others) and in the host response to infection and cancer. Here, we demonstrate
    that human CD4+ T cells cells exposed to a Th17-differentiating milieu are significantly
    more resistant to immune suppression by CD8+ T cells compared to control Th0 cells.
    This resistance is mediated, in part, through the action of IL-17A, IL-17F, and
    IL-17AF heterodimer through their receptors (IL-17RA and IL-17RC) on CD4+ T cells
    themselves, but not through their action on CD8+ T cells or APC. We further show
    that IL-17 can directly act on non-Th17 effector CD4+ T cells to induce suppressive
    resistance, and this resistance can be reversed by blockade of IL-1β, IL-6, or
    STAT3. These studies reveal a role for IL-17 cytokines in mediating CD4-intrinsic
    immune resistance. The pathways induced in this process may serve as a critical
    target for future investigation and immunotherapeutic intervention.
- key: PMID32042113
  pmid: '32042113'
  title: Cancer cell-intrinsic function of CD177 in attenuating β-catenin signaling
  authors:
  - Paige N Kluz
  - Ryan Kolb
  - Qing Xie
  - Nicholas Borcherding
  - Qi Liu
  - Yuewan Luo
  - Myung-Chul Kim
  - Linna Wang
  - Yinan Zhang
  - Wei Li
  - Christopher Stipp
  - Katherine N Gibson-Corley
  - Chen Zhao
  - Hank H Qi
  - Andrew Bellizzi
  - Andy W Tao
  - Sonia Sugg
  - Ronald J Weigel
  - Daohong Zhou
  - Xian Shen
  - Weizhou Zhang
  journal: Oncogene
  year: 2020
  volume: '39'
  number: '14'
  pages: 2877-2889
  doi: 10.1038/s41388-020-1203-x
  pubmed: https://pubmed.ncbi.nlm.nih.gov/32042113/
  abstract: Aiming to identify immune molecules with a novel function in cancer pathogenesis,
    we found the cluster of differentiation 177 (CD177), a known neutrophil antigen,
    to be positively correlated with relapse-free, metastasis-free, or overall survival
    in breast cancer. In addition, CD177 expression is correlated with good prognosis
    in several other solid cancers including prostate, cervical, and lung. Focusing
    on breast cancer, we found that CD177 is expressed in normal breast epithelial
    cells and is significantly reduced in invasive cancers. Loss of CD177 leads to
    hyperproliferative mammary epithelium and contributes to breast cancer pathogenesis.
    Mechanistically, we found that CD177-deficiency is associated with an increase
    in β-catenin signaling. Here we identified CD177 as a novel regulator of mammary
    epithelial proliferation and breast cancer pathogenesis likely via the modulation
    of Wnt/β-catenin signaling pathway, a key signaling pathway involved in multiple
    cancer types.
- key: PMID31923801
  pmid: '31923801'
  title: Contribution of synergism between PHF8 and HER2 signalling to breast cancer
    development and drug resistance
  authors:
  - Qi Liu
  - Nicholas C Borcherding
  - Peng Shao
  - Peterson K Maina
  - Weizhou Zhang
  - Hank H Qi
  journal: EBioMedicine
  year: 2020
  volume: '51'
  number: ''
  pages: '102612'
  doi: 10.1016/j.ebiom.2019.102612
  pubmed: https://pubmed.ncbi.nlm.nih.gov/31923801/
  abstract: 'BACKGROUND: HER2 plays a critical role in tumourigenesis and is associated
    with poor prognosis of patients with HER2-positive breast cancers. Although anti-HER2
    drugs are beneficial for treating breast cancer, de novo, or acquired resistance
    often develops. Epigenetic factors are increasingly targeted for therapy; however,
    such mechanisms that interact with HER2 signalling are poorly understood. METHODS:
    RNA sequencing was performed to identify PHF8 targets downstream of HER2 signalling.
    CHIP-qPCR were used to investigate how PHF8 regulates HER2 transcription. ELISA
    determined cytokine secretion. Cell-based assay revealed a feed forward loop in
    HER2 signalling and then evaluated in vivo. FINDINGS: We report the synergistic
    interplay between histone demethylase PHF8 and HER2 signalling. Specifically,
    PHF8 levels were elevated in HER2-positive breast cancers and upregulated by HER2.
    PHF8 functioned as a coactivator that regulated the expression of HER2, markers
    of the HER2-driven epithelial-to-mesenchymal transition and cytokines. The HER2-PHF8-IL-6
    regulatory axis was active in cell lines and in newly established MMTV-Her2/MMTV-Cre/Phf8<sup>fl</sup>°<sup>x/fl</sup>°<sup>x</sup>
    mouse models, which revealed the oncogenic function of Phf8 in breast cancer for
    the first time. Further, the PHF8-IL-6 axis contributed to the resistance to trastuzumab
    in vitro and may play a critical role in the infiltration of T cells in HER2-driven
    breast cancers. INTERPRETATION: These findings provided informative mechanistic
    insight into the potential application of PHF8 inhibitors to overcome resistance
    to anti-HER2 therapies. FUNDING: This work was supported by Carver Trust Young
    Investigator Award (01-224 to H.H.Q); and a Breast Cancer Research Award (to H.H.Q.).'
- key: PMID33193343
  pmid: '33193343'
  title: IL-12-Induced Immune Suppressive Deficit During CD8+ T-Cell Differentiation
  authors:
  - Pranav S Renavikar
  - Sushmita Sinha
  - Ashley A Brate
  - Nicholas Borcherding
  - Michael P Crawford
  - Scott M Steward-Tharp
  - Nitin J Karandikar
  journal: Frontiers in immunology
  year: 2020
  volume: '11'
  number: ''
  pages: '568630'
  doi: 10.3389/fimmu.2020.568630
  pubmed: https://pubmed.ncbi.nlm.nih.gov/33193343/
  abstract: Autoimmune diseases are characterized by regulatory deficit in both the
    CD4+ and CD8+ T-cell compartments. We have shown that CD8+ T-cells associated
    with acute relapse of multiple sclerosis are significantly deficient in their
    immune suppressive ability. We hypothesized that distinct CD8+ cytotoxic T-cell
    (Tc) lineages, determined by cytokine milieu during naïve T-cell differentiation,
    may harbor differential ability to suppress effector CD4+ T-cells. We differentiated
    purified human naïve CD8+ T-cells <i>in vitro</i> toward Tc0 (media control),
    Tc1 and Tc17 lineages. Using <i>in vitro</i> flow cytometric suppression assays,
    we observed that Tc0 and Tc17 cells had similar suppressive ability. In contrast,
    Tc1 cells showed significant loss of suppressive ability against <i>ex vivo</i>
    CD4+ T-cells and <i>in vitro</i>-differentiated Th0, Th1 and Th17 cells. Of note,
    Tc1 cells were also suboptimal in suppressing CD4-induced acute xenogeneic graft
    versus host disease (xGVHD) <i>in vivo</i>. Tc subtypes derived under various
    cytokine combinations revealed that IL-12-containing conditions resulted in less
    suppressive cells exhibiting dysregulated cytotoxic degranulation. RNA sequencing
    transcriptome analyses indicated differential regulation of inflammatory genes
    and enrichment in GM-CSF-associated pathways. These studies provide insights into
    the role of T-cell differentiation in CD8 suppressive biology and may reveal therapeutically
    targetable pathways to reverse suppressive deficit during immune-mediated disease.
- key: PMID33120998
  pmid: '33120998'
  title: Multivariable Analysis of 169 Cases of Advanced Cutaneous Melanoma to Evaluate
    Antibiotic Exposure as Predictor of Survival to Anti-PD-1 Based Immunotherapies
  authors:
  - Umang Swami
  - Adithya Chennamadhavuni
  - Nicholas Borcherding
  - Aaron D Bossler
  - Sarah L Mott
  - Rohan Garje
  - Yousef Zakharia
  - Mohammed Milhem
  journal: Antibiotics (Basel, Switzerland)
  year: 2020
  volume: '9'
  number: '11'
  pages: ''
  doi: 10.3390/antibiotics9110740
  pubmed: https://pubmed.ncbi.nlm.nih.gov/33120998/
  abstract: Recently antibiotic exposure has been associated with worse outcomes in
    patients undergoing treatment with antibodies directed against programmed cell
    death protein-1 (PD-1). We reviewed data of 1264 patients enrolled at Melanoma
    Skin and Ocular Tissue Repositories at University of Iowa Hospitals and Clinic.
    Reviewed data included patient demographics, prior medical history, baseline hematologic
    and disease parameters and outcomes including progression-free survival (PFS)
    and overall survival (OS). Cox regression models were used to determine predictive
    markers. Overall, 169 patients with advanced cutaneous melanoma received anti-PD-1
    based therapies. Median follow up was 18.46 (range 0.89 to 62.52) months. On multivariable
    analysis brain metastasis, higher absolute neutrophil count (ANC) and lower absolute
    lymphocyte count were associated with poorer PFS while brain and liver metastasis
    and lower albumin were associated with poorer OS. Prior antibiotics, radiation
    as well as age, gender, basal metabolic index (BMI), smoking status, <i>BRAF</i>
    mutation, line of therapy (first or latter), prior treatments (ipilimumab or BRAF
    inhibitors), hemoglobin, neutrophil-to-lymphocyte ratio, white blood cell, platelet
    and eosinophil counts were not associated with PFS or OS in multivariable analysis.
    Contrary to some prior studies BMI, radiation, and antibiotics were not associated
    with PFS or OS.
- key: PMID32457830
  pmid: '32457830'
  title: Therapeutic Potential of Combining PARP Inhibitor and Immunotherapy in Solid
    Tumors
  authors:
  - Praveen Vikas
  - Nicholas Borcherding
  - Adithya Chennamadhavuni
  - Rohan Garje
  journal: Frontiers in oncology
  year: 2020
  volume: '10'
  number: ''
  pages: '570'
  doi: 10.3389/fonc.2020.00570
  pubmed: https://pubmed.ncbi.nlm.nih.gov/32457830/
  abstract: Immunotherapy has revolutionized the treatment of both hematological malignancies
    and solid tumors. The use of immunotherapy has improved outcome for patients with
    cancer across multiple tumor types, including lung, melanoma, ovarian, genitourinary,
    and more recently breast cancer with durable responses seen even in patients with
    widespread metastatic disease. Despite the promising results, immunotherapy still
    helps only a subset of patients due to overall low response rates. Moreover, the
    response to immunotherapy is highly cancer specific and results have not been
    as promising in cancers that are considered less immunogenic. The strategies to
    improve immunotherapy responses have focused on biomarker selection, like PD-L1
    status, and usage of combinatorial agents, such as chemotherapy, targeted therapy,
    and radiotherapy. Of particular interest, DNA-damaging agents have the potential
    to enhance the response to immunotherapy by promoting neoantigen release, increasing
    tumor mutational burden, and enhancing PD-L1 expression. Poly-ADP-ribose polymerase
    (PARP) inhibitors are one such class of drugs that has shown synergy with immunotherapy
    in preclinical and early clinical studies. PARP-based therapies work through the
    inhibition of single-strand DNA repair leading to DNA damage, increased tumor
    mutational burden, making the tumor a more attractive target for immunotherapy.
    Of the solid tumors reviewed, breast, ovarian, and prostate cancers have demonstrated
    efficacy in the combination of PARP inhibition and immunotherapy, predominately
    in <i>BRCA</i>-mutated tumors. However, initial investigations into wildtype <i>BRCA</i>
    and gastrointestinal tumors have shown moderate overall response or disease control
    rates, dependent on the tumor type. In contrast, although a number of clinical
    trials underway, there is a paucity of published results for the use of the combination
    in lung or urothelial cancers. Overall this article focuses on the promise of
    combinatorial PARP inhibition and immunotherapy to improve patient outcomes in
    solid tumors, summarizing both early results and looking toward ongoing trials.
- key: PMID31619506
  pmid: '31619506'
  title: A <i>TFAP2C</i> Gene Signature Is Predictive of Outcome in HER2-Positive
    Breast Cancer
  authors:
  - Vincent T Wu
  - Boris Kiriazov
  - Kelsey E Koch
  - Vivian W Gu
  - Anna C Beck
  - Nicholas Borcherding
  - Tiandao Li
  - Peter Addo
  - Zachary J Wehrspan
  - Weizhou Zhang
  - Terry A Braun
  - Bartley J Brown
  - Vimla Band
  - Hamid Band
  - Mikhail V Kulak
  - Ronald J Weigel
  journal: 'Molecular cancer research : MCR'
  year: 2020
  volume: '18'
  number: '1'
  pages: 46-56
  doi: 10.1158/1541-7786.MCR-19-0359
  pubmed: https://pubmed.ncbi.nlm.nih.gov/31619506/
  abstract: 'The AP-2γ transcription factor, encoded by the <i>TFAP2C</i> gene, regulates
    the expression of estrogen receptor-alpha (ERα) and other genes associated with
    hormone response in luminal breast cancer. Little is known about the role of AP-2γ
    in other breast cancer subtypes. A subset of HER2<sup>+</sup> breast cancers with
    amplification of the <i>TFAP2C</i> gene locus becomes addicted to AP-2γ. Herein,
    we sought to define AP-2γ gene targets in HER2<sup>+</sup> breast cancer and identify
    genes accounting for physiologic effects of growth and invasiveness regulated
    by AP-2γ. Comparing HER2<sup>+</sup> cell lines that demonstrated differential
    response to growth and invasiveness with knockdown of <i>TFAP2C</i>, we identified
    a set of 68 differentially expressed target genes. <i>CDH5</i> and <i>CDKN1A</i>
    were among the genes differentially regulated by AP-2γ and that contributed to
    growth and invasiveness. Pathway analysis implicated the <i>MAPK13</i>/p38δ and
    retinoic acid regulatory nodes, which were confirmed to display divergent responses
    in different HER2<sup>+</sup> cancer lines. To confirm the clinical relevance
    of the genes identified, the AP-2γ gene signature was found to be highly predictive
    of outcome in patients with HER2<sup>+</sup> breast cancer. We conclude that AP-2γ
    regulates a set of genes in HER2<sup>+</sup> breast cancer that drive cancer growth
    and invasiveness. The AP-2γ gene signature predicts outcome of patients with HER2<sup>+</sup>
    breast cancer and pathway analysis predicts that subsets of patients will respond
    to drugs that target the MAPK or retinoic acid pathways. IMPLICATIONS: A set of
    genes regulated by AP-2γ in HER2<sup>+</sup> breast cancer that drive proliferation
    and invasion were identified and provided a gene signature that is predictive
    of outcome in HER2<sup>+</sup> breast cancer.'
- key: PMID31697816
  pmid: '31697816'
  title: Coactivation of NF-κB and Notch signaling is sufficient to induce B-cell
    transformation and enables B-myeloid conversion
  authors:
  - Yan Xiu
  - Qianze Dong
  - Lin Fu
  - Aaron Bossler
  - Xiaobing Tang
  - Brendan Boyce
  - Nicholas Borcherding
  - Mariah Leidinger
  - José Luis Sardina
  - Hai-Hui Xue
  - Qingchang Li
  - Andrew Feldman
  - Iannis Aifantis
  - Francesco Boccalatte
  - Lili Wang
  - Meiling Jin
  - Joseph Khoury
  - Wei Wang
  - Shimin Hu
  - Youzhong Yuan
  - Endi Wang
  - Ji Yuan
  - Siegfried Janz
  - John Colgan
  - Hasem Habelhah
  - Thomas Waldschmidt
  - Markus Müschen
  - Adam Bagg
  - Benjamin Darbro
  - Chen Zhao
  journal: Blood
  year: 2020
  volume: '135'
  number: '2'
  pages: 108-120
  doi: 10.1182/blood.2019001438
  pubmed: https://pubmed.ncbi.nlm.nih.gov/31697816/
  abstract: NF-κB and Notch signaling can be simultaneously activated in a variety
    of B-cell lymphomas. Patients with B-cell lymphoma occasionally develop clonally
    related myeloid tumors with poor prognosis. Whether concurrent activation of both
    pathways is sufficient to induce B-cell transformation and whether the signaling
    initiates B-myeloid conversion in a pathological context are largely unknown.
    Here, we provide genetic evidence that concurrent activation of NF-κB and Notch
    signaling in committed B cells is sufficient to induce B-cell lymphomatous transformation
    and primes common progenitor cells to convert to myeloid lineage through dedifferentiation,
    not transdifferentiation. Intriguingly, the converted myeloid cells can further
    transform, albeit at low frequency, into myeloid leukemia. Mechanistically, coactivation
    of NF-κB and Notch signaling endows committed B cells with the ability to self
    renew. Downregulation of BACH2, a lymphoma and myeloid gene suppressor, but not
    upregulation of CEBPα and/or downregulation of B-cell transcription factors, is
    an early event in both B-cell transformation and myeloid conversion. Interestingly,
    a DNA hypomethylating drug not only effectively eliminated the converted myeloid
    leukemia cells, but also restored the expression of green fluorescent protein,
    which had been lost in converted myeloid leukemia cells. Collectively, our results
    suggest that targeting NF-κB and Notch signaling will not only improve lymphoma
    treatment, but also prevent the lymphoma-to-myeloid tumor conversion. Importantly,
    DNA hypomethylating drugs might efficiently treat these converted myeloid neoplasms.
- key: PMID31527591
  pmid: '31527591'
  title: Metadherin enhances vulnerability of cancer cells to ferroptosis
  authors:
  - Jianling Bi
  - Shujie Yang
  - Long Li
  - Qun Dai
  - Nicholas Borcherding
  - Brett A Wagner
  - Garry R Buettner
  - Douglas R Spitz
  - Kimberly K Leslie
  - Jun Zhang
  - Xiangbing Meng
  journal: Cell death & disease
  year: 2019
  volume: '10'
  number: '10'
  pages: '682'
  doi: 10.1038/s41419-019-1897-2
  pubmed: https://pubmed.ncbi.nlm.nih.gov/31527591/
  abstract: Ferroptosis is an iron-dependent, non-apoptotic form of regulated cell
    death driven by lipid hydroperoxides within biological membranes. Although therapy-resistant
    mesenchymal-high cancers are particularly vulnerable to ferroptosis inducers,
    especially phospholipid glutathione peroxidase 4 (GPx4) inhibitors, the underlying
    mechanism is yet to be deciphered. As such, the full application of GPx4 inhibitors
    in cancer therapy remains challenging. Here we demonstrate that metadherin (MTDH)
    confers a therapy-resistant mesenchymal-high cell state and enhanced sensitivity
    to inducers of ferroptosis. Mechanistically, MTDH inhibited GPx4, as well as the
    solute carrier family 3 member 2 (SLC3A2, a system X<sub>c</sub><sup>-</sup> heterodimerization
    partner), at both the messenger RNA and protein levels. Our metabolomic studies
    demonstrated that MTDH reduced intracellular cysteine, but increased glutamate
    levels, ultimately decreasing levels of glutathione and setting the stage for
    increased vulnerability to ferroptosis. Finally, we observed an enhanced antitumor
    effect when we combined various ferroptosis inducers both in vitro and in vivo;
    the level of MTDH correlated with the ferroptotic effect. We have demonstrated
    for the first time that MTDH enhances the vulnerability of cancer cells to ferroptosis
    and may serve as a therapeutic biomarker for future ferroptosis-centered cancer
    therapy.
- key: PMID30718356
  pmid: '30718356'
  title: Single-Cell Profiling of Cutaneous T-Cell Lymphoma Reveals Underlying Heterogeneity
    Associated with Disease Progression
  authors:
  - Nicholas Borcherding
  - Andrew P Voigt
  - Vincent Liu
  - Brian K Link
  - Weizhou Zhang
  - Ali Jabbari
  journal: 'Clinical cancer research : an official journal of the American Association
    for Cancer Research'
  year: 2019
  volume: '25'
  number: '10'
  pages: 2996-3005
  doi: 10.1158/1078-0432.CCR-18-3309
  pubmed: https://pubmed.ncbi.nlm.nih.gov/30718356/
  abstract: 'PURPOSE: Cutaneous T-cell lymphomas (CTCL), encompassing a spectrum of
    T-cell lymphoproliferative disorders involving the skin, have collectively increased
    in incidence over the last 40 years. Sézary syndrome is an aggressive form of
    CTCL characterized by significant presence of malignant cells in both the blood
    and skin. The guarded prognosis for Sézary syndrome reflects a lack of reliably
    effective therapy, due, in part, to an incomplete understanding of disease pathogenesis.
    EXPERIMENTAL DESIGN: Using single-cell sequencing of RNA and the machine-learning
    reverse graph embedding approach in the Monocle package, we defined a model featuring
    distinct transcriptomic states within Sézary syndrome. Gene expression used to
    differentiate the unique transcriptional states were further used to develop a
    boosted tree classification for early versus late CTCL disease. RESULTS: Our analysis
    showed the involvement of <i>FOXP3</i> <sup>+</sup> malignant T cells during clonal
    evolution, transitioning from <i>FOXP3</i> <sup>+</sup> T cells to <i>GATA3</i>
    <sup>+</sup> or <i>IKZF2</i> <sup>+</sup> (HELIOS) tumor cells. Transcriptomic
    diversities in a clonal tumor can be used to predict disease stage, and we were
    able to characterize a gene signature that predicts disease stage with close to
    80% accuracy. <i>FOXP3</i> was found to be the most important factor to predict
    early disease in CTCL, along with another 19 genes used to predict CTCL stage.
    CONCLUSIONS: This work offers insight into the heterogeneity of Sézary syndrome,
    providing better understanding of the transcriptomic diversities within a clonal
    tumor. This transcriptional heterogeneity can predict tumor stage and thereby
    offer guidance for therapy.'
- key: PMID30518876
  pmid: '30518876'
  title: Obesity-associated inflammation promotes angiogenesis and breast cancer via
    angiopoietin-like 4
  authors:
  - Ryan Kolb
  - Paige Kluz
  - Zhen Wei Tan
  - Nicholas Borcherding
  - Nicholas Bormann
  - Ajaykumar Vishwakarma
  - Louis Balcziak
  - Pengcheng Zhu
  - Brandon Sj Davies
  - Francoise Gourronc
  - Ling-Zhi Liu
  - Xin Ge
  - Bing-Hua Jiang
  - Katherine Gibson-Corley
  - Aloysius Klingelhutz
  - Nguan Soon Tan
  - Yuwen Zhu
  - Fayyaz S Sutterwala
  - Xian Shen
  - Weizhou Zhang
  journal: Oncogene
  year: 2019
  volume: '38'
  number: '13'
  pages: 2351-2363
  doi: 10.1038/s41388-018-0592-6
  pubmed: https://pubmed.ncbi.nlm.nih.gov/30518876/
  abstract: Obesity is a risk factor for breast cancer and also predicts poor clinical
    outcomes regardless of menopausal status. Contributing to the poor clinical outcomes
    is the suboptimal efficacy of standard therapies due to dose limiting toxicities
    and obesity-related complications, highlighting the need to develop novel therapeutic
    approaches for treating obese patients. We recently found that obesity leads to
    an increase in tumor-infiltrating macrophages with activated NLRC4 inflammasome
    and increased interleukin (IL)-1β production. IL-1β, in turn, leads to increased
    angiogenesis and cancer progression. Using Next Generation RNA sequencing, we
    identified an NLRC4/IL-1β-dependent upregulation of angiopoietin-like 4 (ANGPTL4),
    a known angiogenic factor in cancer, in tumors from obese mice. ANGPTL4-deficiency
    by genetic knockout or treatment with a neutralizing antibody led to a significant
    reduction in obesity-induced angiogenesis and tumor growth. At a mechanistic level,
    ANGPTL4 expression is induced by IL-1β from primary adipocytes in a manner dependent
    on NF-κB- and MAP kinase-activation, which is further enhanced by hypoxia. This
    report shows that adipocyte-derived ANGPTL4 drives disease progression under obese
    conditions and is a potential therapeutic target for treating obese breast cancer
    patients.
- key: PMID31449970
  pmid: '31449970'
  title: Identification of novel TGF-β regulated genes with pro-migratory roles
  authors:
  - Qi Liu
  - Nicholas Borcherding
  - Peng Shao
  - Huojun Cao
  - Weizhou Zhang
  - Hank Heng Qi
  journal: Biochimica et biophysica acta. Molecular basis of disease
  year: 2019
  volume: '1865'
  number: '12'
  pages: '165537'
  doi: 10.1016/j.bbadis.2019.165537
  pubmed: https://pubmed.ncbi.nlm.nih.gov/31449970/
  abstract: Transforming growth factor-β (TGF-β) signaling plays fundamental roles
    in the development and homeostasis of somatic cells. Dysregulated TGF-β signaling
    contributes to cancer progression and relapse to therapies by inducing epithelial-to-mesenchymal
    transition (EMT), enriching cancer stem cells, and promoting immunosuppression.
    Although many TGF-β-regulated genes have been identified, only a few datasets
    were obtained by next-generation sequencing. In this study, we performed RNA-sequencing
    analysis of MCF10A cells and identified 1166 genes that were upregulated and 861
    genes that were downregulated by TGF-β. Gene set enrichment analysis revealed
    that focal adhesion and metabolic pathways were the top enriched pathways of the
    up- and downregulated genes, respectively. Genes in these pathways also possess
    significant predictive value for renal cancers. Moreover, we confirmed that TGF-β
    induced expression of MICAL1 and 2, and the histone demethylase, KDM7A, and revealed
    their regulatory roles on TGF-β-induced cell migration. We also show a critical
    effect of KDM7A in regulating the acetylation of H3K27 on TGF-β-induced genes.
    In sum, this study identified novel effectors that mediate the pro-migratory role
    of TGF-β signaling, paving the way for future studies that investigate the function
    of MICAL family members in cancer and the novel epigenetic mechanisms downstream
    TGF-β signaling.
- key: PMID31137681
  pmid: '31137681'
  title: ROR1 Potentiates FGFR Signaling in Basal-Like Breast Cancer
  authors:
  - Gaurav Pandey
  - Nicholas Borcherding
  - Ryan Kolb
  - Paige Kluz
  - Wei Li
  - Sonia Sugg
  - Jun Zhang
  - Dazhi A Lai
  - Weizhou Zhang
  journal: Cancers
  year: 2019
  volume: '11'
  number: '5'
  pages: ''
  doi: 10.3390/cancers11050718
  pubmed: https://pubmed.ncbi.nlm.nih.gov/31137681/
  abstract: Among all breast cancer types, basal-like breast cancer (BLBC) represents
    an aggressive subtype that lacks targeted therapy. We and others have found that
    receptor tyrosine kinase-like orphan receptor 1 (ROR1) is overexpressed in BLBC
    and other types of cancer and that ROR1 is significantly correlated with patient
    prognosis. In addition, using primary patient-derived xenografts (PDXs) and <i>ROR1</i>-knockout
    BLBC cells, we found that ROR1<sup>+</sup> cells form tumors in immunodeficient
    mice. We developed an anti-ROR1 immunotoxin and found that targeting ROR1 significantly
    kills ROR1<sup>+</sup> cancer cells and slows down tumor growth in ROR1<sup>+</sup>
    xenografts. Our bioinformatics analysis revealed that ROR1 expression is commonly
    associated with the activation of FGFR-mediated signaling pathway. Further biochemical
    analysis confirmed that ROR1 stabilized FGFR expression at the posttranslational
    level by preventing its degradation. CRISPR/Cas9-mediated <i>ROR1</i> knockout
    significantly reduced cancer cell invasion at cellular levels by lowering FGFR
    protein and consequent inactivation of AKT. Our results identified a novel signaling
    regulation from ROR1 to FGFR and further confirm that ROR1 is a potential therapeutic
    target for ROR1<sup>+</sup> BLBC cells.
- key: PMID30345029
  pmid: '30345029'
  title: 'TRGAted: A web tool for survival analysis using protein data in the Cancer
    Genome Atlas'
  authors:
  - Nicholas Borcherding
  - Nicholas L Bormann
  - Andrew P Voigt
  - Weizhou Zhang
  journal: F1000Research
  year: 2018
  volume: '7'
  number: ''
  pages: '1235'
  doi: 10.12688/f1000research.15789.2
  pubmed: https://pubmed.ncbi.nlm.nih.gov/30345029/
  abstract: Reverse-phase protein arrays (RPPAs) are a highthroughput approach to
    protein quantification utilizing antibody-based micro-to-nano scale dot blot.
    Within the Cancer Genome Atlas (TCGA), RPPAs were used to quantify over 200 proteins
    in 8,167 tumor and metastatic samples. Protein-level data has particular advantages
    in assessing putative prognostic or therapeutic targets in tumors. However, many
    of the available pipelines do not allow for the partitioning of clinical and RPPA
    information to make meaningful conclusions. We developed a cloud-based application,
    TRGAted to enable researchers to better examine patient survival based on single
    or multiple proteins across 31 cancer types in the TCGA. TRGAted contains up-to-date
    overall survival, disease-specific survival, disease-free interval and progression-free
    interval information. Furthermore, survival information for primary tumor samples
    can be stratified based on gender, age, tumor stage, histological type, and subtype,
    allowing for highly adaptive and intuitive user experience. The code and processed
    data are open sourced and available on github and contains a tutorial built into
    the application for assisting users.
- key: PMID29879416
  pmid: '29879416'
  title: 'Re-Evaluating E-Cadherin and β-Catenin: A Pan-Cancer Proteomic Approach
    with an Emphasis on Breast Cancer'
  authors:
  - Nicholas Borcherding
  - Kimberly Cole
  - Paige Kluz
  - Michael Jorgensen
  - Ryan Kolb
  - Andrew Bellizzi
  - Weizhou Zhang
  journal: The American journal of pathology
  year: 2018
  volume: '188'
  number: '8'
  pages: 1910-1920
  doi: 10.1016/j.ajpath.2018.05.003
  pubmed: https://pubmed.ncbi.nlm.nih.gov/29879416/
  abstract: E-cadherin is conventionally considered to be a good prognostic marker
    in cancer. The loss of E-cadherin is one of the key hallmarks of epithelial-to-mesenchymal
    transition, a biological process that promotes cancer cell invasiveness and metastasis.
    Recent evidence has cast doubt on the importance of epithelial-to-mesenchymal
    transition in metastasis. The availability of protein-level data in the Cancer
    Genome Atlas allows for the quantitative analysis of protein and prognosis. The
    prognostic values of E-cadherin and β-catenin were revisited across 19 cancer
    types, and high E-cadherin was found to correlate with good prognosis in most
    cancers. Conversely, higher E-cadherin and β-catenin correlated with shorter survival
    in invasive breast carcinoma. Stratifying breast cancers by histologic subtype
    revealed that the poor prognosis of E-cadherin and β-catenin proteins was characteristic
    of infiltrating ductal, but not lobular, carcinomas. To further corroborate the
    protein findings and examine cellular localization, immunohistochemistry was used
    for E-cadherin and β-catenin in 163 breast patient samples from the Iowa cohort.
    Most previous studies showing that reduced or absent E-cadherin and β-catenin
    was inversely associated with tumor stages in ductal carcinomas were confirmed.
    Taken together, these results lead us to question the prognostic values of E-cadherin
    and β-catenin in ductal carcinomas and indicate a complicated role of E-cadherin
    and β-catenin in breast cancer progression.
- key: PMID29800567
  pmid: '29800567'
  title: 'Keeping Tumors in Check: A Mechanistic Review of Clinical Response and Resistance
    to Immune Checkpoint Blockade in Cancer'
  authors:
  - Nicholas Borcherding
  - Ryan Kolb
  - Jodi Gullicksrud
  - Praveen Vikas
  - Yuwen Zhu
  - Weizhou Zhang
  journal: Journal of molecular biology
  year: 2018
  volume: '430'
  number: '14'
  pages: 2014-2029
  doi: 10.1016/j.jmb.2018.05.030
  pubmed: https://pubmed.ncbi.nlm.nih.gov/29800567/
  abstract: Immune checkpoints are a diverse set of inhibitory signals to the immune
    system that play a functional role in adaptive immune response and self-tolerance.
    Dysregulation of these pathways is a vital mechanism in the avoidance of immune
    destruction by tumor cells. Immune checkpoint blockade (ICB) refers to targeted
    strategies to disrupt the tumor co-opted immune suppression to enhance anti-tumor
    immunity. Cytotoxic T-lymphocyte-associated protein 4 (CTLA-4) and programmed
    cell death 1 (PD-1) are two immune checkpoints that have the widest range of antibody-based
    therapies. These therapies have gone from promising approaches to Food and Drug
    Administration-approved first- and second-line agents for a number of immunogenic
    cancers. The burgeoning investigations of ICB efficacy in blood and solid cancers
    have underscored the importance of identifying the predictors of response and
    resistance to ICB. Identification of response correlates is made complicated by
    the observations of mixed reactions, or different responses in multiple lesions
    from the same patient, and delayed responses that can occur over a year after
    the induction therapy. Factors that can influence response and resistance in ICB
    can illuminate underlying molecular mechanisms of immune activation and suppression.
    These same response predictors can guide the identification of patients who would
    benefit from ICB, reduce off-target immune-relate adverse events, and facilitate
    the use of combinatorial therapies to increase efficacy. Here we review the underlying
    principles of immune checkpoint therapy and results of single-agent ICB clinical
    trials, and summarize the predictors of response and resistance.
- key: PMID29283505
  pmid: '29283505'
  title: 'Application of flipped classroom pedagogy to the human gross anatomy laboratory:
    Student preferences and learning outcomes'
  authors:
  - Timothy R Fleagle
  - Nicholas C Borcherding
  - Jennie Harris
  - Darren S Hoffmann
  journal: Anatomical sciences education
  year: 2018
  volume: '11'
  number: '4'
  pages: 385-396
  doi: 10.1002/ase.1755
  pubmed: https://pubmed.ncbi.nlm.nih.gov/29283505/
  abstract: 'To improve student preparedness for anatomy laboratory dissection, the
    dental gross anatomy laboratory was transformed using flipped classroom pedagogy.
    Instead of spending class time explaining the procedures and anatomical structures
    for each laboratory, students were provided online materials to prepare for laboratory
    on their own. Eliminating in-class preparation provided the opportunity to end
    each period with integrative group activities that connected laboratory and lecture
    material and explored clinical correlations. Materials provided for prelaboratory
    preparation included: custom-made, three-dimensional (3D) anatomy videos, abbreviated
    dissection instructions, key atlas figures, and dissection videos. Data from three
    years of the course (n = 241 students) allowed for analysis of students'' preferences
    for these materials and detailed tracking of usage of 3D anatomy videos. Students
    reported spending an average of 27:22 (±17:56) minutes preparing for laboratory,
    similar to the 30 minutes previously allocated for in-class dissection preparation.
    The 3D anatomy videos and key atlas figures were rated the most helpful resources.
    Scores on laboratory examinations were compared for the three years before the
    curriculum change (2011-2013; n = 242) and three years after (2014-2016; n = 241).
    There was no change in average grades on the first and second laboratory examinations.
    However, on the final semi-cumulative laboratory examination, scores were significantly
    higher in the post-flip classes (P = 0.04). These results demonstrate an effective
    model for applying flipped classroom pedagogy to the gross anatomy laboratory
    and illustrate a meaningful role for 3D anatomy visualizations in a dissection-based
    course. Anat Sci Educ 11: 385-396. © 2017 American Association of Anatomists.'
- key: PMID29966047
  pmid: '29966047'
  title: 'Erratum: Application of flipped classroom pedagogy to the human gross anatomy
    laboratory: Student preferences and learning outcomes'
  authors:
  - Timothy R Fleagle
  - Nicholas C Borcherding
  - Jennie Harris
  - Darren S Hoffmann
  journal: Anatomical sciences education
  year: 2018
  volume: '11'
  number: '4'
  pages: '429'
  doi: 10.1002/ase.1780
  pubmed: https://pubmed.ncbi.nlm.nih.gov/29966047/
  abstract: ''
- key: PMID29035388
  pmid: '29035388'
  title: A novel HER2 gene body enhancer contributes to HER2 expression
  authors:
  - Q Liu
  - M V Kulak
  - N Borcherding
  - P K Maina
  - W Zhang
  - R J Weigel
  - H H Qi
  journal: Oncogene
  year: 2018
  volume: '37'
  number: '5'
  pages: 687-694
  doi: 10.1038/onc.2017.382
  pubmed: https://pubmed.ncbi.nlm.nih.gov/29035388/
  abstract: The transcriptional regulation of the human epidermal growth factor receptor-2
    (HER2) contributes to an enhanced HER2 expression in HER2-positive breast cancers
    with HER2 gene amplification and HER2-low or HER2-negative breast cancers following
    radiotherapy or endocrine therapy, and this drives tumorigenesis and the resistance
    to therapy. Epigenetic mechanisms are critical for transcription regulation, however,
    such mechanisms in the transcription regulation of HER2 are limited to the involvement
    of tri-methylated histone 3 lysine 4 (H3K4me3) and acetylated histone 3 lysine
    9 (H3K9ac) at the HER2 promoter region. Here, we report the identification of
    a novel enhancer in the HER2 3' gene body, which we have termed HER2 gene body
    enhancer (HGE). The HGE starts from the 3' end of intron 19 and extends into intron
    22, possesses enhancer histone modification marks in specific cells and enhances
    the transcriptional activity of the HER2 promoters. We also found that TFAP2C,
    a known regulator of HER2, binds to HGE and is required for its enhancer function
    and that DNA methylation in the HGE region inhibits the histone modifications
    characterizing enhancer and is inversely correlated with HER2 expression in breast
    cancer samples. The identification of this novel enhancer sheds a light on the
    roles of epigenetic mechanisms in HER2 transcription, in both HER2-positive breast
    cancer samples and individuals with HER2-low or HER2-negative breast cancers undergoing
    radiotherapy or endocrine therapy.
- key: PMID30337675
  pmid: '30337675'
  title: An autoimmune disease risk SNP, rs2281808, in SIRPG is associated with reduced
    expression of SIRPγ and heightened effector state in human CD8 T-cells
  authors:
  - Sushmita Sinha
  - Nicholas Borcherding
  - Pranav S Renavikar
  - Michael P Crawford
  - Eva Tsalikian
  - Michael Tansey
  - Ezzatollah T Shivapour
  - Frank Bittner
  - John Kamholz
  - Heena Olalde
  - Emilee Gibson
  - Nitin J Karandikar
  journal: Scientific reports
  year: 2018
  volume: '8'
  number: '1'
  pages: '15440'
  doi: 10.1038/s41598-018-33901-1
  pubmed: https://pubmed.ncbi.nlm.nih.gov/30337675/
  abstract: Multiple GWAS studies have shown that the SNP rs2281808 TT variant, present
    within the SIRPG gene, is associated with autoimmune diseases, such as type 1
    diabetes. However, the role of SIRPγ in human T-cells is not known, neither is
    the functional significance of TT variant. Here we investigated SIRPG genotypes
    and their effects on the fate and function of human T-cells. We found that the
    presence of T variant resulted in reduction of SIRPγ expression on T-cells. Functionally,
    SIRPγ<sup>low</sup> CD8 T-cells in CT and TT individuals existed in a heightened
    effector state with lower activation threshold and had greater expression of genes
    and molecules associated with migratory and cytotoxic potential. Further, SIRPγ<sup>low</sup>
    CD8 T-cells were deficient in transcription factors associated with long-term
    functional memory formation. Our study reveals biological consequences of the
    SNP rs2281808 and provides novel insights into the potential mechanisms by which
    SIRPγ might regulate human immune responses.
- key: PMID30573992
  pmid: '30573992'
  title: The clinical promise of immunotherapy in triple-negative breast cancer
  authors:
  - Praveen Vikas
  - Nicholas Borcherding
  - Weizhou Zhang
  journal: Cancer management and research
  year: 2018
  volume: '10'
  number: ''
  pages: 6823-6833
  doi: 10.2147/CMAR.S185176
  pubmed: https://pubmed.ncbi.nlm.nih.gov/30573992/
  abstract: Triple-negative breast cancer (TNBC) is a heterogeneous disease with poorer
    outcomes compared to other breast cancer subtypes. Contributing to the worse prognosis
    in TNBC is the higher rates of relapse and rapid progression after relapse. Advances
    in targeted therapeutics and conventional chemotherapy for TNBC have been stymied
    due to the lack of specific targets. Moreover, the responses to chemotherapy in
    TNBC lack durability, partially accounting for the higher rates of relapse. Immunotherapy,
    notably immune-checkpoint blockade, has shown to improve survival and maintain
    robust antitumor responses in both hematologic and solid malignancies. Unlike
    lung cancer, melanoma, and bladder cancer, most breast cancers are not inherently
    immunogenic and typically have low T cell infiltration. However, among breast
    cancer subtypes, TNBC is characterized by greater tumor immune infiltrate and
    higher degree of stromal and intratumoral tumor-infiltrating lymphocytes (TILs),
    a predictive marker for responses to immunotherapy. Moreover, in TNBC, the high
    number of stromal TILs is predictive of more favorable survival outcomes and response
    to chemotherapy. Immunotherapy is being extensively explored in TNBC and clinical
    trials are showing some promising results. This article focuses on the rationale
    for immunotherapy in TNBC, to explore and discuss preclinical data, results from
    early clinical trials, and to summarize some ongoing trials. We will also discuss
    the potential application of immunotherapy in TNBC from a clinician's perspective.
- key: PMID29320732
  pmid: '29320732'
  title: Stabilization of NF-κB-Inducing Kinase Suppresses MLL-AF9-Induced Acute Myeloid
    Leukemia
  authors:
  - Yan Xiu
  - Qianze Dong
  - Qingchang Li
  - Fengyin Li
  - Nick Borcherding
  - Weizhou Zhang
  - Brendan Boyce
  - Hai-Hui Xue
  - Chen Zhao
  journal: Cell reports
  year: 2018
  volume: '22'
  number: '2'
  pages: 350-358
  doi: 10.1016/j.celrep.2017.12.055
  pubmed: https://pubmed.ncbi.nlm.nih.gov/29320732/
  abstract: Canonical NF-κB signaling is constitutively activated in acute myeloid
    leukemia (AML) stem cells and is required for maintenance of the self-renewal
    of leukemia stem cells (LSCs). However, any potential role for NF-κB non-canonical
    signaling in AML has been largely overlooked. Here, we report that stabilization
    of NF-κB-inducing kinase (NIK) suppresses AML. Mechanistically, stabilization
    of NIK activates NF-κB non-canonical signaling and represses NF-κB canonical signaling.
    In addition, stabilization of NIK-induced activation of NF-κB non-canonical signaling
    upregulates Dnmt3a and downregulates Mef2c, which suppresses and promotes AML
    development, respectively. Importantly, by querying the connectivity MAP using
    up- and downregulated genes that are present exclusively in NIK-stabilized LSCs,
    we discovered that verteporfin has anti-AML effects, suggesting that repurposing
    verteporfin to target myeloid leukemia is worth testing clinically. Our data provide
    a scientific rationale for developing small molecules to stabilize NIK specifically
    in myeloid leukemias as an attractive therapeutic option.
- key: PMID27708283
  pmid: '27708283'
  title: Obesity-associated NLRC4 inflammasome activation drives breast cancer progression
  authors:
  - Ryan Kolb
  - Liem Phan
  - Nicholas Borcherding
  - Yinghong Liu
  - Fang Yuan
  - Ann M Janowski
  - Qing Xie
  - Kathleen R Markan
  - Wei Li
  - Matthew J Potthoff
  - Enrique Fuentes-Mattei
  - Lesley G Ellies
  - C Michael Knudson
  - Mong-Hong Lee
  - Sai-Ching J Yeung
  - Suzanne L Cassel
  - Fayyaz S Sutterwala
  - Weizhou Zhang
  journal: Nature communications
  year: 2016
  volume: '7'
  number: ''
  pages: '13007'
  doi: 10.1038/ncomms13007
  pubmed: https://pubmed.ncbi.nlm.nih.gov/27708283/
  abstract: Obesity is associated with an increased risk of developing breast cancer
    and is also associated with worse clinical prognosis. The mechanistic link between
    obesity and breast cancer progression remains unclear, and there has been no development
    of specific treatments to improve the outcome of obese cancer patients. Here we
    show that obesity-associated NLRC4 inflammasome activation/ interleukin (IL)-1
    signalling promotes breast cancer progression. The tumour microenvironment in
    the context of obesity induces an increase in tumour-infiltrating myeloid cells
    with an activated NLRC4 inflammasome that in turn activates IL-1β, which drives
    disease progression through adipocyte-mediated vascular endothelial growth factor
    A (VEGFA) expression and angiogenesis. Further studies show that treatment of
    mice with metformin inhibits obesity-associated tumour progression associated
    with a marked decrease in angiogenesis. This report provides a causal mechanism
    by which obesity promotes breast cancer progression and lays out a foundation
    to block NLRC4 inflammasome activation or IL-1β signalling transduction that may
    be useful for the treatment of obese cancer patients.
- key: PMID27308558
  pmid: '27308558'
  title: Paracrine WNT5A signaling in healthy and neoplastic mammary tissue
  authors:
  - David Kusner
  - Nicholas Borcherding
  - Weizhou Zhang
  journal: Molecular & cellular oncology
  year: 2016
  volume: '3'
  number: '1'
  pages: e1040145
  doi: 10.1080/23723556.2015.1040145
  pubmed: https://pubmed.ncbi.nlm.nih.gov/27308558/
  abstract: Paracrine signaling between mammary epithelial cells has long been appreciated.
    Recently, we found that Wnt5a, a novel noncanonical Wnt ligand of luminal origin,
    counteracts canonical Wnt signaling in basal mammary epithelial cells through
    a paracrine pathway, inhibits the expansion of Erbb2-induced tumor-initiating
    cells, and suppresses tumor incidence and metastasis.
- key: PMID27152965
  pmid: '27152965'
  title: Calpain-5 Expression in the Retina Localizes to Photoreceptor Synapses
  authors:
  - Kellie A Schaefer
  - Marcus A Toral
  - Gabriel Velez
  - Allison J Cox
  - Sheila A Baker
  - Nicholas C Borcherding
  - Diana F Colgan
  - Vimala Bondada
  - Charles B Mashburn
  - Chen-Guang Yu
  - James W Geddes
  - Stephen H Tsang
  - Alexander G Bassuk
  - Vinit B Mahajan
  journal: Investigative ophthalmology & visual science
  year: 2016
  volume: '57'
  number: '6'
  pages: 2509-21
  doi: 10.1167/iovs.15-18680
  pubmed: https://pubmed.ncbi.nlm.nih.gov/27152965/
  abstract: 'PURPOSE: We characterize calpain-5 (CAPN5) expression in retinal and
    neuronal subcellular compartments. METHODS: CAPN5 gene variants were classified
    using the exome variant server, and RNA-sequencing was used to compare expression
    of CAPN5 mRNA in the mouse and human retina and in retinoblastoma cells. Expression
    of CAPN5 protein was ascertained in humans and mice in silico, in mouse retina
    by immunohistochemistry, and in neuronal cancer cell lines and fractionated central
    nervous system tissue extracts by Western analysis with eight antibodies targeting
    different CAPN5 regions. RESULTS: Most CAPN5 genetic variation occurs outside
    its protease core; and searches of cancer and epilepsy/autism genetic databases
    found no variants similar to hyperactivating retinal disease alleles. The mouse
    retina expressed one transcript for CAPN5 plus those of nine other calpains, similar
    to the human retina. In Y79 retinoblastoma cells, the level of CAPN5 transcript
    was very low. Immunohistochemistry detected CAPN5 expression in the inner and
    outer nuclear layers and at synapses in the outer plexiform layer. Western analysis
    of fractionated retinal extracts confirmed CAPN5 synapse localization. Western
    blots of fractionated brain neuronal extracts revealed distinct subcellular patterns
    and the potential presence of autoproteolytic CAPN5 domains. CONCLUSIONS: CAPN5
    is moderately expressed in the retina and, despite higher expression in other
    tissues, hyperactive disease mutants of CAPN5 only manifest as eye disease. At
    the cellular level, CAPN5 is expressed in several different functional compartments.
    CAPN5 localization at the photoreceptor synapse and with mitochondria explains
    the neural circuitry phenotype in human CAPN5 disease alleles.'
- key: PMID26167451
  pmid: '26167451'
  title: Transcriptome analysis of basal and luminal tumor-initiating cells in ErbB2-driven
    breast cancer
  authors:
  - Nicholas Borcherding
  - Nicholas Bormann
  - David Kusner
  - Ryan Kolb
  - Weizhou Zhang
  journal: Genomics data
  year: 2015
  volume: '4'
  number: ''
  pages: 119-122
  doi: 10.1016/j.gdata.2015.04.008
  pubmed: https://pubmed.ncbi.nlm.nih.gov/26167451/
  abstract: Breast cancer is the leading cause of cancer-related mortality for females
    worldwide.<sup>1</sup> Improving early screening strategies and understanding
    the events that lead to tumor initiation have led to demonstrable improvements
    in clinical outcome. Our previous work revealed a variance in the tumorigenic
    capacity between different mammary epithelial cell populations in an <i>MMTV-ErbB2</i>
    mouse model. In order to greater understand how different mammary epithelial cells
    influence the tumorigenic capacity in ErbB2-induced breast cancer, we transplanted
    different cell populations from pre-neoplastic <i>MMTV-ErbB2</i> female mice into
    recipient mice for tumorigenic study. We found that different mammary epithelial
    cells bear different tumorigenic potential even when induced by the same ErbB2
    proto-oncogene. To understand the difference in tumors formed from different epithelial
    cells, we performed gene expression profiling using these tumors (GSE64487). Several
    genes were further validated using real-time reverse transcription polymerase
    chain reaction (RT-PCR). Here we provide further details on the experimental methods
    and microarray analysis. This data provides a resource to further understanding
    how different mammary cell populations can initiate ErbB2-driven tumors and the
    role of these cell populations as putative tumor-initiating cells (TICs).
- key: PMID25769722
  pmid: '25769722'
  title: Paracrine WNT5A Signaling Inhibits Expansion of Tumor-Initiating Cells
  authors:
  - Nicholas Borcherding
  - David Kusner
  - Ryan Kolb
  - Qing Xie
  - Wei Li
  - Fang Yuan
  - Gabriel Velez
  - Ryan Askeland
  - Ronald J Weigel
  - Weizhou Zhang
  journal: Cancer research
  year: 2015
  volume: '75'
  number: '10'
  pages: 1972-82
  doi: 10.1158/0008-5472.CAN-14-2761
  pubmed: https://pubmed.ncbi.nlm.nih.gov/25769722/
  abstract: It is not well understood how paracrine communication between basal and
    luminal cell populations in the mammary gland affects tumorigenesis. During ErbB2-induced
    mammary tumorigenesis, enriched mammary stem cells that represent a subpopulation
    of basal cells exhibit enhanced tumorigenic capacity compared with the corresponding
    luminal progenitors. Transcript profiling of tumors derived from basal and luminal
    tumor-initiating cells (TIC) revealed preferential loss of the noncanonical Wnt
    ligand WNT5A in basal TIC-derived tumors. Heterozygous loss of WNT5A was correlated
    with shorter survival of breast cancer patients. In a mouse model of ErbB2-induced
    breast cancer, Wnt5a heterozygosity promoted tumor multiplicity and pulmonary
    metastasis. As a TGFβ substrate, luminal cell-produced WNT5A induced a feed-forward
    loop to activate SMAD2 in a RYK and TGFβR1-dependent manner to limit the expansion
    of basal TIC in a paracrine fashion, a potential explanation for the suppressive
    effect of WNT5A in mammary tumorigenesis. Our results identify the WNT5A/RYK module
    as a spatial regulator of the TGFβ-SMAD signaling pathway in the context of mammary
    gland development and carcinogenesis, offering a new perspective on tumor suppression
    provided by basal-luminal cross-talk in normal mammary tissue.
- key: PMID25860442
  pmid: '25860442'
  title: Bone marrow stromal antigen 2 (BST-2) DNA is demethylated in breast tumors
    and breast cancer cells
  authors:
  - Wadie D Mahauad-Fernandez
  - Nicholas C Borcherding
  - Weizhou Zhang
  - Chioma M Okeoma
  journal: PloS one
  year: 2015
  volume: '10'
  number: '4'
  pages: e0123931
  doi: 10.1371/journal.pone.0123931
  pubmed: https://pubmed.ncbi.nlm.nih.gov/25860442/
  abstract: 'BACKGROUND: Bone marrow stromal antigen 2 (BST-2) is a known anti-viral
    gene that has been recently identified to be overexpressed in many cancers, including
    breast cancer. BST-2 is critical for the invasiveness of breast cancer cells and
    the formation of metastasis in vivo. Although the regulation of BST-2 in immune
    cells is unraveling, it is unknown how BST-2 expression is regulated in breast
    cancer. We hypothesized that meta-analyses of BST-2 gene expression and BST-2
    DNA methylation profiles would illuminate mechanisms regulating elevated BST-2
    expression in breast tumor tissues and cells. MATERIALS AND METHODS: We performed
    comprehensive meta-analyses of BST-2 gene expression and BST-2 DNA methylation
    in The Cancer Genome Atlas (TCGA) and various Gene Expression Omnibus (GEO) datasets.
    BST-2 expression levels and BST-2 DNA methylation status at specific CpG sites
    on the BST-2 gene were compared for various breast tumor molecular subtypes and
    breast cancer cell lines. RESULTS: We show that BST-2 gene expression is inversely
    associated with the methylation status at specific CpG sites in primary breast
    cancer specimens and breast cancer cell lines. BST-2 demethylation is significantly
    more prevalent in primary tumors and cancer cells than in normal breast tissues
    or normal mammary epithelial cells. Demethylation of the BST-2 gene significantly
    correlates with its mRNA expression. These studies provide the initial evidence
    that significant differences exist in BST-2 DNA methylation patterns between breast
    tumors and normal breast tissues, and that BST-2 expression patterns in tumors
    and cancer cells correlate with hypomethylated BST-2 DNA. CONCLUSION: Our study
    suggests that the DNA methylation pattern and expression of BST-2 may play a role
    in disease pathogenesis and could serve as a biomarker for the diagnosis of breast
    cancer.'
- key: PMID25359465
  pmid: '25359465'
  title: Characterization of a novel mouse model with genetic deletion of CD177
  authors:
  - Qing Xie
  - Julia Klesney-Tait
  - Kathy Keck
  - Corey Parlet
  - Nicholas Borcherding
  - Ryan Kolb
  - Wei Li
  - Lorraine Tygrett
  - Thomas Waldschmidt
  - Alicia Olivier
  - Songhai Chen
  - Guang-Hui Liu
  - Xiangrui Li
  - Weizhou Zhang
  journal: Protein & cell
  year: 2015
  volume: '6'
  number: '2'
  pages: 117-26
  doi: 10.1007/s13238-014-0109-1
  pubmed: https://pubmed.ncbi.nlm.nih.gov/25359465/
  abstract: Neutrophils play an essential role in the innate immune response to infection.
    Neutrophils migrate from the vasculature into the tissue in response to infection.
    Recently, a neutrophil cell surface receptor, CD177, was shown to help mediate
    neutrophil migration across the endothelium through interactions with PECAM1.
    We examined a publicly available gene array dataset of CD177 expression from human
    neutrophils following pulmonary endotoxin instillation. Among all 22,214 genes
    examined, CD177 mRNA was the most upregulated following endotoxin exposure. The
    high level of CD177 expression is also maintained in airspace neutrophils, suggesting
    a potential involvement of CD177 in neutrophil infiltration under infectious diseases.
    To determine the role of CD177 in neutrophils in vivo, we constructed a CD177-genetic
    knockout mouse model. The mice with homozygous deletion of CD177 have no discernible
    phenotype and no significant change in immune cells, other than decreased neutrophil
    counts in peripheral blood. We examined the role of CD177 in neutrophil accumulation
    using a skin infection model with Staphylococcus aureus. CD177 deletion reduced
    neutrophil counts in inflammatory skin caused by S. aureus. Mechanistically we
    found that CD177 deletion in mouse neutrophils has no significant impact in CXCL1/KC-
    or fMLP-induced migration, but led to significant cell death. Herein we established
    a novel genetic mouse model to study the role of CD177 and found that CD177 plays
    an important role in neutrophils.
- key: PMID24752542
  pmid: '24752542'
  title: ROR1, an embryonic protein with an emerging role in cancer biology
  authors:
  - Nicholas Borcherding
  - David Kusner
  - Guang-Hui Liu
  - Weizhou Zhang
  journal: Protein & cell
  year: 2014
  volume: '5'
  number: '7'
  pages: 496-502
  doi: 10.1007/s13238-014-0059-7
  pubmed: https://pubmed.ncbi.nlm.nih.gov/24752542/
  abstract: Receptor tyrosine kinase-like orphan receptor 1 (ROR1) is a member of
    the ROR family consisting of ROR1 and ROR2. RORs contain two distinct extracellular
    cysteine-rich domains and one transmembrane domain. Within the intracellular portion,
    ROR1 possesses a tyrosine kinase domain, two serine/threonine-rich domains and
    a proline-rich domain. RORs have been studied in the context of embryonic patterning
    and neurogenesis through a variety of homologs. These physiologic functions are
    dichotomous based on the requirement of the kinase domain. A growing literature
    has established ROR1 as a marker for cancer, such as in CLL and other blood malignancies.
    In addition, ROR1 is critically involved in progression of a number of blood and
    solid malignancies. ROR1 has been shown to inhibit apoptosis, potentiate EGFR
    signaling, and induce epithelial-mesenchymal transition (EMT). Importantly, ROR1
    is only detectable in embryonic tissue and generally absent in adult tissue, making
    the protein an ideal drug target for cancer therapy.
- key: PMID25393878
