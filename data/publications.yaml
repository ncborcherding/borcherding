  journal: Science (New York, N.Y.)
  year: 2023
  volume: '379'
  number: '6633'
  pages: eabg2752
  doi: 10.1126/science.abg2752
  pubmed: https://pubmed.ncbi.nlm.nih.gov/36795805/
  abstract: The induction of proinflammatory T cells by dendritic cell (DC) subtypes
    is critical for antitumor responses and effective immune checkpoint blockade (ICB)
    therapy. Here, we show that human CD1c<sup>+</sup>CD5<sup>+</sup> DCs are reduced
    in melanoma-affected lymph nodes, with CD5 expression on DCs correlating with
    patient survival. Activating CD5 on DCs enhanced T cell priming and improved survival
    after ICB therapy. CD5<sup>+</sup> DC numbers increased during ICB therapy, and
    low interleukin-6 (IL-6) concentrations promoted their de novo differentiation.
    Mechanistically, CD5 expression by DCs was required to generate optimally protective
    CD5<sup>hi</sup> T helper and CD8<sup>+</sup> T cells; further, deletion of CD5
    from T cells dampened tumor elimination in response to ICB therapy in vivo. Thus,
    CD5<sup>+</sup> DCs are an essential component of optimal ICB therapy.
- key: PMID37285399
  pmid: '37285399'
  title: Tumor-associated fibrosis impairs immune surveillance and response to immune
    checkpoint blockade in non-small cell lung cancer
  authors:
  - Brett H Herzog
  - John M Baer
  - Nicholas Borcherding
  - Natalie L Kingston
  - Jad I Belle
  - Brett L Knolhoff
  - Graham D Hogg
  - Faiz Ahmad
  - Liang-I Kang
  - Jessica Petrone
  - Chieh-Yu Lin
  - Ramaswamy Govindan
  - David G DeNardo
  journal: Science translational medicine
  year: 2023
  volume: '15'
  number: '699'
  pages: eadh8005
  doi: 10.1126/scitranslmed.adh8005
  pubmed: https://pubmed.ncbi.nlm.nih.gov/37285399/
  abstract: Non-small cell lung cancer (NSCLC) is a leading cause of cancer-related
    deaths. Immune checkpoint blockade has improved survival for many patients with
    NSCLC, but most fail to obtain long-term benefit. Understanding the factors leading
    to reduced immune surveillance in NSCLC is critical in improving patient outcomes.
    Here, we show that human NSCLC harbors large amounts of fibrosis that correlates
    with reduced T cell infiltration. In murine NSCLC models, the induction of fibrosis
    led to increased lung cancer progression, impaired T cell immune surveillance,
    and failure of immune checkpoint blockade efficacy. Associated with these changes,
    we observed that fibrosis leads to numerically and functionally impaired dendritic
    cells and altered macrophage phenotypes that likely contribute to immunosuppression.
    Within cancer-associated fibroblasts, distinct changes within the <i>Col13a1</i>-expressing
    population suggest that these cells produce chemokines to recruit macrophages
    and regulatory T cells while limiting recruitment of dendritic cells and T cells.
    Targeting fibrosis through transforming growth factor-β receptor signaling overcame
    the effects of fibrosis to enhance T cell responses and improved the efficacy
    of immune checkpoint blockade but only in the context of chemotherapy. Together,
    these data suggest that fibrosis in NSCLC leads to reduced immune surveillance
    and poor responsiveness to checkpoint blockade and highlight antifibrotic therapies
    as a candidate strategy to overcome immunotherapeutic resistance.
- key: PMID37654486
  pmid: '37654486'
  title: Molecular techniques drive cutting edge advancements in management of cutaneous
    T cell lymphoma
  authors:
  - Mitchell N Lefebvre
  - Nicholas Borcherding
  - Ryan J Reis
  - Eric Mou
  - Vincent Liu
  - Ali Jabbari
  journal: Frontiers in immunology
  year: 2023
  volume: '14'
  number: ''
  pages: '1228563'
  doi: 10.3389/fimmu.2023.1228563
  pubmed: https://pubmed.ncbi.nlm.nih.gov/37654486/
  abstract: Cutaneous 5T cell lymphoma (CTCL), characterized by malignant T cells
    infiltrating the skin with potential for dissemination, remains a challenging
    disease to diagnose and treat due to disease heterogeneity, treatment resistance,
    and lack of effective and standardized diagnostic and prognostic clinical tools.
    Currently, diagnosis of CTCL practically relies on clinical presentation, histopathology,
    and immunohistochemistry. These methods are collectively fraught with limitations
    in sensitivity and specificity. Fortunately, recent advances in flow cytometry,
    polymerase chain reaction, high throughput sequencing, and other molecular techniques
    have shown promise in improving diagnosis and treatment of CTCL. Examples of these
    advances include T cell receptor clonotyping via sequencing to detect CTCL earlier
    in the disease course and single-cell RNA sequencing to identify gene expression
    patterns that commonly drive CTCL pathogenesis. Experience with these techniques
    has afforded novel insights which may translate into enhanced diagnostic and therapeutic
    approaches for CTCL.
- key: PMID37236195
  pmid: '37236195'
  title: Context-dependent activation of STING-interferon signaling by CD11b agonists
    enhances anti-tumor immunity
  authors:
  - Xiuting Liu
  - Graham D Hogg
  - Chong Zuo
  - Nicholas C Borcherding
  - John M Baer
  - Varintra E Lander
  - Liang-I Kang
  - Brett L Knolhoff
  - Faiz Ahmad
  - Robin E Osterhout
  - Anna V Galkin
  - Jean-Marie Bruey
  - Laura L Carter
  - Cedric Mpoy
  - Kiran R Vij
  - Ryan C Fields
  - Julie K Schwarz
  - Haeseong Park
  - Vineet Gupta
  - David G DeNardo
  journal: Cancer cell
  year: 2023
  volume: '41'
  number: '6'
  pages: 1073-1090.e12
  doi: 10.1016/j.ccell.2023.04.018
  pubmed: https://pubmed.ncbi.nlm.nih.gov/37236195/
  abstract: Chronic activation of inflammatory pathways and suppressed interferon
    are hallmarks of immunosuppressive tumors. Previous studies have shown that CD11b
    integrin agonists could enhance anti-tumor immunity through myeloid reprograming,
    but the underlying mechanisms remain unclear. Herein we find that CD11b agonists
    alter tumor-associated macrophage (TAM) phenotypes by repressing NF-κB signaling
    and activating interferon gene expression simultaneously. Repression of NF-κB
    signaling involves degradation of p65 protein and is context independent. In contrast,
    CD11b agonism induces STING/STAT1 pathway-mediated interferon gene expression
    through FAK-mediated mitochondrial dysfunction, with the magnitude of induction
    dependent on the tumor microenvironment and amplified by cytotoxic therapies.
    Using tissues from phase I clinical studies, we demonstrate that GB1275 treatment
    activates STING and STAT1 signaling in TAMs in human tumors. These findings suggest
    potential mechanism-based therapeutic strategies for CD11b agonists and identify
    patient populations more likely to benefit.
- key: PMID37790414
  pmid: '37790414'
  title: Antigen-specific CD4<sup>+</sup> T cells exhibit distinct transcriptional
    phenotypes in the lymph node and blood following vaccination in humans
  authors:
  - Philip Mudd
  - Nicholas Borcherding
  - Wooseob Kim
  - Michael Quinn
  - Fangjie Han
  - Julian Zhou
  - Alexandria Sturtz
  - Aaron Schmitz
  - Tingting Lei
  - Stefan Schattgen
