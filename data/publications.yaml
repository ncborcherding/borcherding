  journal: Nature communications
  year: 2021
  volume: '12'
  number: '1'
  pages: '5764'
  doi: 10.1038/s41467-021-26091-4
  pubmed: https://pubmed.ncbi.nlm.nih.gov/34599187/
  abstract: Regulatory T (Treg) cells are one of the major immunosuppressive cell
    types in cancer and a potential target for immunotherapy, but targeting tumor-infiltrating
    (TI) Treg cells has been challenging. Here, using single-cell RNA sequencing of
    immune cells from renal clear cell carcinoma (ccRCC) patients, we identify two
    distinct transcriptional fates for TI Treg cells, Fate-1 and Fate-2. The Fate-1
    signature is associated with a poorer prognosis in ccRCC and several other solid
    cancers. CD177, a cell surface protein normally expressed on neutrophil, is specifically
    expressed on Fate-1 TI Treg cells in several solid cancer types, but not on other
    TI or peripheral Treg cells. Mechanistically, blocking CD177 reduces the suppressive
    activity of Treg cells in vitro, while Treg-specific deletion of Cd177 leads to
    decreased tumor growth and reduced TI Treg frequency in mice. Our results thus
    uncover a functional CD177<sup>+</sup> TI Treg population that may serve as a
    target for TI Treg-specific immunotherapy.
- key: PMID34831009
  pmid: '34831009'
  title: Updates on Immunotherapy and Immune Landscape in Renal Clear Cell Carcinoma
  authors:
  - Myung-Chul Kim
  - Zeng Jin
  - Ryan Kolb
  - Nicholas Borcherding
  - Jonathan Alexander Chatzkel
  - Sara Moscovita Falzarano
  - Weizhou Zhang
  journal: Cancers
  year: 2021
  volume: '13'
  number: '22'
  pages: ''
  doi: 10.3390/cancers13225856
  pubmed: https://pubmed.ncbi.nlm.nih.gov/34831009/
  abstract: Several clinicopathological features of clear cell renal cell carcinomas
    (ccRCC) contribute to make an "atypical" cancer, including resistance to chemotherapy,
    sensitivity to anti-angiogenesis therapy and ICIs despite a low mutational burden,
    and CD8<sup>+</sup> T cell infiltration being the predictor for poor prognosis-normally
    CD8<sup>+</sup> T cell infiltration is a good prognostic factor in cancer patients.
    These "atypical" features have brought researchers to investigate the molecular
    and immunological mechanisms that lead to the increased T cell infiltrates despite
    relatively low molecular burdens, as well as to decipher the immune landscape
    that leads to better response to ICIs. In the present study, we summarize the
    past and ongoing pivotal clinical trials of immunotherapies for ccRCC, emphasizing
    the potential molecular and cellular mechanisms that lead to the success or failure
    of ICI therapy. Single-cell analysis of ccRCC has provided a more thorough and
    detailed understanding of the tumor immune microenvironment and has facilitated
    the discovery of molecular biomarkers from the tumor-infiltrating immune cells.
    We herein will focus on the discussion of some major immune cells, including T
    cells and tumor-associated macrophages (TAM) in ccRCC. We will further provide
    some perspectives of using molecular and cellular biomarkers derived from these
    immune cell types to potentially improve the response rate to ICIs in ccRCC patients.
- key: PMID33523451
  pmid: '33523451'
  title: Understanding and Targeting Human Cancer Regulatory T Cells to Improve Therapy
  authors:
  - H Ryan Kolb
  - Nicholas Borcherding
  - Weizhou Zhang
  journal: Advances in experimental medicine and biology
  year: 2021
  volume: '1278'
  number: ''
  pages: 229-256
  doi: 10.1007/978-981-15-6407-9_12
  pubmed: https://pubmed.ncbi.nlm.nih.gov/33523451/
  abstract: Regulatory T cells (Tregs) are critical in maintaining immune homeostasis
    under various pathophysiological conditions. A growing body of evidence demonstrates
    that Tregs play an important role in cancer progression and that they do so by
    suppressing cancer-directed immune responses. Tregs have been targeted for destruction
    by exploiting antibodies against and small-molecule inhibitors of several molecules
    that are highly expressed in Tregs-including immune checkpoint molecules, chemokine
    receptors, and metabolites. To date, these strategies have had only limited antitumor
    efficacy, yet they have also created significant risk of autoimmunity because
    most of them do not differentiate Tregs in tumors from those in normal tissues.
    Currently, immune checkpoint inhibitor (ICI)-based cancer immunotherapies have
    revolutionized cancer treatment, but the resistance to ICI is common and the elevation
    of Tregs is one of the most important mechanisms. Therapeutic strategies that
    can selectively eliminate Tregs in the tumor (i.e. therapies that do not run the
    risk of causing autoimmunity by affecting normal tissue), are urgently needed
    for the development of cancer immunotherapies. This chapter discusses specific
    properties of human Tregs under the context of cancer and the various ways to
    target Treg for cancer immunotherapy.
- key: PMID33627663
  pmid: '33627663'
  title: Proteolysis-targeting chimera against BCL-X<sub>L</sub> destroys tumor-infiltrating
    regulatory T cells
  authors:
  - Ryan Kolb
  - Umasankar De
  - Sajid Khan
  - Yuewan Luo
  - Myung-Chul Kim
  - Haijun Yu
  - Chaoyan Wu
  - Jiao Mo
  - Xin Zhang
  - Peiyi Zhang
  - Xuan Zhang
  - Nicholas Borcherding
  - Daniel Koppel
  - Yang-Xin Fu
  - Song Guo Zheng
  - Dorina Avram
  - Guangrong Zheng
  - Daohong Zhou
  - Weizhou Zhang
  journal: Nature communications
  year: 2021
  volume: '12'
  number: '1'
  pages: '1281'
  doi: 10.1038/s41467-021-21573-x
  pubmed: https://pubmed.ncbi.nlm.nih.gov/33627663/
  abstract: Regulatory T cells (Tregs) play an important role in maintaining immune
    homeostasis and, within tumors, their upregulation is common and promotes an immunosuppressive
    microenvironment. Therapeutic strategies that can eliminate Tregs in the tumor
    (i.e., therapies that do not run the risk of affecting normal tissues), are urgently
    needed for the development of cancer immunotherapies. Here we report our discovery
    of B-cell lymphoma extra-large (BCL-X<sub>L</sub>) as a potential molecular target
    of tumor-infiltrating (TI) Tregs. We show that pharmacological degradation of
    BCL-X<sub>L</sub> using a newly developed platelet-sparing BCL-X<sub>L</sub> Proteolysis-targeting
    chimera (PROTAC) induces the apoptosis of TI-Tregs and the activation of TI-CD8<sup>+</sup>
    T cells. Moreover, these activities result in an effective suppression of syngeneic
    tumor growth in immunocompetent, but not in immunodeficient or CD8<sup>+</sup>
    T cell-depleted mice. Notably, treatment with BCL-X<sub>L</sub> PROTAC does not
    cause detectable damage within several normal tissues or thrombocytopenia. These
    findings identify BCL-X<sub>L</sub> as a target in the elimination of TI-Tregs
    as a component of cancer immunotherapies, and that the BCL-X<sub>L</sub>-specific
    PROTAC has the potential to be developed as a therapeutic for cancer immunotherapy.
- key: PMID35008370
  pmid: '35008370'
  title: Natural and Synthetic Estrogens in Chronic Inflammation and Breast Cancer
  authors:
  - Chandra K Maharjan
  - Jiao Mo
  - Lei Wang
  - Myung-Chul Kim
  - Sameul Wang
  - Nicholas Borcherding
  - Praveen Vikas
  - Weizhou Zhang
  journal: Cancers
  year: 2021
  volume: '14'
  number: '1'
  pages: ''
  doi: 10.3390/cancers14010206
  pubmed: https://pubmed.ncbi.nlm.nih.gov/35008370/
  abstract: The oncogenic role of estrogen receptor (ER) signaling in breast cancer
    has long been established. Interaction of estrogen with estrogen receptor (ER)
    in the nucleus activates genomic pathways of estrogen signaling. In contrast,
    estrogen interaction with the cell membrane-bound G-protein-coupled estrogen receptor
    (GPER) activates the rapid receptor-mediated signaling transduction cascades.
    Aberrant estrogen signaling enhances mammary epithelial cell proliferation, survival,
    and angiogenesis, hence is an important step towards breast cancer initiation
    and progression. Meanwhile, a growing number of studies also provide evidence
    for estrogen's pro- or anti-inflammatory roles. As other articles in this issue
    cover classic ER and GPER signaling mediated by estrogen, this review will discuss
    the crucial mechanisms by which estrogen signaling influences chronic inflammation
    and how that is involved in breast cancer. Xenoestrogens acquired from plant diet
    or exposure to industrial products constantly interact with and alter innate estrogen
    signaling at various levels. As such, they can modulate chronic inflammation and
    breast cancer development. Natural xenoestrogens generally have anti-inflammatory
    properties, which is consistent with their chemoprotective role in breast cancer.
    In contrast, synthetic xenoestrogens are proinflammatory and carcinogenic compounds
    that can increase the risk of breast cancer. This article also highlights important
    xenoestrogens with a particular focus on their role in inflammation and breast
    cancer. Improved understanding of the complex relationship between estrogens,
    inflammation, and breast cancer will guide clinical research on agents that could
    advance breast cancer prevention and therapy.
- key: PMID34161770
  pmid: '34161770'
  title: Single-cell BCR and transcriptome analysis after influenza infection reveals
    spatiotemporal dynamics of antigen-specific B cells
  authors:
  - Nimitha R Mathew
  - Jayalal K Jayanthan
  - Ilya V Smirnov
  - Jonathan L Robinson
  - Hannes Axelsson
  - Sravya S Nakka
  - Aikaterini Emmanouilidi
