  journal: Cell reports
  year: 2021
  volume: '35'
  number: '12'
  pages: '109286'
  doi: 10.1016/j.celrep.2021.109286
  pubmed: https://pubmed.ncbi.nlm.nih.gov/34161770/
  abstract: B cell responses are critical for antiviral immunity. However, a comprehensive
    picture of antigen-specific B cell differentiation, clonal proliferation, and
    dynamics in different organs after infection is lacking. Here, by combining single-cell
    RNA and B cell receptor (BCR) sequencing of antigen-specific cells in lymph nodes,
    spleen, and lungs after influenza infection in mice, we identify several germinal
    center (GC) B cell subpopulations and organ-specific differences that persist
    over the course of the response. We discover transcriptional differences between
    memory cells in lungs and lymphoid organs and organ-restricted clonal expansion.
    Remarkably, we find significant clonal overlap between GC-derived memory and plasma
    cells. By combining BCR-mutational analyses with monoclonal antibody (mAb) expression
    and affinity measurements, we find that memory B cells are highly diverse and
    can be selected from both low- and high-affinity precursors. By linking antigen
    recognition with transcriptional programming, clonal proliferation, and differentiation,
    these finding provide important advances in our understanding of antiviral immunity.
- key: PMID33913810
  pmid: '33913810'
  title: TAZ-CAMTA1 and YAP-TFE3 alter the TAZ/YAP transcriptome by recruiting the
    ATAC histone acetyltransferase complex
  authors:
  - Nicole Merritt
  - Keith Garcia
  - Dushyandi Rajendran
  - Zhen-Yuan Lin
  - Xiaomeng Zhang
  - Katrina A Mitchell
  - Nicholas Borcherding
  - Colleen Fullenkamp
  - Michael S Chimenti
  - Anne-Claude Gingras
  - Kieran F Harvey
  - Munir R Tanas
  journal: eLife
  year: 2021
  volume: '10'
  number: ''
  pages: ''
  doi: 10.7554/eLife.62857
  pubmed: https://pubmed.ncbi.nlm.nih.gov/33913810/
  abstract: Epithelioid hemangioendothelioma (EHE) is a vascular sarcoma that metastasizes
    early in its clinical course and lacks an effective medical therapy. The TAZ-CAMTA1
    and YAP-TFE3 fusion proteins are chimeric transcription factors and initiating
    oncogenic drivers of EHE. A combined proteomic/genetic screen in human cell lines
    identified YEATS2 and ZZZ3, components of the <u>A</u>da<u>2a-c</u>ontaining histone
    acetyltransferase (ATAC) complex, as key interactors of both fusion proteins despite
    the dissimilarity of the C terminal fusion partners CAMTA1 and TFE3. Integrative
    next-generation sequencing approaches in human and murine cell lines showed that
    the fusion proteins drive a unique transcriptome by simultaneously hyperactivating
    a TEAD-based transcriptional program and modulating the chromatin environment
    via interaction with the ATAC complex. Interaction of the ATAC complex with both
    fusion proteins indicates that it is a key oncogenic driver and unifying enzymatic
    therapeutic target for this sarcoma. This study presents an approach to mechanistically
    dissect how chimeric transcription factors drive the formation of human cancers.
- key: PMID34348975
  pmid: '34348975'
  title: Comprehensive Immunologic Evaluation of Bronchoalveolar Lavage Samples from
    Human Patients with Moderate and Severe Seasonal Influenza and Severe COVID-19
  authors:
  - Daniel Reynolds
  - Cristina Vazquez Guillamet
  - Aaron Day
  - Nicholas Borcherding
  - Rodrigo Vazquez Guillamet
  - José Alberto Choreño-Parra
  - Stacey L House
  - Jane A O'Halloran
  - Joaquín Zúñiga
  - Ali H Ellebedy
  - Derek E Byers
  - Philip A Mudd
  journal: 'Journal of immunology (Baltimore, Md. : 1950)'
  year: 2021
  volume: '207'
  number: '5'
  pages: 1229-1238
  doi: 10.4049/jimmunol.2100294
  pubmed: https://pubmed.ncbi.nlm.nih.gov/34348975/
  abstract: Infection with severe acute respiratory syndrome coronavirus-2 (SARS-CoV-2)
    or seasonal influenza may lead to respiratory failure requiring intubation and
    mechanical ventilation. The pathophysiology of this respiratory failure is attributed
    to local immune dysregulation, but how the immune response to viral infection
    in the lower airways of the human lung differs between individuals with respiratory
    failure and those without is not well understood. We used quantitative multiparameter
    flow cytometry and multiplex cytokine assays to evaluate matched blood and bronchoalveolar
    lavage (BAL) samples from control human subjects, subjects with symptomatic seasonal
    influenza who did not have respiratory failure, and subjects with severe seasonal
    influenza or SARS-CoV-2 infection with respiratory failure. We find that severe
    cases are associated with an influx of nonclassical monocytes, activated T cells,
    and plasmablast B cells into the lower airways. Cytokine concentrations were not
    elevated in the lower airways of moderate influenza patients compared with controls;
    however, 28 of 35 measured cytokines were significantly elevated in severe influenza,
    severe SARS-CoV-2 infection, or both. We noted the largest elevations in IL-6,
    IP-10, MCP-1, and IL-8. IL-1 family cytokines and RANTES were higher in severe
    influenza infection than severe SARS-CoV-2 infection. Interestingly, only the
    concentration of IP-10-correlated between blood and BAL during severe infection.
    Our results demonstrate inflammatory immune dysregulation in the lower airways
    during severe viral pneumonia that is distinct from lower airway responses seen
    in human patients with symptomatic, but not severe, illness and suggest that measurement
    of blood IP-10 concentration may predict this unique dysregulation.
- key: PMID34594558
  pmid: '34594558'
  title: Hypoglycemia secondary to insulinoma masking the onset of type 1 diabetes
    in an adolescent
  authors:
