  number: ''
  pages: ''
  doi: 10.21203/rs.3.rs-3304466/v1
  pubmed: https://pubmed.ncbi.nlm.nih.gov/37790414/
  abstract: SARS-CoV-2 infection and mRNA vaccination induce robust CD4<sup>+</sup>
    T cell responses that are critical for the development of protective immunity.
    Here, we evaluated spike-specific CD4<sup>+</sup> T cells in the blood and draining
    lymph node (dLN) of human subjects following BNT162b2 mRNA vaccination using single-cell
    transcriptomics. We analyze multiple spike-specific CD4<sup>+</sup> T cell clonotypes,
    including novel clonotypes we define here using Trex, a new deep learning-based
    reverse epitope mapping method integrating single-cell T cell receptor (TCR) sequencing
    and transcriptomics to predict antigen-specificity. Human dLN spike-specific T
    follicular helper cells (T<sub>FH</sub>) exhibited distinct phenotypes, including
    germinal center (GC)-T<sub>FH</sub> and IL-10<sup>+</sup> T<sub>FH</sub>, that
    varied over time during the GC response. Paired TCR clonotype analysis revealed
    tissue-specific segregation of circulating and dLN clonotypes, despite numerous
    spike-specific clonotypes in each compartment. Analysis of a separate SARS-CoV-2
    infection cohort revealed circulating spike-specific CD4<sup>+</sup> T cell profiles
    distinct from those found following BNT162b2 vaccination. Our findings provide
    an atlas of human antigen-specific CD4<sup>+</sup> T cell transcriptional phenotypes
    in the dLN and blood following vaccination or infection.
