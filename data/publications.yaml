  journal: Cancer discovery
  year: 2022
  volume: '12'
  number: '12'
  pages: 2774-2799
  doi: 10.1158/2159-8290.CD-22-0192
  pubmed: https://pubmed.ncbi.nlm.nih.gov/36165893/
  abstract: 'The effects of radiotherapy (RT) on tumor immunity in pancreatic ductal
    adenocarcinoma (PDAC) are not well understood. To better understand if RT can
    prime antigen-specific T-cell responses, we analyzed human PDAC tissues and mouse
    models. In both settings, there was little evidence of RT-induced T-cell priming.
    Using in vitro systems, we found that tumor-stromal components, including fibroblasts
    and collagen, cooperate to blunt RT efficacy and impair RT-induced interferon
    signaling. Focal adhesion kinase (FAK) inhibition rescued RT efficacy in vitro
    and in vivo, leading to tumor regression, T-cell priming, and enhanced long-term
    survival in PDAC mouse models. Based on these data, we initiated a clinical trial
    of defactinib in combination with stereotactic body RT in patients with PDAC (NCT04331041).
    Analysis of PDAC tissues from these patients showed stromal reprogramming mirroring
    our findings in genetically engineered mouse models. Finally, the addition of
    checkpoint immunotherapy to RT and FAK inhibition in animal models led to complete
    tumor regression and long-term survival. SIGNIFICANCE: Checkpoint immunotherapeutics
    have not been effective in PDAC, even when combined with RT. One possible explanation
    is that RT fails to prime T-cell responses in PDAC. Here, we show that FAK inhibition
    allows RT to prime tumor immunity and unlock responsiveness to checkpoint immunotherapy.
    This article is highlighted in the In This Issue feature, p. 2711.'
- key: PMID35243228
  pmid: '35243228'
  title: Dissecting the cellular landscape and transcriptome network in viral myocarditis
    by single-cell RNA sequencing
  authors:
  - Ninaad Lasrado
  - Nicholas Borcherding
  - Rajkumar Arumugam
  - Timothy K Starr
  - Jay Reddy
  journal: iScience
  year: 2022
  volume: '25'
  number: '3'
  pages: '103865'
  doi: 10.1016/j.isci.2022.103865
  pubmed: https://pubmed.ncbi.nlm.nih.gov/35243228/
  abstract: Coxsackievirus B3 (CVB3)-induced myocarditis is commonly employed to study
    viral pathogenesis in mice. Chronically affected mice may develop dilated cardiomyopathy,
    which may involve the mediation of immune and nonimmune cells. To dissect this
    complexity, we performed single-cell RNA sequencing on heart cells from healthy
    and myocarditic mice, leading us to note significant proportions of myeloid cells,
    T cells, and fibroblasts. Although the transcriptomes of myeloid cells were mainly
    of M2 phenotype, the Th17 cells, CTLs, and Treg cells had signatures critical
    for cytotoxic functions. Fibroblasts were heterogeneous expressing genes important
    in fibrosis and regulation of inflammation and immune responses. The intercellular
    communication networks revealed unique interactions and signaling pathways in
    the cardiac cellulome, whereas myeloid cells and T cells had upregulated unique
    transcription factors modulating cardiac remodeling functions. Together, our data
    suggest that M2 cells, T cells, and fibroblasts may cooperatively or independently
    participate in the pathogenesis of viral myocarditis.
