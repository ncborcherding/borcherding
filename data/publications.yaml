  journal: Frontiers in medicine
  year: 2022
  volume: '9'
  number: ''
  pages: '849990'
  doi: 10.3389/fmed.2022.849990
  pubmed: https://pubmed.ncbi.nlm.nih.gov/35402439/
  abstract: 'PURPOSE: To investigate IL-17 related mechanisms for developing dry eye
    disease in the Pinkie mouse strain with a loss of function RXRα mutation. METHODS:
    Measures of dry eye disease were assessed in the cornea and conjunctiva. Expression
    profiling was performed by single-cell RNA sequencing (scRNA-seq) to compare gene
    expression in conjunctival immune cells. Conjunctival immune cells were immunophenotyped
    by flow cytometry and confocal microscopy. The activity of RXRα ligand 9-cis retinoic
    acid (RA) was evaluated in cultured monocytes and γδ T cells. RESULTS: Compared
    to wild type (WT) C57BL/6, Pinkie has increased signs of dry eye disease, including
    decreased tear volume, corneal barrier disruption, corneal/conjunctival cornification
    and goblet cell loss, and corneal vascularization, opacification, and ulceration
    with aging. ScRNA-seq of conjunctival immune cells identified γδ T cells as the
    predominant IL-17 expressing population in both strains and there is a 4-fold
    increased percentage of γδ T cells in Pinkie. Compared to WT, IL-17a, and IL-17f
    significantly increased in Pinkie with conventional T cells and γδ T cells as
    the major producers. Flow cytometry revealed an increased number of IL-17<sup>+</sup>
    γδ T cells in Pinkie. Tear concentration of the IL-17 inducer IL-23 is significantly
    higher in Pinkie. 9-cis RA treatment suppresses stimulated IL-17 production by
    γδ T and stimulatory activity of monocyte supernatant on γδ T cell IL-17 production.
    Compared to WT bone marrow chimeras, Pinkie chimeras have increased IL-17<sup>+</sup>
    γδ T cells in the conjunctiva after desiccating stress and anti-IL-17 treatment
    suppresses dry eye induced corneal MMP-9 production/activity and conjunctival
    goblet cell loss. CONCLUSION: These findings indicate that RXRα suppresses generation
    of dry eye disease-inducing IL-17 producing lymphocytes s in the conjunctiva and
    identifies RXRα as a potential therapeutic target in dry eye.'
- key: PMID35361907
  pmid: '35361907'
  title: Single-cell transcriptional profiling of murine conjunctival immune cells
    reveals distinct populations expressing homeostatic and regulatory genes
  authors:
  - Jehan Alam
  - Ghasem Yazdanpanah
  - Rinki Ratnapriya
  - Nicholas Borcherding
  - Cintia S de Paiva
  - DeQuan Li
  - Stephen C Pflugfelder
  journal: Mucosal immunology
  year: 2022
  volume: '15'
  number: '4'
  pages: 620-628
  doi: 10.1038/s41385-022-00507-w
  pubmed: https://pubmed.ncbi.nlm.nih.gov/35361907/
  abstract: 'Immune cells in the exposed conjunctiva mucosa defend against environmental
    and microbial stresses. Expression profiling by single-cell RNA sequencing was
    performed to identify conjunctival immune cell populations expressing homeostatic
    and regulatory genes. Fourteen distinct clusters were identified, including myeloid
    cells (neutrophils, monocytes, macrophages), dendritic cells (DC), and lymphoid
    cells (B, T, γδT, ILC2, and NK) lineages. Novel neutrophil [lipocalin (Lcn2) high
    and low), and MHCII<sup>lo</sup> macrophage (MP) clusters were identified. More
    than half of the cells map to myeloid and dendritic cell populations with differential
    expression profiles that include genes with homeostatic and regulatory functions:
    Serpinb2 (MHCII<sup>lo</sup> macrophage), Apoe (monocyte), Cd209a (macrophage),
    Cst3 (cDC1), and IL4i1 in migratory DC (mDC). ILC2 expresses the goblet cell trophic
    factor IL-13. Suppressed inflammatory and activated anti-inflammatory/regulatory
    pathways were observed in certain myeloid and DC populations. Confocal immunolocalization
    of identity markers showed mDC (CCR7, FASCIN1) located on or within the conjunctival
    epithelium. Monocyte, macrophage, cDC1 and IL-13/IL-5<sup>+</sup> ILC2 were located
    below the conjunctival epithelium and goblet cells. This study found distinct
    immune cell populations in the conjunctiva and identified cells expressing genes
    with known homeostatic and immunoregulatory functions.'
- key: PMID36070756
  pmid: '36070756'
  title: Dietary lipids inhibit mitochondria transfer to macrophages to divert adipocyte-derived
    mitochondria into the blood
  authors:
  - Nicholas Borcherding
  - Wentong Jia
  - Rocky Giwa
  - Rachael L Field
  - John R Moley
  - Benjamin J Kopecky
  - Mandy M Chan
  - Bin Q Yang
