  volume: '34'
  number: '4'
  pages: 533-548.e12
  doi: 10.1016/j.cmet.2022.02.016
  pubmed: https://pubmed.ncbi.nlm.nih.gov/35305295/
  abstract: Recent findings have demonstrated that mitochondria can be transferred
    between cells to control metabolic homeostasis. Although the mitochondria of brown
    adipocytes comprise a large component of the cell volume and undergo reorganization
    to sustain thermogenesis, it remains unclear whether an intercellular mitochondrial
    transfer occurs in brown adipose tissue (BAT) and regulates adaptive thermogenesis.
    Herein, we demonstrated that thermogenically stressed brown adipocytes release
    extracellular vesicles (EVs) that contain oxidatively damaged mitochondrial parts
    to avoid failure of the thermogenic program. When re-uptaken by parental brown
    adipocytes, mitochondria-derived EVs reduced peroxisome proliferator-activated
    receptor-γ signaling and the levels of mitochondrial proteins, including UCP1.
    Their removal via the phagocytic activity of BAT-resident macrophages is instrumental
    in preserving BAT physiology. Depletion of macrophages in vivo causes the abnormal
    accumulation of extracellular mitochondrial vesicles in BAT, impairing the thermogenic
    response to cold exposure. These findings reveal a homeostatic role of tissue-resident
    macrophages in the mitochondrial quality control of BAT.
- key: PMID36289122
  pmid: '36289122'
  title: Isoflavone consumption reduces inflammation through modulation of phenylalanine
    and lipid metabolism
  authors:
  - Rachel L Shrode
  - Nicole Cady
  - Samantha N Jensen
  - Nicholas Borcherding
  - Ashutosh K Mangalam
  journal: 'Metabolomics : Official journal of the Metabolomic Society'
  year: 2022
  volume: '18'
  number: '11'
  pages: '84'
  doi: 10.1007/s11306-022-01944-1
  pubmed: https://pubmed.ncbi.nlm.nih.gov/36289122/
  abstract: 'INTRODUCTION: Phytoestrogens found in soy, fruits, peanuts, and other
    legumes, have been identified as metabolites capable of providing beneficial effects
    in multiple pathological conditions due to their ability to mimic endogenous estrogen.
    Interestingly, the health-promoting effects of some phytoestrogens, such as isoflavones,
    are dependent on the presence of specific gut bacteria. Specifically, gut bacteria
    can metabolize isoflavones into equol, which has a higher affinity for endogenous
    estrogen receptors compared to dietary isoflavones. We have previously shown that
    patients with multiple sclerosis (MS), a neuroinflammatory disease, lack gut bacteria
    that are able to metabolize phytoestrogen. Further, we have validated the importance
    of both isoflavones and phytoestrogen-metabolizing gut bacteria in disease protection
    utilizing an animal model of MS. Specifically, we have shown that an isoflavone-rich
    diet can protect from neuroinflammatory diseases, and that protection was dependent
    on the ability of gut bacteria to metabolize isoflavones into equol. Additionally,
    mice on a diet with isoflavones showed an anti-inflammatory response compared
    to the mice on a diet lacking isoflavones. However, it is unknown how isoflavones
    and/or equol mediates their protective effects, especially their effects on host
    metabolite levels. OBJECTIVES: In this study, we utilized untargeted metabolomics
    to identify metabolites found in plasma that were modulated by the presence of
    dietary isoflavones. RESULTS: We found that the consumption of isoflavones increased
    anti-inflammatory monounsaturated fatty acids and beneficial polyunsaturated fatty
    acids while reducing pro-inflammatory glycerophospholipids, sphingolipids, phenylalanine
    metabolism, and arachidonic acid derivatives. CONCLUSION: Isoflavone consumption
    alters the systemic metabolic landscape through concurrent increases in monounsaturated
    fatty acids and beneficial polyunsaturated fatty acids plus reduction in pro-inflammatory
    metabolites and pathways. This highlights a potential mechanism by which an isoflavone
    diet may modulate immune-mediated disease.'
- key: PMID34192529
  pmid: '34192529'
  title: SARS-CoV-2 mRNA vaccination induces functionally diverse antibodies to NTD,
    RBD, and S2
  authors:
  - Fatima Amanat
  - Mahima Thapa
  - Tinting Lei
  - Shaza M Sayed Ahmed
  - Daniel C Adelsberg
  - Juan Manuel Carreño
  - Shirin Strohmeier
