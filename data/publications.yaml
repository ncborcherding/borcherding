- key: PMID41662591
  pmid: '41662591'
  title: Multiomic study of cutaneous T-cell lymphoma reveals single-cell clonal evolution
    in progression and therapy resistance
  authors:
  - Hannah K Dorando
  - Jared M Andrews
  - Oam U Khatavkar
  - Nicholas C Borcherding
  - Yulia Korshunova
  - Gabriela Hakeman
  - Rodrigo Panigassi
  - Phuong Vo
  - Ruei-Yuan Tu
  - Diep Tran
  - Chaz C Quinn
  - Jennifer A Schmidt
  - Jahnavi Aluri
  - Michael T Harmon
  - Marcus P Watkins
  - Anastasia Frank
  - Megan A Cooper
  - Amy C Musiek
  - Neha Mehta-Shah
  - Jacqueline E Payton
  journal: Blood
  year: 2026
  volume: '147'
  number: '21'
  pages: 2503-2517
  doi: 10.1182/blood.2025029012
  pubmed: https://pubmed.ncbi.nlm.nih.gov/41662591/
  abstract: Cutaneous T-cell lymphoma (CTCL) remains a challenging disease due to
    its significant heterogeneity, therapy resistance, and relentless progression.
    Multiomics technologies offer the potential to provide uniquely precise views
    of disease progression and response to therapy. Here, we present a comprehensive
    multiomics view of CTCL clonal evolution, incorporating exome, whole-genome, epigenome,
    bulk, single-cell T-cell receptor, and single-cell RNA sequencing of 99 clinically
    annotated serial skin, peripheral blood, and lymph node samples from 34 patients
    with CTCL. We leveraged this extensive data set to define the molecular underpinnings
    of CTCL progression in individual patients at single-cell resolution with the
    goal of identifying clinically useful biomarkers and therapeutic targets. Our
    studies identified recurrent progression-associated clonal genomic alterations;
    we highlight mutation of CCR4, phosphoinositide 3-kinase inhibitor signaling,
    and programmed cell death protein 1 (PD-1) checkpoint pathways as evasion tactics
    deployed by malignant T cells. We identified a gain-of-function mutation in STAT3
    (D661Y) and demonstrated, using cleavage under targets and release using nuclease
    (CUT&RUN) and RNA sequencing, that it enhances binding to and transcription of
    genes in Rho GTPase pathways. With our previous work implicating this pathway
    in histone deacetylase inhibitor-resistant CTCL, these data provide further support
    for a previously unrecognized role for Rho GTPase pathway dysregulation in CTCL
    progression. Recurrent progression-associated mutations were common in the epigenetic
    modifier EZH2, suggesting that EZH2 inhibition may benefit patients with CTCL.
    Our findings support an approach in which genomic analysis is widely used for
    improved disease monitoring, biomarker-informed clinical trial design, and genome-guided
    therapeutic decision-making. Moreover, these molecular changes present new opportunities
    for therapeutic targeting in this challenging and incurable cancer.
- key: PMID39765189
  pmid: '39765189'
  title: Linking tumor immune infiltration to enhanced longevity in recurrence-free
    breast cancer
  authors:
  - L Angelats
  - L Paré
  - C Rubio-Perez
  - E Sanfeliu
  - A González
  - E Seguí
  - G Villacampa
  - M Marín-Aguilera
  - S Pernas
  - B Conte
  - V Albarrán-Fernández
  - O Martínez-Sáez
  - Á Aguirre
  - P Galván
  - A Fernandez-Martinez
  - S Cobo
  - M Rey
  - A Martínez-Romero
  - B Walbaum
  - F Schettini
  - M Vidal
  - W Buckingham
  - M Muñoz
  - B Adamo
  - Y Agrawal
  - S Guedan
  - T Pascual
  - J Agudo
  - M Grzelak
  - N Borcherding
  - H Heyn
  - A Vivancos
  - J S Parker
  - P Villagrasa
  - C M Perou
  - A Prat
  - F Brasó-Maristany
  journal: ESMO open
  year: 2025
  volume: '10'
  number: '1'
  pages: '104109'
  doi: 10.1016/j.esmoop.2024.104109
  pubmed: https://pubmed.ncbi.nlm.nih.gov/39765189/
  abstract: 'BACKGROUND: The infiltration of tumor-infiltrating B cells and plasma
    cells in early-stage breast cancer has been associated with a reduced risk of
    distant metastasis. However, the influence of B-cell tumor infiltration on overall
    patient survival remains unclear. MATERIALS AND METHODS: This study explored the
    relationship between an antitumor immune response, measured by a 14-gene B-cell/immunoglobulin
    (IGG) signature, and mortality risk in 9638 breast cancer patients across three
    datasets. Associations with tumor subtype, stage, and age were examined. IGG was
    characterized using spatial GeoMx profiling and single-cell RNA sequencing, and
    its relationship with tertiary lymphoid structures (TLSs) was evaluated. The predictive
    value of each of the 14 IGG genes for B-cell receptor (BCR) and T-cell receptor
    (TCR) clonality and longevity was also assessed, along with its association with
    longevity in other cancer types. RESULTS: High IGG signature expression was significantly
    associated with a 41%-47% reduction in death risk in breast cancer survivors (P
    < 0.001), regardless of age, tumor stage, or subtype. Similar associations were
    observed in other cancers, including melanoma. In breast cancer, the IGG signature
    was significantly linked to overall survival without relapse in patients aged
    41-70 years at diagnosis. Additionally, IGG expression correlated with the presence
    of TLSs and higher B- and T-cell polyclonality. A specific subset of seven IGG
    genes strongly correlated with BCR and TCR clonality, with predictive power for
    identifying clonality and improved longevity, especially when combining two of
    these genes. CONCLUSIONS: This study uncovers a significant link between immune
    gene expression in tumors and extended longevity in breast cancer survivors, even
    in the absence of recurrence. The IGG signature, particularly its key gene subset,
    emerges as a powerful marker of sustained antitumor immunity and overall patient
    fitness. These findings pave the way for personalized treatment strategies that
    enhance both survival and long-term health outcomes.'
- key: PMID39529512
  pmid: '39529512'
  title: Type I Interferon Drives a Cellular State Inert to TCR-Stimulation and Could
    Impede Effective T-Cell Differentiation in Cancer
  authors:
  - Dillon Corvino
  - Martin Batstone
  - Brett G M Hughes
  - Tim Kempchen
  - Susanna S Ng
  - Nazhifah Salim
  - Franziska Schneppenheim
  - Denise Rommel
  - Ananthi Kumar
  - Sally Pearson
  - Jason Madore
  - Lambross T Koufariotis
  - Lisa Maria Steinheuer
  - Dilan Pathirana
  - Kevin Thurley
  - Michael Hölzel
  - Nicholas Borcherding
  - Matthias Braun
  - Tobias Bald
  journal: European journal of immunology
  year: 2025
  volume: '55'
  number: '1'
  pages: e202451371
  doi: 10.1002/eji.202451371
  pubmed: https://pubmed.ncbi.nlm.nih.gov/39529512/
  abstract: 'BACKGROUND: Head and neck squamous cell carcinoma (HNSCC) is linked to
    human papillomavirus (HPV) infection. HPV-positive and HPV-negative HNSCC exhibit
    distinct molecular and clinical characteristics. Although checkpoint inhibitors
    have shown efficiency in recurrent/metastatic HNSCC, response variability persists
    regardless of HPV status. This study aimed to explore the CD8<sup>+</sup> T-cell
    landscape in HPV-negative HNSCC. METHODS: We performed simultaneous single-cell
    RNA and TCR sequencing of CD8<sup>+</sup> tumor-infiltrating lymphocytes (TILs)
    from treatment-naïve HPV-negative HNSCC patients. Additionally, cells were stimulated
    ex vivo, which allowed for the tracking of clonal transcriptomic responses. RESULTS:
    Our analysis identified a subset of CD8<sup>+</sup> TILs highly enriched for interferon-stimulated
    genes (ISG). TCR analysis revealed ISG cells are clonally related to a population
    of granzyme K (GZMK)-expressing cells. However, unlike GZMK cells, which exhibited
    rapid effector-like phenotypes following stimulation, ISG cells were transcriptionally
    inert. Additionally, ISG cells showed specific enrichment within tumor and were
    found across multiple tumor entities. CONCLUSIONS: ISG-enriched CD8<sup>+</sup>
    TILs are a consistent feature of various tumor entities. These cells are poorly
    understood but possess characteristics that may impact antitumor immunity. Understanding
    the unique properties and functionality of ISG cells could offer innovative treatment
    approaches to improve patient outcomes in HPV-negative HNSCC and other cancer
    types.'
- key: PMID40841076
  pmid: '40841076'
  title: Antigen and eplet coverage by representative solid-phase immunoassays for
    anti-HLA antibody screen
  authors:
  - Patricia V Hernandez
  - Manli Shen
  - Mei San Tang
  - Michiko Taniguchi
  - Nicholas Borcherding
  - Chang Liu
  journal: Human immunology
  year: 2025
  volume: '86'
  number: '4'
  pages: '111339'
  doi: 10.1016/j.humimm.2025.111339
  pubmed: https://pubmed.ncbi.nlm.nih.gov/40841076/
  abstract: Solid-phase immunoassays (SPIs) are the current standard of care for detecting
    and identifying anti-HLA antibodies in transplantation. However, whether SPIs
    with different configurations provide comprehensive antigen and eplet coverage
    has not been documented in the literature. We systematically compared four commercial
    SPI panels - Mixed, PRA (Panel Reactive Antibody), SAB (Single Antigen Bead),
    and ExPlex - to assess their coverage of antigens and eplets cataloged in the
    HLA Eplet Registry. Our results show overlapping and variable antigen and eplet
    representation across these assays. Out of a total of 252 class I and 260 class
    II eplets in the HLA Eplet Registry, 251 (99.6 %) and 260 (100 %) were covered
    by one or more assays; 209 (82.9 %) class I and 189 (72.7 %) of class II eplets
    were covered by all four assays. All antibody-verified eplets in Class I antigens
    are represented in three or more assays, whereas two Class II eplets were exclusive
    to SAB. Although ExPlex did not significantly increase the number of eplets represented
    beyond the SAB panel, it expanded the diversity of eplets within unique antigenic
    contexts. We also examined the relationship between eplet dose per bead and antibody
    reactivity in the PRA assay. Positive correlations were observed between bead-level
    eplet numbers and mean fluorescence intensity (MFI) in a collection of sera with
    82LR (Bw4) or 80 N (Bw6) eplet patterns. Our findings indicate broad coverage
    of HLA eplets by current SPIs, which offer acceptable antigenic coverage for pre-transplant
    immune risk screening. We also share the R script to enable ongoing analyses and
    monitoring of antigen and eplet coverage in future screening reagents.
- key: PMID41488614
  pmid: '41488614'
  title: High-resolution single-cell RNA sequencing using canFam4 reveals novel immune
    subsets and checkpoint programs in healthy dogs
  authors:
  - Myung-Chul Kim
  - Taeeun Gu
  - Hyeewon Seo
  - Yewon Moon
  - Nicholas Borcherding
  - Ryan Kolb
  - Yubin Kim
  - Youngmin Yun
  - Woo-Jin Song
  - Chung-Young Lee
  - Hyun Je Kim
  - Weizhou Zhang
  journal: Frontiers in immunology
  year: 2025
  volume: '16'
  number: ''
  pages: '1680437'
  doi: 10.3389/fimmu.2025.1680437
  pubmed: https://pubmed.ncbi.nlm.nih.gov/41488614/
  abstract: 'INTRODUCTION: Single-cell RNA sequencing (scRNA-seq) enables high-resolution
    profiling of immune heterogeneity. Although previous studies have mapped the single-cell
    transcriptomic atlases of peripheral leukocytes in healthy dogs, the identification
    and functional characterization of distinct immune subsets remain incomplete.
    METHODS: We constructed a single-cell atlas of peripheral leukocytes from six
    healthy small-breed dogs using the 10x Genomics platform and the updated canFam4
    genome. RESULTS AND DISCUSSION: Analysis of 30,040 high-quality transcriptomes
    revealed 51 distinct immune subsets, including <i>CD14</i> <sup>+</sup> <i>CD33</i>
    <sup>+</sup> monocytes, <i>XCR1</i> <sup>+</sup> <i>CD1D</i> <sup>+</sup> dendritic
    cells, <i>CEACAM1</i> <sup>+</sup> <i>CD24</i> <sup>+</sup> neutrophils, and <i>IL32</i>
    <sup>+</sup> <i>BATF</i> <sup>+</sup> regulatory T cells, which were underrepresented
    in canFam3.1-based studies. Interferon-enriched <i>CD14</i> <sup>+</sup> monocytes
    and <i>CD4</i> <sup>+</sup> T subsets associated with myxomatous mitral valve
    disease were also identified. Functional enrichment analyses suggested that <i>PDCD1</i>
    is associated with attenuated TCR signaling, whereas <i>LAG3</i> was associated
    with malate metabolism pathways in <i>CD4</i> <sup>+</sup> T cells and reduced
    <i>TBX21</i> expression in <i>CD8</i> <sup>+</sup> T cells linked to antiviral
    responses. <i>CD274</i>, which encodes PD-L1 was linked to IL-10 production in
    neutrophils, and <i>CTLA4</i> represented an initial activation of double-negative
    T subsets. T cell exhaustion scores and proliferative fractions varied across
    cohorts, reflecting differences in environmental antigenic exposures. CONCLUSION:
    To our knowledge, this study represents the first comprehensive, gene-resolved
    single-cell analysis to reveal immunoregulatory checkpoint mechanisms underlying
    immune homeostasis in healthy dogs. Our dataset will serve as a valuable resource
    for future comparative and translational immunology research in dogs.'
- key: PMID40802750
  pmid: '40802750'
  title: Somatic CRISPR tumorigenesis and multiomic analysis reveal a pentose phosphate
    pathway disruption vulnerability in MPNSTs
  authors:
  - Gavin R McGivney
  - Qierra R Brockman
  - Nicholas Borcherding
  - Amanda Scherer
  - Adam J Rauckhorst
  - Wade R Gutierrez
  - Shane R Solst
  - Collin D Heer
  - Akshaya Warrier
  - Warren Floyd
  - David G Kirsch
  - Vickie L Knepper-Adrian
  - Emily A Laverty
  - Grace A Roughton
  - Douglas R Spitz
  - Eric B Taylor
  - Rebecca D Dodd
  journal: Science advances
  year: 2025
  volume: '11'
  number: '33'
  pages: eadu2906
  doi: 10.1126/sciadv.adu2906
  pubmed: https://pubmed.ncbi.nlm.nih.gov/40802750/
  abstract: Malignant peripheral nerve sheath tumors (MPNSTs) are aggressive and chemo-resistant
    sarcomas with poor survival rates. Loss of <i>CDKN2A</i> or <i>P53</i> following
    NF1 disruption is a key event in MPNST development. Here, we used CRISPR-Cas9
    somatic tumorigenesis in mice to identify transcriptomic and metabolomic features
    distinguishing <i>CDKN2A</i>- versus <i>P53</i>-deleted MPNSTs. Convergent, multiomic
    analyses revealed that <i>CDKN2A</i>-deleted MPNSTs are especially dependent on
    the pentose phosphate pathway (PPP) and NADPH metabolism for growth and viability.
    Disruption of glucose-6-phosphate dehydrogenase (G6PD), the PPP rate-limiting
    enzyme, slowed <i>CDKN2A</i>-deleted MPNST growth and sensitized MPNSTs to standard-of-care
    chemotherapy. Knockdown of the redox-regulated transcription factor NRF2 slowed
    MPNST growth and decreased G6PD transcription. Analysis of patient MPNSTs identified
    a NRF2 gene signature correlating with tumor transformation. Furthermore, G6PD
    and NRF2 expression in PanCancer TCGA samples correlates with patient survival.
    This work identifies NRF2-PPP dependency as a targetable vulnerability in these
    difficult-to-treat MPNSTs, particularly in the <i>NF1/CDKN2A</i>-deleted majority.
- key: PMID40022134
  pmid: '40022134'
  title: Myelin-reactive CD8<sup>+</sup> T cells influence conventional dendritic
    cell subsets towards a mature and regulatory phenotype in experimental autoimmune
    encephalomyelitis
  authors:
  - Mohit Upadhye
  - Connor R Wilhelm
  - Kai J Rogers
  - Chakrapani Vemulawada
  - Nicholas Borcherding
  - Alexander W Boyden
  - Kevin L Legge
  - Nitin J Karandikar
  journal: Journal of neuroinflammation
  year: 2025
  volume: '22'
  number: '1'
  pages: '54'
  doi: 10.1186/s12974-025-03377-8
  pubmed: https://pubmed.ncbi.nlm.nih.gov/40022134/
  abstract: Multiple sclerosis (MS), an autoimmune demyelinating disease of the central
    nervous system, is modeled in mice as experimental autoimmune encephalomyelitis
    (EAE). While CD4<sup>+</sup> T cells, primarily Th1 and Th17 subsets, drive disease
    pathogenesis, the exact function of CD8<sup>+</sup> T cells remains unclear. We
    previously demonstrated that adoptively transferred myelin-reactive CD8<sup>+</sup>
    T cells (PLP-CD8) prevent EAE induction and suppress ongoing disease through the
    engagement of MHC Class-I in recipient mice. Here, we show that PLP-CD8 induce
    regulatory changes in both subsets of conventional dendritic cells (cDC1 and CD11b<sup>+</sup>
    cDC) in vivo and in vitro. Adoptively transferred PLP-CD8 promoted both cDC subsets
    to adopt a mature and regulatory phenotype with an anti-inflammatory cytokine
    profile and a reduced capacity to support CD4<sup>+</sup> T cell proliferation.
    In vitro, PLP-CD8 induced similar phenotypic changes in both cDC subsets in an
    antigen-specific, dose-dependent manner. PLP-CD8 directly interacted with cDC1
    and indirectly influenced CD11b<sup>+</sup> cDC through paracrine signaling. Notably,
    direct interaction with PLP-CD8 had detrimental effects on CD11b<sup>+</sup> cDC.
    Single-cell RNA sequencing revealed upregulation of key immunoregulatory genes,
    such as Foxo3, in both cDC subsets with enrichment of pathways involved in immune
    regulation and T cell differentiation. Our study highlights a novel mechanism
    in which myelin-reactive CD8<sup>+</sup> T cells directly interact with cDC1 and
    modulate CD11b<sup>+</sup> cDC through paracrine mechanisms to induce mature,
    regulatory dendritic cells, which leads to inhibited CD4<sup>+</sup> T cell responses
    and reduced EAE pathogenesis.
- key: PMID39626355
  pmid: '39626355'
  title: TIFAB modulates metabolic pathways in KMT2A::MLLT3-induced AML through HNF4A
  authors:
  - Yang Wang
  - Yan Xiu
  - Qianze Dong
  - Jinming Zhao
  - Kelao Neumbo
  - Masaru Miyagi
  - Nicholas Borcherding
  - Lin Fu
  - Havana De Celis
  - Nicolas Pintozzi
  - Daniel T Starczynowski
  - Chen Zhao
  journal: Blood advances
  year: 2025
  volume: '9'
  number: '4'
  pages: 844-855
  doi: 10.1182/bloodadvances.2024013446
  pubmed: https://pubmed.ncbi.nlm.nih.gov/39626355/
  abstract: Tumor necrosis factor (TNF) receptor-associated factor (TRAF)-interacting
    protein with forkhead-associated domain B (TIFAB), an inhibitor of NF-κB signaling,
    plays critical roles in hematopoiesis, myelodysplastic neoplasms, and leukemia.
    We previously demonstrated that Tifab enhances KMT2A::MLLT3-driven acute myeloid
    leukemia (AML) by either upregulating Hoxa9 or through ubiquitin-specific peptidase
    15-mediated downregulation of p53 signaling. In this study, we show that Tifab
    deletion in KMT2A::MLLT3-induced AML impairs leukemia stem/progenitor cell (LSPC)
    engraftment, glucose uptake, and mitochondrial function. Gene set enrichment analysis
    reveals that Tifab deletion downregulates MYC, HOXA9/MEIS1, mTORC1 signaling,
    and genes involved in glycolysis and oxidative phosphorylation. By comparing genes
    upregulated in TIFAB-overexpressing LSPCs with those downregulated upon Tifab
    deletion, we identify hepatocyte nuclear factor 4 alpha (Hnf4a) as a key TIFAB
    target, regulated through the inhibition of NF-κB component RelB, which suppresses
    Hnf4a in leukemia cells. HNF4A, a nuclear receptor involved in organ development,
    metabolism, and tumorigenesis, rescues the metabolic defects caused by Tifab deletion
    and enhances leukemia cell engraftment. Conversely, Hnf4a knockdown attenuates
    TIFAB-mediated enhancement of LSPC function. These findings highlight the critical
    role of the TIFAB-HNF4A axis in KMT2A::MLLT3-induced AML and uncover a novel regulator
    in leukemia biology.
- key: PMID40577285
  pmid: '40577285'
  title: 'scRepertoire 2: Enhanced and efficient toolkit for single-cell immune profiling'
  authors:
  - Qile Yang
  - Ksenia R Safina
  - Kieu Diem Quynh Nguyen
  - Zewen Kelvin Tuong
  - Nicholas Borcherding
  journal: PLoS computational biology
  year: 2025
  volume: '21'
  number: '6'
  pages: e1012760
  doi: 10.1371/journal.pcbi.1012760
  pubmed: https://pubmed.ncbi.nlm.nih.gov/40577285/
  abstract: Single-cell adaptive immune receptor repertoire sequencing (scAIRR-seq)
    and single-cell RNA sequencing (scRNA-seq) provide a transformative approach to
    profiling immune responses at unprecedented resolution across diverse pathophysiologic
    contexts. This work presents scRepertoire 2, a substantial update to our R package
    for analyzing and visualizing single-cell immune receptor data. This new version
    introduces an array of features designed to enhance both the depth and breadth
    of immune receptor analysis, including improved workflows for clonotype tracking,
    repertoire diversity metrics, and novel visualization modules that facilitate
    longitudinal and comparative studies. Additionally, scRepertoire 2 offers seamless
    integration with contemporary single-cell analysis frameworks like Seurat and
    SingleCellExperiment, allowing users to conduct end-to-end single-cell immune
    profiling with transcriptomic data. Performance optimizations in scRepertoire
    2 resulted in a 85.1% increase in speed and a 91.9% reduction in memory usage
    from the first version over the range repertoire size tested in benchmarking,
    addressing the demands of the ever-increasing size and scale of single-cell studies.
    This release marks an advancement in single cell immunogenomics, equipping researchers
    with a robust toolset to uncover immune dynamics in health and disease.
- key: PMID40687995
  pmid: '40687995'
  title: '<i>dandelionR</i>: Single-cell immune repertoire trajectory analysis in
    R'
  authors:
  - Jiawei Yu
  - Xiaohan Xu
  - Nicholas Borcherding
  - Zewen Kelvin Tuong
  journal: Computational and structural biotechnology journal
  year: 2025
  volume: '27'
  number: ''
  pages: 2890-2897
  doi: 10.1016/j.csbj.2025.06.047
  pubmed: https://pubmed.ncbi.nlm.nih.gov/40687995/
  abstract: Integration of single-cell RNA-sequencing (scRNA-seq) and adaptive immune
    receptor (AIR) sequencing (scVDJ-seq) is extremely powerful in studying lymphocyte
    development. A python-based package, <i>Dandelion</i>, introduced the VDJ-feature
    space method, which addresses the challenge of integrating single-cell AIR data
    with gene expression data and enhances trajectory analysis results. However, no
    R-based equivalent or similar methods currently exist. To fill this gap, we present
    <i>dandelionR</i>, an R implementation of <i>Dandelion</i>'s trajectory analysis
    workflow, bringing the VDJ feature space construction and trajectory analysis
    using diffusion maps and absorbing Markov chains to R, offering a new option for
    scRNA-seq and scVDJ-seq analysis to R users.
- key: PMID39164479
  pmid: '39164479'
  title: CD4<sup>+</sup> T cells exhibit distinct transcriptional phenotypes in the
    lymph nodes and blood following mRNA vaccination in humans
  authors:
  - Nicholas Borcherding
  - Wooseob Kim
  - Michael Quinn
  - Fangjie Han
  - Julian Q Zhou
  - Alexandria J Sturtz
  - Aaron J Schmitz
  - Tingting Lei
  - Stefan A Schattgen
  - Michael K Klebert
  - Teresa Suessen
  - William D Middleton
  - Charles W Goss
  - Chang Liu
  - Jeremy Chase Crawford
  - Paul G Thomas
  - Sharlene A Teefey
  - Rachel M Presti
  - Jane A O'Halloran
  - Jackson S Turner
  - Ali H Ellebedy
  - Philip A Mudd
  journal: Nature immunology
  year: 2024
  volume: '25'
  number: '9'
  pages: 1731-1741
  doi: 10.1038/s41590-024-01888-9
  pubmed: https://pubmed.ncbi.nlm.nih.gov/39164479/
  abstract: Severe acute respiratory syndrome coronavirus 2 (SARS-CoV-2) infection
    and mRNA vaccination induce robust CD4<sup>+</sup> T cell responses. Using single-cell
    transcriptomics, here, we evaluated CD4<sup>+</sup> T cells specific for the SARS-CoV-2
    spike protein in the blood and draining lymph nodes (dLNs) of individuals 3 months
    and 6 months after vaccination with the BNT162b2 mRNA vaccine. We analyzed 1,277
    spike-specific CD4<sup>+</sup> T cells, including 238 defined using Trex, a deep
    learning-based reverse epitope mapping method to predict antigen specificity.
    Human dLN spike-specific CD4<sup>+</sup> follicular helper T (T<sub>FH</sub>)
    cells exhibited heterogeneous phenotypes, including germinal center CD4<sup>+</sup>
    T<sub>FH</sub> cells and CD4<sup>+</sup>IL-10<sup>+</sup> T<sub>FH</sub> cells.
    Analysis of an independent cohort of SARS-CoV-2-infected individuals 3 months
    and 6 months after infection found spike-specific CD4<sup>+</sup> T cell profiles
    in blood that were distinct from those detected in blood 3 months and 6 months
    after BNT162b2 vaccination. Our findings provide an atlas of human spike-specific
    CD4<sup>+</sup> T cell transcriptional phenotypes in the dLNs and blood following
    SARS-CoV-2 vaccination or infection.
- key: PMID38637691
  pmid: '38637691'
  title: Single-cell immune repertoire analysis
  authors:
  - Sergio E Irac
  - Megan Sioe Fei Soon
  - Nicholas Borcherding
  - Zewen Kelvin Tuong
  journal: Nature methods
  year: 2024
  volume: '21'
  number: '5'
  pages: 777-792
  doi: 10.1038/s41592-024-02243-4
  pubmed: https://pubmed.ncbi.nlm.nih.gov/38637691/
  abstract: Single-cell T cell and B cell antigen receptor-sequencing data analysis
    can potentially perform in-depth assessments of adaptive immune cells that inform
    on understanding immune cell development to tracking clonal expansion in disease
    and therapy. However, it has been extremely challenging to analyze and interpret
    T cells and B cells and their adaptive immune receptor repertoires at the single-cell
    level due to not only the complexity of the data but also the underlying biology.
    In this Review, we delve into the computational breakthroughs that have transformed
    the analysis of single-cell T cell and B cell antigen receptor-sequencing data.
- key: PMID39376916
  pmid: '39376916'
  title: Leveraging single-cell transcriptomic data to uncover immune suppressive
    cancer cell subsets in triple-negative canine breast cancers
  authors:
  - Myung-Chul Kim
  - Nicholas Borcherding
  - Woo-Jin Song
  - Ryan Kolb
  - Weizhou Zhang
  journal: Frontiers in veterinary science
  year: 2024
  volume: '11'
  number: ''
  pages: '1434617'
  doi: 10.3389/fvets.2024.1434617
  pubmed: https://pubmed.ncbi.nlm.nih.gov/39376916/
  abstract: 'INTRODUCTION: Single-cell RNA sequencing (scRNA-seq) has become an essential
    tool for uncovering the complexities of various physiological and immunopathological
    conditions in veterinary medicine. However, there is currently limited information
    on immune-suppressive cancer subsets in canine breast cancers. In this study,
    we aimed to identify and characterize immune-suppressive subsets of triple-negative
    canine breast cancer (TNBC) by utilizing integrated scRNA-seq data from published
    datasets. METHODS: Published scRNA-seq datasets, including data from six groups
    of 30 dogs, were subjected to integrated bioinformatic analysis. RESULTS: Immune
    modulatory TNBC subsets were identified through functional enrichment analysis
    using immune-suppressive gene sets, including those associated with anti-inflammatory
    and M2-like macrophages. Key immune-suppressive signaling, such as viral infection,
    angiogenesis, and leukocyte chemotaxis, was found to play a role in enabling TNBC
    to evade immune surveillance. In addition, interactome analysis revealed significant
    interactions between distinct subsets of cancer cells and effector T cells, suggesting
    potential T-cell suppression. DISCUSSION: The present study demonstrates a versatile
    and scalable approach to integrating and analyzing scRNA-seq data, which successfully
    identified immune-modulatory subsets of canine TNBC. It also revealed potential
    mechanisms through which TNBC promotes immune evasion in dogs. These findings
    are crucial for advancing the understanding of the immune pathogenesis of canine
    TNBC and may aid in the development of new immune-based therapeutic strategies.'
- key: PMID38641668
  pmid: '38641668'
  title: Single-cell transcriptomics unveil profiles and interplay of immune subsets
    in rare autoimmune childhood Sjögren's disease
  authors:
  - Myung-Chul Kim
  - Umasankar De
  - Nicholas Borcherding
  - Lei Wang
  - Joon Paek
  - Indraneel Bhattacharyya
  - Qing Yu
  - Ryan Kolb
  - Theodore Drashansky
  - Akaluck Thatayatikom
  - Weizhou Zhang
  - Seunghee Cha
  journal: Communications biology
  year: 2024
  volume: '7'
  number: '1'
  pages: '481'
  doi: 10.1038/s42003-024-06124-6
  pubmed: https://pubmed.ncbi.nlm.nih.gov/38641668/
  abstract: Childhood Sjögren's disease represents critically unmet medical needs
    due to a complete lack of immunological and molecular characterizations. This
    study presents key immune cell subsets and their interactions in the periphery
    in childhood Sjögren's disease. Here we show that single-cell RNA sequencing identifies
    the subsets of IFN gene-enriched monocytes, CD4<sup>+</sup> T effector memory,
    and XCL1<sup>+</sup> NK cells as potential key players in childhood Sjögren's
    disease, and especially in those with recurrent parotitis, which is the chief
    symptom prompting clinical visits from young children. A unique cluster of monocytes
    with type I and II IFN-related genes is identified in childhood Sjögren's disease,
    compared to the age-matched control. In vitro regulatory T cell functional assay
    demonstrates intact functionality in childhood Sjögren's disease in contrast to
    reduced suppression in adult Sjögren's disease. Mapping this transcriptomic landscape
    and interplay of immune cell subsets will expedite the understanding of childhood
    Sjögren's disease pathogenesis and set the foundation for precision medicine.
- key: PMID38776511
  pmid: '38776511'
  title: CD8+ T-cell differentiation and dysfunction inform treatment response in
    acute myeloid leukemia
  authors:
  - Francesco Mazziotta
  - Luca Biavati
  - Joseph Rimando
  - Sergio Rutella
  - Nicholas Borcherding
  - Sonali Parbhoo
  - Rupkatha Mukhopadhyay
  - Sayan Chowdhury
  - Hanna A Knaus
  - Peter Valent
  - Hubert Hackl
  - Ivan M Borrello
  - Bruce R Blazar
  - Katerina Hatzi
  - Ivana Gojo
  - Leo Luznik
  journal: Blood
  year: 2024
  volume: '144'
  number: '11'
  pages: 1168-1182
  doi: 10.1182/blood.2023021680
  pubmed: https://pubmed.ncbi.nlm.nih.gov/38776511/
  abstract: The interplay between T-cell states of differentiation, dysfunction, and
    treatment response in acute myeloid leukemia (AML) remains unclear. Here, we leveraged
    a multimodal approach encompassing high-dimensional flow cytometry and single-cell
    transcriptomics and found that early memory CD8+ T cells are associated with therapy
    response and exhibit a bifurcation into 2 distinct terminal end states. One state
    is enriched for markers of activation, whereas the other expresses natural killer
    (NK)-like and senescence markers. The skewed clonal differentiation trajectory
    toward CD8+ senescence was also a hallmark indicative of therapy resistance. We
    validated these findings by generating an AML CD8+ single-cell atlas integrating
    our data and other independent data sets. Finally, our analysis revealed that
    an imbalance between CD8+ early memory and senescent-like cells is linked to AML
    treatment refractoriness and poor survival. Our study provides crucial insights
    into the dynamics of CD8+ T-cell differentiation and advances our understanding
    of CD8+ T-cell dysfunction in AML.
- key: PMID39223312
  pmid: '39223312'
  title: Mitochondria transfer-based therapies reduce the morbidity and mortality
    of Leigh syndrome
  authors:
  - Ritsuko Nakai
  - Stella Varnum
  - Rachael L Field
  - Henyun Shi
  - Rocky Giwa
  - Wentong Jia
  - Samantha J Krysa
  - Eva F Cohen
  - Nicholas Borcherding
  - Russell P Saneto
  - Rick C Tsai
  - Masashi Suganuma
  - Hisashi Ohta
  - Takafumi Yokota
  - Jonathan R Brestoff
  journal: Nature metabolism
  year: 2024
  volume: '6'
  number: '10'
  pages: 1886-1896
  doi: 10.1038/s42255-024-01125-5
  pubmed: https://pubmed.ncbi.nlm.nih.gov/39223312/
  abstract: Mitochondria transfer is a recently described phenomenon in which donor
    cells deliver mitochondria to acceptor cells<sup>1-3</sup>. One possible consequence
    of mitochondria transfer is energetic support of neighbouring cells; for example,
    exogenous healthy mitochondria can rescue cell-intrinsic defects in mitochondrial
    metabolism in cultured ρ<sup>0</sup> cells or Ndufs4<sup>-</sup><sup>/-</sup>
    peritoneal macrophages<sup>4-7</sup>. Exposing haematopoietic stem cells to purified
    mitochondria before autologous haematopoietic stem cell transplantation allowed
    for treatment of anaemia in patients with large-scale mitochondrial DNA mutations<sup>8,9</sup>,
    and mitochondria transplantation was shown to minimize ischaemic damage to the
    heart<sup>10-12</sup>, brain<sup>13-15</sup> and limbs<sup>16</sup>. However,
    the therapeutic potential of using mitochondria transfer-based therapies to treat
    inherited mitochondrial diseases is unclear. Here we demonstrate improved morbidity
    and mortality of the Ndufs4<sup>-</sup><sup>/-</sup> mouse model of Leigh syndrome
    (LS) in multiple treatment paradigms associated with mitochondria transfer. Transplantation
    of bone marrow from wild-type mice, which is associated with release of haematopoietic
    cell-derived extracellular mitochondria into circulation and transfer of mitochondria
    to host cells in multiple organs, ameliorates LS in mice. Furthermore, administering
    isolated mitochondria from wild-type mice extends lifespan, improves neurological
    function and increases energy expenditure of Ndufs4<sup>-</sup><sup>/-</sup> mice,
    whereas mitochondria from Ndufs4<sup>-</sup><sup>/-</sup> mice did not improve
    neurological function. Finally, we demonstrate that cross-species administration
    of human mitochondria to Ndufs4<sup>-</sup><sup>/-</sup> mice also improves LS.
    These data suggest that mitochondria transfer-related approaches can be harnessed
    to treat mitochondrial diseases, such as LS.
- key: PMID38504847
  pmid: '38504847'
  title: Intratumoral T-cell receptor repertoire composition predicts overall survival
    in patients with pancreatic ductal adenocarcinoma
  authors:
  - Vikram S Pothuri
  - Graham D Hogg
  - Leah Conant
  - Nicholas Borcherding
  - C Alston James
  - Jacqueline Mudd
  - Greg Williams
  - Yongwoo David Seo
  - William G Hawkins
  - Venu G Pillarisetty
  - David G DeNardo
  - Ryan C Fields
  journal: Oncoimmunology
  year: 2024
  volume: '13'
  number: '1'
  pages: '2320411'
  doi: 10.1080/2162402X.2024.2320411
  pubmed: https://pubmed.ncbi.nlm.nih.gov/38504847/
  abstract: Pancreatic ductal adenocarcinoma (PDAC) is a lethal malignancy that is
    refractory to immune checkpoint inhibitor therapy. However, intratumoral T-cell
    infiltration correlates with improved overall survival (OS). Herein, we characterized
    the diversity and antigen specificity of the PDAC T-cell receptor (TCR) repertoire
    to identify novel immune-relevant biomarkers. Demographic, clinical, and TCR-beta
    sequencing data were collated from 353 patients across three cohorts that underwent
    surgical resection for PDAC. TCR diversity was calculated using Shannon Wiener
    index, Inverse Simpson index, and "True entropy." Patients were clustered by shared
    repertoire specificity. TCRs predictive of OS were identified and their associated
    transcriptional states were characterized by single-cell RNAseq. In multivariate
    Cox regression models controlling for relevant covariates, high intratumoral TCR
    diversity predicted OS across multiple cohorts. Conversely, in peripheral blood,
    high abundance of T-cells, but not high diversity, predicted OS. Clustering patients
    based on TCR specificity revealed a subset of TCRs that predicts OS. Interestingly,
    these TCR sequences were more likely to encode CD8<sup>+</sup> effector memory
    and CD4<sup>+</sup> T-regulatory (Tregs) T-cells, all with the capacity to recognize
    beta islet-derived autoantigens. As opposed to T-cell abundance, intratumoral
    TCR diversity was predictive of OS in multiple PDAC cohorts, and a subset of TCRs
    enriched in high-diversity patients independently correlated with OS. These findings
    emphasize the importance of evaluating peripheral and intratumoral TCR repertoires
    as distinct and relevant biomarkers in PDAC.
- key: PMID37638293
  pmid: '37638293'
  title: T Cell Clonal Analysis Using Single-cell RNA Sequencing and Reference Maps
  authors:
  - Massimo Andreatta
  - Paul Gueguen
  - Nicholas Borcherding
  - Santiago J Carmona
  journal: Bio-protocol
  year: 2023
  volume: '13'
  number: '16'
  pages: e4735
  doi: 10.21769/BioProtoc.4735
  pubmed: https://pubmed.ncbi.nlm.nih.gov/37638293/
  abstract: T cells are endowed with T-cell antigen receptors (TCR) that give them
    the capacity to recognize specific antigens and mount antigen-specific adaptive
    immune responses. Because TCR sequences are distinct in each naïve T cell, they
    serve as molecular barcodes to track T cells with clonal relatedness and shared
    antigen specificity through proliferation, differentiation, and migration. Single-cell
    RNA sequencing provides coupled information of TCR sequence and transcriptional
    state in individual cells, enabling T-cell clonotype-specific analyses. In this
    protocol, we outline a computational workflow to perform T-cell states and clonal
    analysis from scRNA-seq data based on the R packages Seurat, ProjecTILs, and scRepertoire.
    Given a scRNA-seq T-cell dataset with TCR sequence information, cell states are
    automatically annotated by reference projection using the ProjecTILs method. TCR
    information is used to track individual clonotypes, assess their clonal expansion,
    proliferation rates, bias towards specific differentiation states, and the clonal
    overlap between T-cell subtypes. We provide fully reproducible R code to conduct
    these analyses and generate useful visualizations that can be adapted for the
    needs of the protocol user. Key features Computational analysis of paired scRNA-seq
    and scTCR-seq data Characterizing T-cell functional state by reference-based analysis
    using ProjecTILs Exploring T-cell clonal structure using scRepertoire Linking
    T-cell clonality to transcriptomic state to study relationships between clonal
    expansion and functional phenotype Graphical overview.
- key: PMID37563309
  pmid: '37563309'
  title: Fibrosis induced by resident macrophages has divergent roles in pancreas
    inflammatory injury and PDAC
  authors:
  - John M Baer
  - Chong Zuo
  - Liang-I Kang
  - Angela Alarcon de la Lastra
  - Nicholas C Borcherding
  - Brett L Knolhoff
  - Savannah J Bogner
  - Yu Zhu
