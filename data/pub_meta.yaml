  links:
    code: https://github.com/ncborcherding/scTregs
    pdf: https://github.com/ncborcherding/borcherding/blob/master/content/publication/kim2021CD177/kim2021CD177.pdf
  highlight: Regulatory T (Treg) cells are one of the major immunosuppressive cell
    types in cancer and a potential target for immunotherapy, but targeting tumor-infiltrating
    (TI) Treg cells has been challenging.
  abstract: Regulatory T (Treg) cells are one of the major immunosuppressive cell
    types in cancer and a potential target for immunotherapy, but targeting tumor-infiltrating
    (TI) Treg cells has been challenging. Here, using single-cell RNA sequencing of
    immune cells from renal clear cell carcinoma (ccRCC) patients, we identify two
    distinct transcriptional fates for TI Treg cells, Fate-1 and Fate-2. The Fate-1
    signature is associated with a poorer prognosis in ccRCC and several other solid
    cancers. CD177, a cell surface protein normally expressed on neutrophil, is specifically
    expressed on Fate-1 TI Treg cells in several solid cancer types, but not on other
    TI or peripheral Treg cells. Mechanistically, blocking CD177 reduces the suppressive
    activity of Treg cells in vitro, while Treg-specific deletion of Cd177 leads to
    decreased tumor growth and reduced TI Treg frequency in mice. Our results thus
    uncover a functional CD177+ TI Treg population that may serve as a target for
    TI Treg-specific immunotherapy.
'34615877':
  featured: false
  tags:
  - Single-Cell
  - cancer
  - Immunotherapy
  links:
    pdf: https://github.com/ncborcherding/borcherding/blob/master/content/publication/fujiwara2021GPR171/fujiwara2021GPR171.pdf
  highlight: The recently identified G-protein-coupled receptor GPR171 and its ligand
    BigLEN are thought to regulate food uptake and anxiety.
  abstract: The recently identified G-protein-coupled receptor GPR171 and its ligand
    BigLEN are thought to regulate food uptake and anxiety. Though GPR171 is commonly
    used as a T cell signature gene in transcriptomic studies, its potential role
    in T cell immunity has not been explored. Here we show that GPR171 is transcribed
    in T cells and its protein expression is induced upon antigen stimulation. The
    neuropeptide ligand BigLEN interacts with GPR171 to suppress T cell receptor-mediated
    signalling pathways and to inhibit T cell proliferation. Loss of GPR171 in T cells
    leads to hyperactivity to antigen stimulation and GPR171 knockout mice exhibit
    enhanced antitumor immunity. Blockade of GPR171 signalling by an antagonist promotes
    antitumor T cell immunity and improves immune checkpoint blockade therapies. Together,
    our study identifies the GPR171/BigLEN axis as a T cell checkpoint pathway that
    can be modulated for cancer immunotherapy.
'34831009':
  featured: false
  tags:
  - cancer
  - Immunotherapy
  - Review
  links:
    pdf: https://github.com/ncborcherding/borcherding/blob/master/content/publication/kim2022updates/kim2022updates.pdf
  highlight: Several clinicopathological features of clear cell renal cell carcinomas
    (ccRCC) contribute to make an "atypical" cancer, including resistance to chemotherapy,
    sensitivity to anti-angiogenesis therapy and ICIs despite a low mutational burden,
    and CD8+ T cell infiltration being the predictor for poor prognosis-normally CD8+
    T cell infiltration is a good prognostic factor in cancer patients.
  abstract: Several clinicopathological features of clear cell renal cell carcinomas
    (ccRCC) contribute to make an "atypical" cancer, including resistance to chemotherapy,
    sensitivity to anti-angiogenesis therapy and ICIs despite a low mutational burden,
    and CD8+ T cell infiltration being the predictor for poor prognosis-normally CD8+
    T cell infiltration is a good prognostic factor in cancer patients. These "atypical"
    features have brought researchers to investigate the molecular and immunological
    mechanisms that lead to the increased T cell infiltrates despite relatively low
    molecular burdens, as well as to decipher the immune landscape that leads to better
    response to ICIs. In the present study, we summarize the past and ongoing pivotal
    clinical trials of immunotherapies for ccRCC, emphasizing the potential molecular
    and cellular mechanisms that lead to the success or failure of ICI therapy. Single-cell
    analysis of ccRCC has provided a more thorough and detailed understanding of the
    tumor immune microenvironment and has facilitated the discovery of molecular biomarkers
    from the tumor-infiltrating immune cells. We herein will focus on the discussion
    of some major immune cells, including T cells and tumor-associated macrophages
    (TAM) in ccRCC. We will further provide some perspectives of using molecular and
    cellular biomarkers derived from these immune cell types to potentially improve
    the response rate to ICIs in ccRCC patients.
'34877491':
  featured: false
  tags:
  - cancer
  links:
    pdf: https://github.com/ncborcherding/borcherding/blob/master/content/publication/zhao2022tifab/zhao2022tifab.pdf
  highlight: We previously showed stabilization of NIK-induced activation of NF-κB
    non-canonical signaling suppresses MLL-AF9-induced AML.
  abstract: We previously showed stabilization of NIK-induced activation of NF-κB
    non-canonical signaling suppresses MLL-AF9-induced AML. In the current study,
    we demonstrate that deletion of NF-κB non-canonical RelB prevents the inhibitory
    effect of NIK stabilization in MLL-AF9 AML. Mechanistically, RelB suppresses its
    direct target, TIFAB, which is upregulated in human AML and correlates negatively
    with the survival of AML patients. Forced expression of TIFAB reverses NIK-induced
    impaired AML development through downregulation of RelB and upregulation of HOXA9.
    Consistent with upregulation of HOXA9, gene set enrichment analysis shows that
    forced expression of TIFAB blocks myeloid cell development, upregulates leukemia
    stem cell signature and induces similar gene expression patterns to those of HOXA9-MEIS1
    and HOXA9-NUP98, and upregulates oxidative phosphorylation. Accordingly, forced
    expression of HOXA9 also largely releases the inhibitory impact of NIK stabilization
    via downregulation of RelB and upregulation of RelA. Our data suggest that NIK/RelB
    suppresses MLL-AF9-induced AML mainly through downregulation of TIFAB/HOXA9.
'35008370':
  featured: false
  tags:
  - cancer
  - breast cancer
  - Review
  links:
    pdf: https://github.com/ncborcherding/borcherding/blob/master/content/publication/maharjan2022natural/maharjan2022natural.pdf
  highlight: The oncogenic role of estrogen receptor (ER) signaling in breast cancer
    has long been established.
  abstract: The oncogenic role of estrogen receptor (ER) signaling in breast cancer
    has long been established. Interaction of estrogen with estrogen receptor (ER)
    in the nucleus activates genomic pathways of estrogen signaling. In contrast,
    estrogen interaction with the cell membrane-bound G-protein-coupled estrogen receptor
    (GPER) activates the rapid receptor-mediated signaling transduction cascades.
    Aberrant estrogen signaling enhances mammary epithelial cell proliferation, survival,
    and angiogenesis, hence is an important step towards breast cancer initiation
    and progression. Meanwhile, a growing number of studies also provide evidence
    for estrogen's pro- or anti-inflammatory roles. As other articles in this issue
    cover classic ER and GPER signaling mediated by estrogen, this review will discuss
    the crucial mechanisms by which estrogen signaling influences chronic inflammation
    and how that is involved in breast cancer. Xenoestrogens acquired from plant diet
    or exposure to industrial products constantly interact with and alter innate estrogen
    signaling at various levels. As such, they can modulate chronic inflammation and
    breast cancer development. Natural xenoestrogens generally have anti-inflammatory
    properties, which is consistent with their chemoprotective role in breast cancer.
    In contrast, synthetic xenoestrogens are proinflammatory and carcinogenic compounds
    that can increase the risk of breast cancer. This article also highlights important
    xenoestrogens with a particular focus on their role in inflammation and breast
    cancer. Improved understanding of the complex relationship between estrogens,
    inflammation, and breast cancer will guide clinical research on agents that could
    advance breast cancer prevention and therapy.
'35243228':
  featured: false
  tags:
  - Immune Response
  - Autoimmune
  - Single-Cell
  links:
    code: https://github.com/ncborcherding/Lasrado_Myocarditis
    pdf: https://github.com/ncborcherding/borcherding/blob/master/content/publication/lasrado2022dissecting/lasrado2022dissecting.pdf
  highlight: Coxsackievirus B3 (CVB3)-induced myocarditis is commonly employed to
    study viral pathogenesis in mice.
  abstract: Coxsackievirus B3 (CVB3)-induced myocarditis is commonly employed to study
    viral pathogenesis in mice. Chronically affected mice may develop dilated cardiomyopathy,
    which may involve the mediation of immune and nonimmune cells. To dissect this
    complexity, we performed single-cell RNA sequencing on heart cells from healthy
    and myocarditic mice, leading us to note significant proportions of myeloid cells,
    T cells, and fibroblasts. Although the transcriptomes of myeloid cells were mainly
    of M2 phenotype, the Th17 cells, CTLs, and Treg cells had signatures critical
    for cytotoxic functions. Fibroblasts were heterogeneous expressing genes important
    in fibrosis and regulation of inflammation and immune responses. The intercellular
    communication networks revealed unique interactions and signaling pathways in
    the cardiac cellulome, whereas myeloid cells and T cells had upregulated unique
    transcription factors modulating cardiac remodeling functions. Together, our data
    suggest that M2 cells, T cells, and fibroblasts may cooperatively or independently
    participate in the pathogenesis of viral myocarditis.
'35305295':
  featured: false
  tags:
  - Obesity
  - Mitochondria
  links:
    pdf: https://github.com/ncborcherding/borcherding/blob/master/content/publication/rosina2022ejection/rosina2022ejection.pdf
  highlight: Recent findings have demonstrated that mitochondria can be transferred
    between cells to control metabolic homeostasis.
  abstract: Recent findings have demonstrated that mitochondria can be transferred
    between cells to control metabolic homeostasis. Although the mitochondria of brown
    adipocytes comprise a large component of the cell volume and undergo reorganization
    to sustain thermogenesis, it remains unclear whether an intercellular mitochondrial
    transfer occurs in brown adipose tissue (BAT) and regulates adaptive thermogenesis.
    Herein, we demonstrated that thermogenically stressed brown adipocytes release
    extracellular vesicles (EVs) that contain oxidatively damaged mitochondrial parts
    to avoid failure of the thermogenic program. When re-uptaken by parental brown
    adipocytes, mitochondria-derived EVs reduced peroxisome proliferator-activated
    receptor-γ signaling and the levels of mitochondrial proteins, including UCP1.
    Their removal via the phagocytic activity of BAT-resident macrophages is instrumental
    in preserving BAT physiology. Depletion of macrophages in vivo causes the abnormal
    accumulation of extracellular mitochondrial vesicles in BAT, impairing the thermogenic
    response to cold exposure. These findings reveal a homeostatic role of tissue-resident
    macrophages in the mitochondrial quality control of BAT.
'35361907':
  featured: false
  tags:
  - Single-Cell
  - Autoimmune
  links:
    pdf: https://github.com/ncborcherding/borcherding/blob/master/content/publication/alam2022single/alam2022single.pdf
  highlight: Immune cells in the exposed conjunctiva mucosa defend against environmental
    and microbial stresses.
  abstract: Immune cells in the exposed conjunctiva mucosa defend against environmental
    and microbial stresses. Expression profiling by single-cell RNA sequencing was
    performed to identify conjunctival immune cell populations expressing homeostatic
    and regulatory genes. Fourteen distinct clusters were identified, including myeloid
    cells (neutrophils, monocytes, macrophages), dendritic cells (DC), and lymphoid
    cells (B, T, γδT, ILC2, and NK) lineages. Novel neutrophil [lipocalin (Lcn2) high
    and low), and MHCIIlo macrophage (MP) clusters were identified. More than half
    of the cells map to myeloid and dendritic cell populations with differential expression
    profiles that include genes with homeostatic and regulatory functions - Serpinb2
    (MHCIIlo macrophage), Apoe (monocyte), Cd209a (macrophage), Cst3 (cDC1), and IL4i1
    in migratory DC (mDC). ILC2 expresses the goblet cell trophic factor IL-13. Suppressed
    inflammatory and activated anti-inflammatory/regulatory pathways were observed
    in certain myeloid and DC populations. Confocal immunolocalization of identity
    markers showed mDC (CCR7, FASCIN1) located on or within the conjunctival epithelium.
    Monocyte, macrophage, cDC1 and IL-13/IL-5+ ILC2 were located below the conjunctival
    epithelium and goblet cells. This study found distinct immune cell populations
    in the conjunctiva and identified cells expressing genes with known homeostatic
    and immunoregulatory functions.
'35390145':
  featured: false
  tags:
  - Single-Cell
  - TCR
  - CTCL
  links:
    pdf: https://github.com/ncborcherding/borcherding/blob/master/content/publication/borcherding2022single/borcherding2022single.pdf
  highlight: Cutaneous T cell lymphomas (CTCLs) are a spectrum of diseases with varied
    clinical courses caused by malignant clonal proliferation of skin-tropic T cells.
  abstract: Cutaneous T cell lymphomas (CTCLs) are a spectrum of diseases with varied
    clinical courses caused by malignant clonal proliferation of skin-tropic T cells.
    Most patients have an indolent disease course managed with skin-directed therapies.
    In contrast, others, especially in advanced stages of disease or with specific
    forms, have aggressive progression and poor median survival. Sézary syndrome (SS),
    a leukemic variant of CTCL, lacks highly consistent phenotypic and genetic markers
    that may be leveraged to prevent the delay in diagnosis experienced by most patients
    with CTCL and could be useful for optimal treatment selection. Using single-cell
    mRNA and T-cell receptor sequencing of peripheral blood immune cells in SS, we
    extensively mapped the transcriptomic variations of nearly 50 000 T cells of both
    malignant and nonmalignant origins. We identified potential diverging SS cell
    populations, including quiescent and proliferative populations shared across multiple
    patients. In particular, the expression of AIRE was the most highly upregulated
    gene in our analysis, and AIRE protein expression could be observed over a variety
    of CTCLs. Furthermore, within a single patient, we were able to characterize differences
    in cell populations comparing malignant T cells over the course of treatment with
    histone deacetylase inhibition and photopheresis. New cellular clusters after
    progression on the therapy notably exhibited increased expression of the transcriptional
    factor FOXP3, a master regulator of regulatory T cell function, raising the potential
    implication of an evolving mechanism of immune evasion.
