  - breast cancer
  - inflammation
  links:
    pdf: https://github.com/ncborcherding/borcherding/blob/master/content/publication/zhang2013nik/zhang2013nik.pdf
  highlight: IκB kinase α (IKKα) activity is required for ErbB2-induced mammary tumorigenesis.
  abstract: IκB kinase α (IKKα) activity is required for ErbB2-induced mammary tumorigenesis.
    Here, we show that IKKα and its activator, NF-κB-inducing kinase (NIK), support
    the expansion of tumor-initiating cells (TICs) that copurify with a CD24(med)CD49f(hi)
    population from premalignant ErbB2-expressing mammary glands. Upon activation,
    IKKα enters the nucleus, phosphorylates the cyclin-dependent kinase (CDK) inhibitor
    p27/Kip1, and stimulates its nuclear export or exclusion. Reduced p27 expression
    rescues mammary tumorigenesis in mice deficient in IKKα kinase activity and restores
    TIC self-renewal. IKKα is also likely to be involved in human breast cancer, where
    its expression shows an inverse correlation with metastasis-free survival, and
    its presence in the nucleus of invasive ductal carcinomas (IDCs) is associated
    with decreased nuclear p27 abundance.
'23677864':
  featured: false
  tags:
  - Obesity
  links:
    pdf: https://github.com/ncborcherding/borcherding/blob/master/content/publication/smazal2013dietary/smazal2013dietary.pdf
  highlight: Diabetes is a rapidly growing epidemic affecting millions of Americans
    and has been implicated in a number of devastating secondary complications.
  abstract: Diabetes is a rapidly growing epidemic affecting millions of Americans
    and has been implicated in a number of devastating secondary complications. We
    previously demonstrated that type 2 diabetic rats exhibit vitamin D deficiency
    due to aberrant megalin-mediated endocytosis and excessive urinary excretion of
    25-hydroxycholecalciferol (25D3) and vitamin D-binding protein (DBP). Here, we
    examined whether a model of type 1 diabetes [T1D; streptozotocin (STZ)-treated
    Sprague-Dawley rats] would similarly excrete abnormally high concentrations of
    25D3 and DBP due to renal damage and compromised expression of megalin and its
    endocytic partner, disabled-2 (Dab2). Moreover, we tested whether feeding diabetic
    rats starch that is resistant to digestion could alleviate these abnormalities.
    Control (n = 12) rats were fed a standard, semipurified diet (AIN-93G) containing
    55% total dietary starch and STZ-treated rats were fed the AIN-93G diet (n = 12)
    or a diet containing 55% high-amylose maize that is partially resistant to digestion
    [20% total dietary resistant starch (RS); n = 12] for 2 and 5 wk. The RS diet
    attenuated weight loss and polyuria in STZ-treated rats. Histology and immunohistochemistry
    revealed that dietary RS also attenuated the loss of Dab2 expression in renal
    proximal tubules. Moreover, urinary concentrations of both 25D3 and DBP were elevated
    ∼10-fold in STZ-treated rats (5 wk post STZ injection), which was virtually prevented
    by the RS. We also observed a ∼1.5-fold increase in megalin mRNA expression in
    STZ-treated rats, which was attenuated by feeding rats the RS diet for 2 wk. Taken
    together, these studies indicate that consumption of low-glycemic carbohydrates
    can attenuate disruption of vitamin D homeostasis in T1D through the rescue of
    megalin-mediated endocytosis in the kidney.
'24752542':
  featured: false
  tags:
  - cancer
  - oncofetal antigen
  - receptor tyrosine kinase
  - Wnt signaling
  links:
    pdf: https://github.com/ncborcherding/borcherding/blob/master/content/publication/borcherding2014ror1/borcherding2014ror1.pdf
  highlight: Receptor tyrosine kinase-like orphan receptor 1 (ROR1) is a member of
    the ROR family consisting of ROR1 and ROR2.
  abstract: Receptor tyrosine kinase-like orphan receptor 1 (ROR1) is a member of
    the ROR family consisting of ROR1 and ROR2. RORs contain two distinct extracellular
    cysteine-rich domains and one transmembrane domain. Within the intracellular portion,
    ROR1 possesses a tyrosine kinase domain, two serine/threonine-rich domains and
    a proline-rich domain. RORs have been studied in the context of embryonic patterning
    and neurogenesis through a variety of homologs. These physiologic functions are
    dichotomous based on the requirement of the kinase domain. A growing literature
    has established ROR1 as a marker for cancer, such as in CLL and other blood malignancies.
    In addition, ROR1 is critically involved in progression of a number of blood and
    solid malignancies. ROR1 has been shown to inhibit apoptosis, potentiate EGFR
    signaling, and induce epithelial-mesenchymal transition (EMT). Importantly, ROR1
    is only detectable in embryonic tissue and generally absent in adult tissue, making
    the protein an ideal drug target for cancer therapy.
'25189770':
  featured: false
  tags:
  - cancer
  - breast cancer
  - inflammation
  links:
    pdf: https://github.com/ncborcherding/borcherding/blob/master/content/publication/wu2014ubiquitin/wu2014ubiquitin.pdf
  highlight: Metastatic spread is the leading cause of cancer mortality.
  abstract: Metastatic spread is the leading cause of cancer mortality. Breast cancer
    (BCa) metastatic recurrence can happen years after removal of the primary tumor.
    Here we show that Ubc13, an E2 enzyme that catalyzes K63-linked protein polyubiquitination,
    is largely dispensable for primary mammary tumor growth but is required for metastatic
    spread and lung colonization by BCa cells. Loss of Ubc13 inhibited BCa growth
    and survival only at metastatic sites. Ubc13 was dispensable for transforming
    growth factor β (TGFβ)-induced SMAD activation but was required for activation
    of non-SMAD signaling via TGFβ-activating kinase 1 (TAK1) and p38, whose activity
    controls expression of numerous metastasis promoting genes. p38 activation restored
    metastatic activity to Ubc13-deficient cells, and its pharmacological inhibition
    attenuated BCa metastasis in mice, suggesting it is a therapeutic option for metastatic
    BCa.
'25359465':
  featured: false
  tags:
  - Immune Response
  links:
    pdf: https://github.com/ncborcherding/borcherding/blob/master/content/publication/xie2015characterization/xie2015characterization.pdf
  highlight: Neutrophils play an essential role in the innate immune response to infection.
  abstract: Neutrophils play an essential role in the innate immune response to infection.
    Neutrophils migrate from the vasculature into the tissue in response to infection.
    Recently, a neutrophil cell surface receptor, CD177, was shown to help mediate
    neutrophil migration across the endothelium through interactions with PECAM1.
    We examined a publicly available gene array dataset of CD177 expression from human
    neutrophils following pulmonary endotoxin instillation. Among all 22,214 genes
    examined, CD177 mRNA was the most upregulated following endotoxin exposure. The
    high level of CD177 expression is also maintained in airspace neutrophils, suggesting
    a potential involvement of CD177 in neutrophil infiltration under infectious diseases.
    To determine the role of CD177 in neutrophils in vivo, we constructed a CD177-genetic
    knockout mouse model. The mice with homozygous deletion of CD177 have no discernible
    phenotype and no significant change in immune cells, other than decreased neutrophil
    counts in peripheral blood. We examined the role of CD177 in neutrophil accumulation
    using a skin infection model with Staphylococcus aureus. CD177 deletion reduced
    neutrophil counts in inflammatory skin caused by S. aureus. Mechanistically we
    found that CD177 deletion in mouse neutrophils has no significant impact in CXCL1/KC-
    or fMLP-induced migration, but led to significant cell death. Herein we established
    a novel genetic mouse model to study the role of CD177 and found that CD177 plays
    an important role in neutrophils.
'25393878':
  featured: false
  tags:
  - cancer
  links:
    pdf: https://github.com/ncborcherding/borcherding/blob/master/content/publication/reed2014niam/reed2014niam.pdf
  highlight: Nuclear Interactor of ARF and Mdm2 (NIAM, gene designation Tbrg1) is
    a largely unstudied inhibitor of cell proliferation that helps maintain chromosomal
    stability.
  abstract: Nuclear Interactor of ARF and Mdm2 (NIAM, gene designation Tbrg1) is a
    largely unstudied inhibitor of cell proliferation that helps maintain chromosomal
    stability. It is a novel activator of the ARF-Mdm2-Tip60-p53 tumor suppressor
    pathway as well as other undefined pathways important for genome maintenance.
    To examine its predicted role as a tumor suppressor, we generated NIAM mutant
    (NIAM(m/m)) mice homozygous for a β-galactosidase expressing gene-trap cassette
    in the endogenous gene. The mutant mice expressed significantly lower levels of
    NIAM protein in tissues compared to wild-type animals. Fifty percent of aged NIAM
    deficient mice (14 to 21 months) developed proliferative lesions, including a
    uterine hemangioma, pulmonary papillary adenoma, and a Harderian gland adenoma.
    No age-matched wild-type or NIAM(+/m) heterozygous animals developed lesions.
    In the spleen, NIAM(m/m) mice had prominent white pulp expansion which correlated
    with enhanced increased reactive lymphoid hyperplasia and evidence of systemic
    inflammation. Notably, 17% of NIAM mutant mice had splenic white pulp features
    indicating early B-cell lymphoma. This correlated with selective expansion of
    marginal zone B cells in the spleens of younger, tumor-free NIAM-deficient mice.
    Unexpectedly, basal p53 expression and activity was largely unaffected by NIAM
    loss in isolated splenic B cells. In sum, NIAM down-regulation in vivo results
    in a significant predisposition to developing benign tumors or early stage cancers.
    These mice represent an outstanding platform for dissecting NIAM's role in tumorigenesis
    and various anti-cancer pathways, including p53 signaling.
'25769722':
  featured: false
  tags:
  - cancer
