'36165893':
  featured: false
  tags:
  - cancer
  - Microenvironment
  - Single-Cell
  links:
    pdf: https://github.com/ncborcherding/borcherding/blob/master/content/publication/lander2022stromal/lander2022stromal.pdf
  highlight: The effects of radiotherapy (RT) on tumor immunity in pancreatic ductal
    adenocarcinoma (PDAC) are not well understood.
  abstract: The effects of radiotherapy (RT) on tumor immunity in pancreatic ductal
    adenocarcinoma (PDAC) are not well understood. To better understand if RT can
    prime antigen-specific T-cell responses, we analyzed human PDAC tissues and mouse
    models. In both settings, there was little evidence of RT-induced T-cell priming.
    Using in vitro systems, we found that tumor-stromal components, including fibroblasts
    and collagen, cooperate to blunt RT efficacy and impair RT-induced interferon
    signaling. Focal adhesion kinase (FAK) inhibition rescued RT efficacy in vitro
    and in vivo, leading to tumor regression, T-cell priming, and enhanced long-term
    survival in PDAC mouse models. Based on these data, we initiated a clinical trial
    of defactinib in combination with stereotactic body RT in patients with PDAC (NCT04331041).
    Analysis of PDAC tissues from these patients showed stromal reprogramming mirroring
    our findings in genetically engineered mouse models. Finally, the addition of
    checkpoint immunotherapy to RT and FAK inhibition in animal models led to complete
    tumor regression and long-term survival.
'36245043':
  featured: false
  tags:
  - cancer
  links:
    pdf: https://github.com/ncborcherding/borcherding/blob/master/content/publication/dong2022HSF1/dong2022HSF1.pdf
  highlight: Acute myeloid leukemia (AML) is maintained by self-renewing leukemic
    stem cells (LSCs).
  abstract: Acute myeloid leukemia (AML) is maintained by self-renewing leukemic stem
    cells (LSCs). A fundamental problem in treating AML is that conventional therapy
    fails to eliminate LSCs, which can reinitiate leukemia. Heat shock transcription
    factor 1 (HSF1), a central regulator of the stress response, has emerged as an
    important target in cancer therapy. Using genetic Hsf1 deletion and a direct HSF1
    small molecule inhibitor, we show that HSF1 is specifically required for the maintenance
    of AML, while sparing steady-state and stressed hematopoiesis. Mechanistically,
    deletion of Hsf1 dysregulates multifaceted genes involved in LSC stemness and
    suppresses mitochondrial oxidative phosphorylation through downregulation of succinate
    dehydrogenase C (SDHC), a direct HSF1 target. Forced expression of SDHC largely
    restores the Hsf1 ablation-induced AML developmental defect. Importantly, the
    growth and engraftment of human AML cells are suppressed by HSF1 inhibition. Our
    data provide a rationale for developing efficacious small molecules to specifically
    target HSF1 in AML.
'36289122':
