  - microenvironment
  - Single-Cell
  - TCR
  - Immunotherapy
  links:
    pdf: https://github.com/ncborcherding/borcherding/blob/master/content/publication/he2023CD5/he2023CD5.pdf
  highlight: The induction of proinflammatory T cells by dendritic cell (DC) subtypes
    is critical for antitumor responses and effective immune checkpoint blockade (ICB)
    therapy.
  abstract: The induction of proinflammatory T cells by dendritic cell (DC) subtypes
    is critical for antitumor responses and effective immune checkpoint blockade (ICB)
    therapy. Here, we show that human CD1c+CD5+ DCs are reduced in melanoma-affected
    lymph nodes, with CD5 expression on DCs correlating with patient survival. Activating
    CD5 on DCs enhanced T cell priming and improved survival after ICB therapy. CD5+
    DC numbers increased during ICB therapy, and low interleukin-6 (IL-6) concentrations
    promoted their de novo differentiation. Mechanistically, CD5 expression by DCs
    was required to generate optimally protective CD5hi T helper and CD8+ T cells;
    further, deletion of CD5 from T cells dampened tumor elimination in response to
    ICB therapy in vivo. Thus, CD5+ DCs are an essential component of optimal ICB
    therapy.
'37115755':
  featured: false
  tags:
  - Immune Response
  - Immunotherapy
  links:
    pdf: https://github.com/ncborcherding/borcherding/blob/master/content/publication/crawford2023IL17/crawford2023IL17.pdf
  highlight: CD4+ T-helper 17 (Th17) T cells are a key population in protective immunity
    during infection and in self-tolerance/autoimmunity.
  abstract: CD4+ T-helper 17 (Th17) T cells are a key population in protective immunity
    during infection and in self-tolerance/autoimmunity. Through the secretion of
    IL-17, Th17 cells act in promotion of inflammation and are thus a major potential
    therapeutic target in autoimmune disorders. Recent reports have brought to light
    that the IL-17 family cytokines, IL-17A, IL-17F and IL-17AF, can directly act
    on CD4+ T-cells, both in murine and human systems, inducing functional changes
    in these cells. Here we show that this action is preferentially targeted toward
    naïve, but not memory, CD4+ T-cells. Naïve cells showed transcriptome changes
    as early as 48 hours post-IL-17 exposure, whereas memory cells remained unaffected
    as late as 7 days. These functional differences occurred despite similar IL-17
    receptor expression on these subsets and were maintained in co-culture/transwell
    systems, with each subset maintaining its functional response to IL-17. Importantly,
    there were differences in downstream transcriptional signaling by the three IL-17
    cytokines, with the IL-17AF heterodimer conferring both the greatest transcriptional
    change and most altered functional consequences. Detailed transcriptome analysis
    provides important insights into the genes and pathways that are modulated as
    a result of IL-17-mediated signaling and may serve as targets of future therapies.
'37236195':
  featured: false
  tags:
  - cancer
  - Immunotherapy
  links:
    pdf: https://github.com/ncborcherding/borcherding/blob/master/content/publication/liu2023context/liu2023context.pdf
  highlight: Chronic activation of inflammatory pathways and suppressed interferon
    are hallmarks of immunosuppressive tumors.
  abstract: Chronic activation of inflammatory pathways and suppressed interferon
    are hallmarks of immunosuppressive tumors. Previous studies have shown that CD11b
    integrin agonists could enhance anti-tumor immunity through myeloid reprograming,
    but the underlying mechanisms remain unclear. Herein we find that CD11b agonists
    alter tumor-associated macrophage (TAM) phenotypes by repressing NF-κB signaling
    and activating interferon gene expression simultaneously. Repression of NF-κB
    signaling involves degradation of p65 protein and is context independent. In contrast,
    CD11b agonism induces STING/STAT1 pathway-mediated interferon gene expression
    through FAK-mediated mitochondrial dysfunction, with the magnitude of induction
    dependent on the tumor microenvironment and amplified by cytotoxic therapies.
    Using tissues from phase I clinical studies, we demonstrate that GB1275 treatment
    activates STING and STAT1 signaling in TAMs in human tumors. These findings suggest
    potential mechanism-based therapeutic strategies for CD11b agonists and identify
    patient populations more likely to benefit.
'37285399':
  featured: false
  tags:
  - Immune Response
  - TCR
  - Single-Cell
  links:
    pdf: https://github.com/ncborcherding/borcherding/blob/master/content/publication/herzog2023tumor.pdf
  highlight: Non–small cell lung cancer (NSCLC) is a leading cause of cancer-related
    deaths.
  abstract: Non–small cell lung cancer (NSCLC) is a leading cause of cancer-related
    deaths. Immune checkpoint blockade has improved survival for many patients with
    NSCLC, but most fail to obtain long-term benefit. Understanding the factors leading
    to reduced immune surveillance in NSCLC is critical in improving patient outcomes.
    Here, we show that human NSCLC harbors large amounts of fibrosis that correlates
    with reduced T cell infiltration. In murine NSCLC models, the induction of fibrosis
    led to increased lung cancer progression, impaired T cell immune surveillance,
    and failure of immune checkpoint blockade efficacy. Associated with these changes,
    we observed that fibrosis leads to numerically and functionally impaired dendritic
    cells and altered macrophage phenotypes that likely contribute to immunosuppression.
    Within cancer-associated fibroblasts, distinct changes within the Col13a1-expressing
    population suggest that these cells produce chemokines to recruit macrophages
    and regulatory T cells while limiting recruitment of dendritic cells and T cells.
    Targeting fibrosis through transforming growth factor–β receptor signaling overcame
    the effects of fibrosis to enhance T cell responses and improved the efficacy
    of immune checkpoint blockade but only in the context of chemotherapy. Together,
    these data suggest that fibrosis in NSCLC leads to reduced immune surveillance
    and poor responsiveness to checkpoint blockade and highlight antifibrotic therapies
    as a candidate strategy to overcome immunotherapeutic resistance.
'37490492':
  featured: false
  tags:
  - Immune Response
  - Immunology
  - TCR
  links:
    pdf: https://github.com/ncborcherding/borcherding/blob/master/content/publication/westerhof2023multifunctional/westerhof2023multifunctional.pdf
  highlight: Cytokine production by memory T cells is a key mechanism of T cell mediated
    protection.
  abstract: Cytokine production by memory T cells is a key mechanism of T cell mediated
    protection. However, we have limited understanding of the persistence of cytokine
    producing T cells during memory cell maintenance and secondary responses. We interrogated
    antigen-specific CD4 T cells using a mouse influenza A virus infection model.
    Although CD4 T cells detected using MHCII tetramers declined in lymphoid and non-lymphoid
    organs, we found similar numbers of cytokine+ CD4 T cells at days 9 and 30 in
    the lymphoid organs. CD4 T cells with the capacity to produce cytokines expressed
    higher levels of pro-survival molecules, CD127 and Bcl2, than non-cytokine+ cells.
    Transcriptomic analysis revealed a heterogeneous population of memory CD4 T cells
    with three clusters of cytokine+ cells. These clusters match flow cytometry data
    and reveal an enhanced survival signature in cells capable of producing multiple
    cytokines. Following re-infection, multifunctional T cells expressed low levels
    of the proliferation marker, Ki67, whereas cells that only produce the anti-viral
    cytokine, interferon-γ, were more likely to be Ki67+. Despite this, multifunctional
    memory T cells formed a substantial fraction of the secondary memory pool. Together
    these data indicate that survival rather than proliferation may dictate which
    populations persist within the memory pool.
'37563309':
  featured: false
  tags:
  - cancer
  - Immunotherapy
  - Macrophages
  links:
    pdf: https://github.com/ncborcherding/borcherding/blob/master/content/publication/baer2023fibrosis/baer2023fibrosis.pdf
  highlight: Tissue-resident macrophages (TRMs) are long-lived cells that maintain
    locally and can be phenotypically distinct from monocyte-derived macrophages.
  abstract: Tissue-resident macrophages (TRMs) are long-lived cells that maintain
    locally and can be phenotypically distinct from monocyte-derived macrophages.
    Whether TRMs and monocyte-derived macrophages have district roles under differing
    pathologies is not understood. Here, we showed that a substantial portion of the
    macrophages that accumulated during pancreatitis and pancreatic cancer in mice
    had expanded from TRMs. Pancreas TRMs had an extracellular matrix remodeling phenotype
    that was important for maintaining tissue homeostasis during inflammation. Loss
    of TRMs led to exacerbation of severe pancreatitis and death, due to impaired
    acinar cell survival and recovery. During pancreatitis, TRMs elicited protective
    effects by triggering the accumulation and activation of fibroblasts, which was
    necessary for initiating fibrosis as a wound healing response. The same TRM-driven
    fibrosis, however, drove pancreas cancer pathogenesis and progression. Together,
    these findings indicate that TRMs play divergent roles in the pathogenesis of
    pancreatitis and cancer through regulation of stromagenesis.
'37638293':
  featured: false
  tags:
  - Immune Response
  - TCR
  - Single-Cell
  links:
    pdf: https://github.com/ncborcherding/borcherding/blob/master/content/publication/Andreatta2023T/Andreatta2023T.pdf
  highlight: T cells are endowed with T-cell antigen receptors (TCR) that give them
    the capacity to recognize specific antigens and mount antigen-specific adaptive
    immune responses.
  abstract: T cells are endowed with T-cell antigen receptors (TCR) that give them
    the capacity to recognize specific antigens and mount antigen-specific adaptive
    immune responses. Because TCR sequences are distinct in each naïve T cell, they
    serve as molecular barcodes to track T cells with clonal relatedness and shared
    antigen specificity through proliferation, differentiation, and migration. Single-cell
    RNA sequencing provides coupled information of TCR sequence and transcriptional
    state in individual cells, enabling T-cell clonotype-specific analyses. In this
    protocol, we outline a computational workflow to perform T-cell states and clonal
    analysis from scRNA-seq data based on the R packages Seurat, ProjecTILs, and scRepertoire.
    Given a scRNA-seq T-cell dataset with TCR sequence information, cell states are
    automatically annotated by reference projection using the ProjecTILs method. TCR
    information is used to track individual clonotypes, assess their clonal expansion,
    proliferation rates, bias towards specific differentiation states, and the clonal
    overlap between T-cell subtypes. We provide fully reproducible R code to conduct
    these analyses and generate useful visualizations that can be adapted for the
    needs of the protocol user. Key features Computational analysis of paired scRNA-seq
    and scTCR-seq data Characterizing T-cell functional state by reference-based analysis
    using ProjecTILs Exploring T-cell clonal structure using scRepertoire Linking
    T-cell clonality to transcriptomic state to study relationships between clonal
    expansion and functional phenotype Graphical overview.
'37654486':
  featured: false
  tags:
  - CTCL
  - TCR
  - Diagnostics
  - Single-Cell
  links:
    pdf: https://github.com/ncborcherding/borcherding/blob/master/content/publication/lefebvre2023molecular.pdf
  highlight: Cutaneous T cell lymphoma (CTCL), characterized by malignant T cells
    infiltrating the skin with potential for dissemination, remains a challenging
    disease to diagnose and treat due to disease heterogeneity, treatment resistance,
    and lack of effective and standardized diagnostic and prognostic clinical tools.
  abstract: Cutaneous T cell lymphoma (CTCL), characterized by malignant T cells infiltrating
    the skin with potential for dissemination, remains a challenging disease to diagnose
    and treat due to disease heterogeneity, treatment resistance, and lack of effective
    and standardized diagnostic and prognostic clinical tools. Currently, diagnosis
    of CTCL practically relies on clinical presentation, histopathology, and immunohistochemistry.
    These methods are collectively fraught with limitations in sensitivity and specificity.
    Fortunately, recent advances in flow cytometry, polymerase chain reaction, high
    throughput sequencing, and other molecular techniques have shown promise in improving
    diagnosis and treatment of CTCL. Examples of these advances include T cell receptor
    clonotyping via sequencing to detect CTCL earlier in the disease course and single-cell
    RNA sequencing to identify gene expression patterns that commonly drive CTCL pathogenesis.
    Experience with these techniques has afforded novel insights which may translate
    into enhanced diagnostic and therapeutic approaches for CTCL.
'37938702':
  featured: true
  tags:
  - Metabolism
  - Mitochondria
  - microenvironment
  links:
    pdf: https://github.com/ncborcherding/borcherding/blob/master/content/publication/borcherding2023the/borcherding2023the.pdf
  highlight: Mitochondria are believed to have originated through an ancient endosymbiotic
    process in which proteobacteria were captured and co-opted for energy production
    and cellular metabolism.
  abstract: Mitochondria are believed to have originated through an ancient endosymbiotic
    process in which proteobacteria were captured and co-opted for energy production
    and cellular metabolism. Mitochondria segregate during cell division and differentiation,
    with vertical inheritance of mitochondria and the mitochondrial DNA genome from
    parent to daughter cells. However, an emerging body of literature indicates that
    some cell types export their mitochondria for delivery to developmentally unrelated
    cell types, a process called intercellular mitochondria transfer. In this Review,
    we describe the mechanisms by which mitochondria are transferred between cells
    and discuss how intercellular mitochondria transfer regulates the physiology and
    function of various organ systems in health and disease. In particular, we discuss
    the role of mitochondria transfer in regulating cellular metabolism, cancer, the
    immune system, maintenance of tissue homeostasis, mitochondrial quality control,
    wound healing and adipose tissue function. We also highlight the potential of
    targeting intercellular mitochondria transfer as a therapeutic strategy to treat
    human diseases and augment cellular therapies.
'38504847':
  featured: false
  tags:
  - cancer
  - TCR
  links:
    pdf: https://github.com/ncborcherding/borcherding/blob/master/content/publication/pothuri2024intratumoral.pdf
  highlight: Pancreatic ductal adenocarcinoma (PDAC) is a lethal malignancy that is
    refractory to immune checkpoint inhibitor therapy.
  abstract: Pancreatic ductal adenocarcinoma (PDAC) is a lethal malignancy that is
    refractory to immune checkpoint inhibitor therapy. However, intratumoral T-cell
    infiltration correlates with improved overall survival (OS). Herein, we characterized
    the diversity and antigen specificity of the PDAC T-cell receptor (TCR) repertoire
    to identify novel immune-relevant biomarkers. Demographic, clinical, and TCR-beta
    sequencing data were collated from 353 patients across three cohorts that underwent
    surgical resection for PDAC. TCR diversity was calculated using Shannon Wiener
    index, Inverse Simpson index, and "True entropy." Patients were clustered by shared
    repertoire specificity. TCRs predictive of OS were identified and their associated
    transcriptional states were characterized by single-cell RNAseq. In multivariate
    Cox regression models controlling for relevant covariates, high intratumoral TCR
    diversity predicted OS across multiple cohorts. Conversely, in peripheral blood,
    high abundance of T-cells, but not high diversity, predicted OS. Clustering patients
    based on TCR specificity revealed a subset of TCRs that predicts OS. Interestingly,
    these TCR sequences were more likely to encode CD8+ effector memory and CD4+ T-regulatory
    (Tregs) T-cells, all with the capacity to recognize beta islet-derived autoantigens.
    As opposed to T-cell abundance, intratumoral TCR diversity was predictive of OS
    in multiple PDAC cohorts, and a subset of TCRs enriched in high-diversity patients
    independently correlated with OS. These findings emphasize the importance of evaluating
    peripheral and intratumoral TCR repertoires as distinct and relevant biomarkers
    in PDAC.
'38637691':
  featured: false
  tags:
  - Immune Response
  - TCR
  - BCR
  - Single-Cell
  links:
    pdf: https://github.com/ncborcherding/borcherding/blob/master/content/publication/irac2024single.pdf
  highlight: Single-cell T cell and B cell antigen receptor-sequencing data analysis
    can potentially perform in-depth assessments of adaptive immune cells that inform
    on understanding immune cell development to tracking clonal expansion in disease
    and therapy.
  abstract: Single-cell T cell and B cell antigen receptor-sequencing data analysis
    can potentially perform in-depth assessments of adaptive immune cells that inform
    on understanding immune cell development to tracking clonal expansion in disease
    and therapy. However, it has been extremely challenging to analyze and interpret
    T cells and B cells and their adaptive immune receptor repertoires at the single-cell
    level due to not only the complexity of the data but also the underlying biology.
    In this Review, we delve into the computational breakthroughs that have transformed
    the analysis of single-cell T cell and B cell antigen receptor-sequencing data.
'38641668':
  featured: false
  tags:
  - autoimmunity
  - TCR
  - Single-Cell
  links:
    pdf: https://github.com/ncborcherding/borcherding/blob/master/content/publication/kim2024single.pdf
  highlight: Childhood Sjögren’s disease represents critically unmet medical needs
    due to a complete lack of immunological and molecular characterizations.
  abstract: Childhood Sjögren’s disease represents critically unmet medical needs
    due to a complete lack of immunological and molecular characterizations. This
    study presents key immune cell subsets and their interactions in the periphery
    in childhood Sjögren’s disease. Here we show that single-cell RNA sequencing identifies
    the subsets of IFN gene-enriched monocytes, CD4+ T effector memory, and XCL1+
    NK cells as potential key players in childhood Sjögren’s disease, and especially
    in those with recurrent parotitis, which is the chief symptom prompting clinical
    visits from young children. A unique cluster of monocytes with type I and II IFN-related
    genes is identified in childhood Sjögren’s disease, compared to the age-matched
    control. In vitro regulatory T cell functional assay demonstrates intact functionality
    in childhood Sjögren’s disease in contrast to reduced suppression in adult Sjögren’s
    disease. Mapping this transcriptomic landscape and interplay of immune cell subsets
    will expedite the understanding of childhood Sjögren’s disease pathogenesis and
    set the foundation for precision medicine.
'38776511':
  featured: false
  tags:
  - AML
  - Myeloid Neoplasia
  - Single-Cell
  - TCR
  - Immune Response
  links:
    pdf: https://github.com/ncborcherding/borcherding/blob/master/content/publication/mazziotta2024cd8/mazziotta2024cd8.pdf
  highlight: The interplay between T-cell states of differentiation, dysfunction,
    and treatment response in acute myeloid leukemia (AML) remains unclear.
  abstract: The interplay between T-cell states of differentiation, dysfunction, and
    treatment response in acute myeloid leukemia (AML) remains unclear. Here, we leveraged
    a multimodal approach encompassing high-dimensional flow cytometry and single-cell
    transcriptomics and found that early memory CD8+ T cells are associated with therapy
    response and exhibit a bifurcation into 2 distinct terminal end states. One state
    is enriched for markers of activation, whereas the other expresses natural killer
    (NK)-like and senescence markers. The skewed clonal differentiation trajectory
    toward CD8+ senescence was also a hallmark indicative of therapy resistance. We
    validated these findings by generating an AML CD8+ single-cell atlas integrating
    our data and other independent data sets. Finally, our analysis revealed that
    an imbalance between CD8+ early memory and senescent-like cells is linked to AML
    treatment refractoriness and poor survival. Our study provides crucial insights
    into the dynamics of CD8+ T-cell differentiation and advances our understanding
    of CD8+ T-cell dysfunction in AML.
'39164479':
  featured: true
  tags:
  - TCR
  - Single-Cell
  - Immunology
  - Immune response
  links:
    code: https://github.com/ncborcherding/COVID_TCR
    pdf: https://github.com/ncborcherding/borcherding/blob/master/content/publication/borcherding2024CD4/borcherding2024CD4.pdf
  highlight: Severe acute respiratory syndrome coronavirus 2 (SARS-CoV-2) infection
    and mRNA vaccination induce robust CD4+ T cell responses.
  abstract: Severe acute respiratory syndrome coronavirus 2 (SARS-CoV-2) infection
    and mRNA vaccination induce robust CD4+ T cell responses. Using single-cell transcriptomics,
    here, we evaluated CD4+ T cells specific for the SARS-CoV-2 spike protein in the
    blood and draining lymph nodes (dLNs) of individuals 3 months and 6 months after
    vaccination with the BNT162b2 mRNA vaccine. We analyzed 1,277 spike-specific CD4+
    T cells, including 238 defined using Trex, a deep learning-based reverse epitope
    mapping method to predict antigen specificity. Human dLN spike-specific CD4+ follicular
    helper T (TFH) cells exhibited heterogeneous phenotypes, including germinal center
    CD4+ TFH cells and CD4+IL-10+ TFH cells. Analysis of an independent cohort of
    SARS-CoV-2-infected individuals 3 months and 6 months after infection found spike-specific
    CD4+ T cell profiles in blood that were distinct from those detected in blood
    3 months and 6 months after BNT162b2 vaccination. Our findings provide an atlas
    of human spike-specific CD4+ T cell transcriptional phenotypes in the dLNs and
    blood following SARS-CoV-2 vaccination or infection.
'39223312':
  featured: false
  tags:
  - Metabolism
  - Mitochondria
  - Metabolomics
  links:
    pdf: https://github.com/ncborcherding/borcherding/blob/master/content/publication/nakai2024mitochondria/nakai2024mitochondria.pdf
  highlight: Mitochondria transfer is a recently described phenomenon in which donor
    cells deliver mitochondria to acceptor cells.
  abstract: Mitochondria transfer is a recently described phenomenon in which donor
    cells deliver mitochondria to acceptor cells. One possible consequence of mitochondria
    transfer is energetic support of neighbouring cells; for example, exogenous healthy
    mitochondria can rescue cell-intrinsic defects in mitochondrial metabolism in
    cultured ρ0 cells or Ndufs4−/− peritoneal macrophages. Exposing haematopoietic
    stem cells to purified mitochondria before autologous haematopoietic stem cell
    transplantation allowed for treatment of anaemia in patients with large-scale
    mitochondrial DNA mutations, and mitochondria transplantation was shown to minimize
    ischaemic damage to the heart, brain and limbs. However, the therapeutic potential
    of using mitochondria transfer-based therapies to treat inherited mitochondrial
    diseases is unclear. Here we demonstrate improved morbidity and mortality of the
    Ndufs4−/− mouse model of Leigh syndrome (LS) in multiple treatment paradigms associated
    with mitochondria transfer. Transplantation of bone marrow from wild-type mice,
    which is associated with release of haematopoietic cell-derived extracellular
    mitochondria into circulation and transfer of mitochondria to host cells in multiple
    organs, ameliorates LS in mice. Furthermore, administering isolated mitochondria
    from wild-type mice extends lifespan, improves neurological function and increases
    energy expenditure of Ndufs4−/− mice, whereas mitochondria from Ndufs4−/− mice
    did not improve neurological function. Finally, we demonstrate that cross-species
    administration of human mitochondria to Ndufs4−/− mice also improves LS. These
    data suggest that mitochondria transfer-related approaches can be harnessed to
    treat mitochondrial diseases, such as LS.
'39376916':
  featured: false
  tags:
  - microenvironment
  - Single-Cell
  - Immunology
  - Immune response
  links:
    pdf: https://github.com/ncborcherding/borcherding/blob/master/content/publication/kim2024leveraging/kim2024leveraging.pdf
  highlight: Single-cell RNA sequencing (scRNA-seq) has become an essential tool for
    uncovering the complexities of various physiological and immunopathological conditions
    in veterinary medicine.
  abstract: Single-cell RNA sequencing (scRNA-seq) has become an essential tool for
    uncovering the complexities of various physiological and immunopathological conditions
    in veterinary medicine. However, there is currently limited information on immune-suppressive
    cancer subsets in canine breast cancers. In this study, we aimed to identify and
    characterize immune-suppressive subsets of triple-negative canine breast cancer
    (TNBC) by utilizing integrated scRNA-seq data from published datasets. Published
    scRNA-seq datasets, including data from six groups of 30 dogs, were subjected
    to integrated bioinformatic analysis. Immune modulatory TNBC subsets were identified
    through functional enrichment analysis using immune-suppressive gene sets, including
    those associated with anti-inflammatory and M2-like macrophages. Key immune-suppressive
    signaling, such as viral infection, angiogenesis, and leukocyte chemotaxis, was
    found to play a role in enabling TNBC to evade immune surveillance. In addition,
    interactome analysis revealed significant interactions between distinct subsets
    of cancer cells and effector T cells, suggesting potential T-cell suppression.
    The present study demonstrates a versatile and scalable approach to integrating
    and analyzing scRNA-seq data, which successfully identified immune-modulatory
    subsets of canine TNBC. It also revealed potential mechanisms through which TNBC
    promotes immune evasion in dogs. These findings are crucial for advancing the
    understanding of the immune pathogenesis of canine TNBC and may aid in the development
    of new immune-based therapeutic strategies.
'39529512':
  featured: false
  tags:
  - Immune Response
  - Immunotherapy
  - Single-Cell
  - TCR
  links:
    pdf: https://github.com/ncborcherding/borcherding/blob/master/content/publication/corvino2024type/corvino2024type.pdf
  highlight: Head and neck squamous cell carcinoma (HNSCC) is linked to human papillomavirus
    (HPV) infection.
  abstract: Head and neck squamous cell carcinoma (HNSCC) is linked to human papillomavirus
    (HPV) infection. HPV-positive and HPV-negative HNSCC exhibit distinct molecular
    and clinical characteristics. Although checkpoint inhibitors have shown efficiency
    in recurrent/metastatic HNSCC, response variability persists regardless of HPV
    status. This study aimed to explore the CD8+ T-cell landscape in HPV-negative
    HNSCC. We performed simultaneous single-cell RNA and TCR sequencing of CD8+ tumor-infiltrating
    lymphocytes (TILs) from treatment-naïve HPV-negative HNSCC patients. Additionally,
    cells were stimulated ex vivo, which allowed for the tracking of clonal transcriptomic
    responses. Our analysis identified a subset of CD8+ TILs highly enriched for interferon-stimulated
    genes (ISG). TCR analysis revealed ISG cells are clonally related to a population
    of granzyme K (GZMK)-expressing cells. However, unlike GZMK cells, which exhibited
    rapid effector-like phenotypes following stimulation, ISG cells were transcriptionally
    inert. Additionally, ISG cells showed specific enrichment within tumor and were
    found across multiple tumor entities. ISG-enriched CD8+ TILs are a consistent
    feature of various tumor entities. These cells are poorly understood but possess
    characteristics that may impact antitumor immunity. Understanding the unique properties
    and functionality of ISG cells could offer innovative treatment approaches to
    improve patient outcomes in HPV-negative HNSCC and other cancer types.
'39626355':
  featured: false
  tags:
  - AML
  - Myeloid Neoplasia
  - Metabolomics
  links:
    pdf: https://github.com/ncborcherding/borcherding/blob/master/content/publication/wang2025tifab/wang2025tifab.pdf
  highlight: Tumor necrosis factor (TNF) receptor–associated factor (TRAF)–interacting
    protein with forkhead-associated domain B (TIFAB), an inhibitor of NF-κB signaling,
    plays critical roles in hematopoiesis, myelodysplastic neoplasms, and leukemia.
  abstract: Tumor necrosis factor (TNF) receptor–associated factor (TRAF)–interacting
    protein with forkhead-associated domain B (TIFAB), an inhibitor of NF-κB signaling,
    plays critical roles in hematopoiesis, myelodysplastic neoplasms, and leukemia.
    We previously demonstrated that Tifab enhances KMT2A::MLLT3–driven acute myeloid
    leukemia (AML) by either upregulating Hoxa9 or through ubiquitin-specific peptidase
    15–mediated downregulation of p53 signaling. In this study, we show that Tifab
    deletion in KMT2A::MLLT3–induced AML impairs leukemia stem/progenitor cell (LSPC)
    engraftment, glucose uptake, and mitochondrial function. Gene set enrichment analysis
    reveals that Tifab deletion downregulates MYC, HOXA9/MEIS1, mTORC1 signaling,
    and genes involved in glycolysis and oxidative phosphorylation. By comparing genes
    upregulated in TIFAB-overexpressing LSPCs with those downregulated upon Tifab
    deletion, we identify hepatocyte nuclear factor 4 alpha (Hnf4a) as a key TIFAB
    target, regulated through the inhibition of NF-κB component RelB, which suppresses
    Hnf4a in leukemia cells. HNF4A, a nuclear receptor involved in organ development,
    metabolism, and tumorigenesis, rescues the metabolic defects caused by Tifab deletion
    and enhances leukemia cell engraftment. Conversely, Hnf4a knockdown attenuates
    TIFAB-mediated enhancement of LSPC function. These findings highlight the critical
    role of the TIFAB-HNF4A axis in KMT2A::MLLT3–induced AML and uncover a novel regulator
    in leukemia biology.
'40022134':
  featured: false
  tags:
  - Immune Response
  - Autoimmunity
  - Single-Cell
  links:
    pdf: https://github.com/ncborcherding/borcherding/blob/master/content/publication/upadhye2025myelin/upadhye2025myelin.pdf
  highlight: Multiple sclerosis (MS), an autoimmune demyelinating disease of the central
    nervous system, is modeled in mice as experimental autoimmune encephalomyelitis
    (EAE).
  abstract: Multiple sclerosis (MS), an autoimmune demyelinating disease of the central
    nervous system, is modeled in mice as experimental autoimmune encephalomyelitis
    (EAE). While CD4+ T cells, primarily Th1 and Th17 subsets, drive disease pathogenesis,
    the exact function of CD8+ T cells remains unclear. We previously demonstrated
    that adoptively transferred myelin-reactive CD8+ T cells (PLP-CD8) prevent EAE
    induction and suppress ongoing disease through the engagement of MHC Class-I in
    recipient mice. Here, we show that PLP-CD8 induce regulatory changes in both subsets
    of conventional dendritic cells (cDC1 and CD11b+ cDC) in vivo and in vitro. Adoptively
    transferred PLP-CD8 promoted both cDC subsets to adopt a mature and regulatory
    phenotype with an anti-inflammatory cytokine profile and a reduced capacity to
    support CD4+ T cell proliferation. In vitro, PLP-CD8 induced similar phenotypic
    changes in both cDC subsets in an antigen-specific, dose-dependent manner. PLP-CD8
    directly interacted with cDC1 and indirectly influenced CD11b+ cDC through paracrine
    signaling. Notably, direct interaction with PLP-CD8 had detrimental effects on
    CD11b+ cDC. Single-cell RNA sequencing revealed upregulation of key immunoregulatory
    genes, such as Foxo3, in both cDC subsets with enrichment of pathways involved
    in immune regulation and T cell differentiation. Our study highlights a novel
    mechanism in which myelin-reactive CD8+ T cells directly interact with cDC1 and
    modulate CD11b+ cDC through paracrine mechanisms to induce mature, regulatory
    dendritic cells, which leads to inhibited CD4+ T cell responses and reduced EAE
    pathogenesis.
