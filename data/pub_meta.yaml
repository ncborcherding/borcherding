  - HER2
  - receptor tyrosine kinase
  - Breast cancer
  links:
    pdf: https://github.com/ncborcherding/borcherding/blob/master/content/publication/borcherding2015transcriptome/borcherding2015transcriptome.pdf
  highlight: Breast cancer is the leading cause of cancer-related mortality for females
    worldwide.
  abstract: Breast cancer is the leading cause of cancer-related mortality for females
    worldwide. Improving early screening strategies and understanding the events that
    lead to tumor initiation have led to demonstrable improvements in clinical outcome.
    Our previous work revealed a variance in the tumorigenic capacity between different
    mammary epithelial cell populations in an MMTV-ErbB2 mouse model. In order to
    greater understand how different mammary epithelial cells influence the tumorigenic
    capacity in ErbB2-induced breast cancer, we transplanted different cell populations
    from pre-neoplastic MMTV-ErbB2 female mice into recipient mice for tumorigenic
    study. We found that different mammary epithelial cells bear different tumorigenic
    potentials even when induced by the same ErbB2 proto-oncogene. To understand the
    difference in tumors formed from different epithelial cells, we performed gene
    expression profiling using these tumors (GSE64487). Several genes were further
    validated using real-time reverse transcription polymerase chain reaction (RT-PCR).
    Here we provide further details on the experimental methods and microarray analysis.
    This data provides a resource to further understanding how different mammary cell
    populations can initiate ErbB2-driven tumors and the role of these cell populations
    as putative tumor-initiating cells (TICs).
