'31137681':
  featured: false
  tags:
  - cancer
  - breast cancer
  links:
    pdf: https://github.com/ncborcherding/borcherding/blob/master/content/publication/pandey2019ror1/pandey2019ror1.pdf
  highlight: Among all breast cancer types, basal-like breast cancer (BLBC) represents
    an aggressive subtype that lacks targeted therapy.
  abstract: Among all breast cancer types, basal-like breast cancer (BLBC) represents
    an aggressive subtype that lacks targeted therapy. We and others have found that
    receptor tyrosine kinase-like orphan receptor 1 (ROR1) is overexpressed in BLBC
    and other types of cancer and that ROR1 is significantly correlated with patient
    prognosis. In addition, using primary patient-derived xenografts (PDXs) and ROR1-knockout
    BLBC cells, we found that ROR1+ cells form tumors in immunodeficient mice. We
    developed an anti-ROR1 immunotoxin and found that targeting ROR1 significantly
    kills ROR1+ cancer cells and slows down tumor growth in ROR1+ xenografts. Our
    bioinformatics analysis revealed that ROR1 expression is commonly associated with
    the activation of FGFR-mediated signaling pathway. Further biochemical analysis
    confirmed that ROR1 stabilized FGFR expression at the posttranslational level
    by preventing its degradation. CRISPR/Cas9-mediated ROR1 knockout significantly
    reduced cancer cell invasion at cellular levels by lowering FGFR protein and consequent
    inactivation of AKT. Our results identified a novel signaling regulation from
    ROR1 to FGFR and further confirm that ROR1 is a potential therapeutic target for
    ROR1+ BLBC cells.
'31449970':
  featured: false
  tags:
  - cancer
  links:
    pdf: https://github.com/ncborcherding/borcherding/blob/master/content/publication/liu2019identification/liu2019identification.pdf
  highlight: Transforming growth factor-β (TGF-β) signaling plays fundamental roles
    in the development and homeostasis of somatic cells.
  abstract: Transforming growth factor-β (TGF-β) signaling plays fundamental roles
    in the development and homeostasis of somatic cells. Dysregulated TGF-β signaling
    contributes to cancer progression and relapse to therapies by inducing epithelial-to-mesenchymal
    transition (EMT), enriching cancer stem cells, and promoting immunosuppression.
    Although many TGF-β-regulated genes have been identified, only a few datasets
    were obtained by next-generation sequencing. In this study, we performed RNA-sequencing
    analysis of MCF10A cells and identified 1166 genes that were upregulated and 861
    genes that were downregulated by TGF-β. Gene set enrichment analysis revealed
    that focal adhesion and metabolic pathways were the top enriched pathways of the
    up- and downregulated genes, respectively. Genes in these pathways also possess
    significant predictive value for renal cancers. Moreover, we confirmed that TGF-β
    induced expression of MICAL1 and 2, and the histone demethylase, KDM7A, and revealed
    their regulatory roles on TGF-β-induced cell migration. We also show a critical
    effect of KDM7A in regulating the acetylation of H3K27 on TGF-β-induced genes.
    In sum, this study identified novel effectors that mediate the pro-migratory role
    of TGF-β signaling, paving the way for future studies that investigate the function
    of MICAL family members in cancer and the novel epigenetic mechanisms downstream
    TGF-β signaling.
'31527591':
  featured: false
  tags:
  - cancer
  links:
    pdf: https://github.com/ncborcherding/borcherding/blob/master/content/publication/jianling2019metadherin/jianling2019metadherin.pdf
  highlight: Ferroptosis is an iron-dependent, non-apoptotic form of regulated cell
    death driven by lipid hydroperoxides within biological membranes.
  abstract: Ferroptosis is an iron-dependent, non-apoptotic form of regulated cell
    death driven by lipid hydroperoxides within biological membranes. Although therapy-resistant
    mesenchymal-high cancers are particularly vulnerable to ferroptosis inducers,
    especially phospholipid glutathione peroxidase 4 (GPx4) inhibitors, the underlying
    mechanism is yet to be deciphered. As such, the full application of GPx4 inhibitors
    in cancer therapy remains challenging. Here we demonstrate that metadherin (MTDH)
    confers a therapy-resistant mesenchymal-high cell state and enhanced sensitivity
    to inducers of ferroptosis. Mechanistically, MTDH inhibited GPx4, as well as the
    solute carrier family 3 member 2 (SLC3A2, a system Xc- heterodimerization partner),
    at both the messenger RNA and protein levels. Our metabolomic studies demonstrated
    that MTDH reduced intracellular cysteine, but increased glutamate levels, ultimately
    decreasing levels of glutathione and setting the stage for increased vulnerability
    to ferroptosis. Finally, we observed an enhanced antitumor effect when we combined
    various ferroptosis inducers both in vitro and in vivo; the level of MTDH correlated
    with the ferroptotic effect. We have demonstrated for the first time that MTDH
    enhances the vulnerability of cancer cells to ferroptosis and may serve as a therapeutic
    biomarker for future ferroptosis-centered cancer therapy.
'31619506':
  featured: false
  tags:
  - cancer
  - breast cancer
  links:
    pdf: https://github.com/ncborcherding/borcherding/blob/master/content/publication/wu2020tfap2c/wu2020tfap2c.pdf
  highlight: The AP-2γ transcription factor, encoded by the TFAP2C gene, regulates
    the expression of estrogen receptor-alpha (ERα) and other genes associated with
    hormone response in luminal breast cancer.
  abstract: The AP-2γ transcription factor, encoded by the TFAP2C gene, regulates
    the expression of estrogen receptor-alpha (ERα) and other genes associated with
    hormone response in luminal breast cancer. Little is known about the role of AP-2γ
    in other breast cancer subtypes. A subset of HER2+ breast cancers with amplification
    of the TFAP2C gene locus becomes addicted to AP-2γ. Herein, we sought to define
    AP-2γ gene targets in HER2+ breast cancer and identify genes accounting for physiologic
    effects of growth and invasiveness regulated by AP-2γ. Comparing HER2+ cell lines
    that demonstrated differential response to growth and invasiveness with knockdown
    of TFAP2C, we identified a set of 68 differentially expressed target genes. CDH5
    and CDKN1A were among the genes differentially regulated by AP-2γ and that contributed
    to growth and invasiveness. Pathway analysis implicated the MAPK13/p38δ and retinoic
    acid regulatory nodes, which were confirmed to display divergent responses in
    different HER2+ cancer lines. To confirm the clinical relevance of the genes identified,
    the AP-2γ gene signature was found to be highly predictive of outcome in patients
    with HER2+ breast cancer. We conclude that AP-2γ regulates a set of genes in HER2+
    breast cancer that drive cancer growth and invasiveness. The AP-2γ gene signature
    predicts outcome of patients with HER2+ breast cancer and pathway analysis predicts
    that subsets of patients will respond to drugs that target the MAPK or retinoic
    acid pathways.
'31697816':
  featured: false
  tags:
  - cancer
  links:
    pdf: https://github.com/ncborcherding/borcherding/blob/master/content/publication/xiu2020coactivation/xiu2020coactivation.pdf
  highlight: NF-κB and Notch signaling can be simultaneously activated in a variety
    of B-cell lymphomas.
  abstract: NF-κB and Notch signaling can be simultaneously activated in a variety
    of B-cell lymphomas. Patients with B-cell lymphoma occasionally develop clonally
    related myeloid tumors with poor prognosis. Whether concurrent activation of both
    pathways is sufficient to induce B-cell transformation and whether the signaling
    initiates B-myeloid conversion in a pathological context are largely unknown.
    Here, we provide genetic evidence that concurrent activation of NF-κB and Notch
    signaling in committed B cells is sufficient to induce B-cell lymphomatous transformation
    and primes common progenitor cells to convert to myeloid lineage through dedifferentiation,
    not transdifferentiation. Intriguingly, the converted myeloid cells can further
    transform, albeit at low frequency, into myeloid leukemia. Mechanistically, coactivation
    of NF-κB and Notch signaling endows committed B cells with the ability to self
    renew. Downregulation of BACH2, a lymphoma and myeloid gene suppressor, but not
    upregulation of CEBPα and/or downregulation of B-cell transcription factors, is
    an early event in both B-cell transformation and myeloid conversion. Interestingly,
    a DNA hypomethylating drug not only effectively eliminated the converted myeloid
    leukemia cells, but also restored the expression of green fluorescent protein,
    which had been lost in converted myeloid leukemia cells. Collectively, our results
    suggest that targeting NF-κB and Notch signaling will not only improve lymphoma
    treatment, but also prevent the lymphoma-to-myeloid tumor conversion. Importantly,
    DNA hypomethylating drugs might efficiently treat these converted myeloid neoplasms.
