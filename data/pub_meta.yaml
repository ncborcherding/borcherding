  - breast cancer
  - Wnt signaling
  links:
    pdf: https://github.com/ncborcherding/borcherding/blob/master/content/publication/kluz2020cancer/kluz2020cancer.pdf
  highlight: Aiming to identify immune molecules with a novel function in cancer pathogenesis,
    we found the cluster of differentiation 177 (CD177), a known neutrophil antigen,
    to be positively correlated with relapse-free, metastasis-free, or overall survival
    in breast cancer.
  abstract: Aiming to identify immune molecules with a novel function in cancer pathogenesis,
    we found the cluster of differentiation 177 (CD177), a known neutrophil antigen,
    to be positively correlated with relapse-free, metastasis-free, or overall survival
    in breast cancer. In addition, CD177 expression is correlated with good prognosis
    in several other solid cancers including prostate, cervical, and lung. Focusing
    on breast cancer, we found that CD177 is expressed in normal breast epithelial
    cells and is significantly reduced in invasive cancers. Loss of CD177 leads to
    hyperproliferative mammary epithelium and contributes to breast cancer pathogenesis.
    Mechanistically, we found that CD177-deficiency is associated with an increase
    in β-catenin signaling. Here we identified CD177 as a novel regulator of mammary
    epithelial proliferation and breast cancer pathogenesis likely via the modulation
    of Wnt/β-catenin signaling pathway, a key signaling pathway involved in multiple
    cancer types.
'32060884':
  featured: false
  tags:
  - cancer
  - Microenvironment
  - Immunotherapy
  - Review
  links:
    pdf: https://github.com/ncborcherding/borcherding/blob/master/content/publication/zhang2021IL1/zhang2021IL1.pdf
  highlight: Interleukin 1 (IL-1) has long been known for its pleiotropic effects
    on inflammation that plays a complex, and sometimes contrasting, role in different
    stages of cancer development.
  abstract: Interleukin 1 (IL-1) has long been known for its pleiotropic effects on
    inflammation that plays a complex, and sometimes contrasting, role in different
    stages of cancer development. As a major proinflammatory cytokine, IL-1β is mainly
    expressed by innate immune cells. IL-1α, however, is expressed by various cell
    types under physiological and pathological conditions. IL-1R1 is the main receptor
    for both ligands and is expressed by various cell types, including innate and
    adaptive immune cell types, epithelial cells, endothelial cells, adipocytes, chondrocytes,
    fibroblasts, etc. IL-1 and IL-1R1 receptor interaction leads to a set of common
    signaling pathways, mainly the NF-kB and MAP kinase pathways, as a result of complex
    positive and negative regulations. The variety of cell types with IL-1R1 expression
    dictates the role of IL-1 signaling at different stages of cancer, which under
    certain circumstances leads to contrasting roles in tumor development. Recent
    availability of IL-1R1 conditional knockout mouse model has made it possible to
    dissect the role of IL-1/IL-1R1 signaling transduction in different cell types
    within the tumor microenvironment. This chapter will focus on the role of IL-1/IL-1R1
    in different cell types within the tumor microenvironment and discuss the potential
    of targeting this pathway in cancer therapy.
'32453712':
  featured: false
  tags:
  - Single-Cell
  - alopecia
  - autoimmune
  - TCR
  links:
    pdf: https://github.com/ncborcherding/borcherding/blob/master/content/publication/borcherding2020transcriptomic/borcherding2020transcriptomic.pdf
  highlight: Alopecia areata (AA) is a common autoimmune condition, presenting initially
    with loss of hair without other overt skin changes.
  abstract: Alopecia areata (AA) is a common autoimmune condition, presenting initially
    with loss of hair without other overt skin changes. The unremarkable appearance
    of the skin surface contrasts with the complex immune activity occurring at the
    hair follicle. AA pathogenesis is due to the loss of immune privilege of the hair
    follicle, leading to autoimmune attack. Although the literature has focused on
    CD8+ T cells, vital roles for CD4+ T cells and antigen-presenting cells have been
    suggested. Here, we use single-cell sequencing to reveal distinct expression profiles
    of immune cells in murine AA. We found clonal expansions of both CD4+ and CD8+
    T cells, with shared clonotypes across varied transcriptional states. The murine
    AA data were used to generate highly predictive models of human AA disease. Finally,
    single-cell sequencing of T cells in human AA recapitulated the clonotypic findings
    and the gene expression of the predictive models.
'32457830':
  featured: false
  tags:
  - cancer
  - immunotherapy
  - Review
  links:
    pdf: https://github.com/ncborcherding/borcherding/tree/master/content/publication/vikas2020therapeutic
  highlight: Immunotherapy has revolutionized the treatment of both hematological
    malignancies and solid tumors.
  abstract: Immunotherapy has revolutionized the treatment of both hematological malignancies
    and solid tumors. The use of immunotherapy has improved outcome for patients with
    cancer across multiple tumor types, including lung, melanoma, ovarian, genitourinary,
    and more recently breast cancer with durable responses seen even in patients with
    widespread metastatic disease. Despite the promising results, immunotherapy still
    helps only a subset of patients due to overall low response rates. Moreover, the
    response to immunotherapy is highly cancer specific and results have not been
    as promising in cancers that are considered less immunogenic. The strategies to
    improve immunotherapy responses have focused on biomarker selection, like PD-L1
    status, and usage of combinatorial agents, such as chemotherapy, targeted therapy,
    and radiotherapy. Of particular interest, DNA-damaging agents have the potential
    to enhance the response to immunotherapy by promoting neoantigen release, increasing
    tumor mutational burden, and enhancing PD-L1 expression. Poly-ADP-ribose polymerase
    (PARP) inhibitors are one such class of drugs that has shown synergy with immunotherapy
    in preclinical and early clinical studies. PARP-based therapies work through the
    inhibition of single-strand DNA repair leading to DNA damage, increased tumor
    mutational burden, making the tumor a more attractive target for immunotherapy.
    Of the solid tumors reviewed, breast, ovarian, and prostate cancers have demonstrated
    efficacy in the combination of PARP inhibition and immunotherapy, predominately
    in BRCA-mutated tumors. However, initial investigations into wildtype BRCA and
    gastrointestinal tumors have shown moderate overall response or disease control
    rates, dependent on the tumor type. In contrast, although a number of clinical
    trials underway, there is a paucity of published results for the use of the combination
    in lung or urothelial cancers. Overall this article focuses on the promise of
    combinatorial PARP inhibition and immunotherapy to improve patient outcomes in
    solid tumors, summarizing both early results and looking toward ongoing trials.
'32719138':
  featured: false
  tags:
  - Immune Response
  - Immunotherapy
  links:
    pdf: https://github.com/ncborcherding/borcherding/blob/master/content/publication/crawford2020cd4/crawford2020cd4.pdf
  highlight: Untoward effector CD4+ T cell responses are kept in check by immune regulatory
    mechanisms mediated by CD4+ and CD8+ T cells.
  abstract: Untoward effector CD4+ T cell responses are kept in check by immune regulatory
    mechanisms mediated by CD4+ and CD8+ T cells. CD4+ T helper 17 (Th17) cells, characterized
    by IL-17 production, play important roles in the pathogenesis of autoimmune diseases
    (such as arthritis, multiple sclerosis, psoriasis, inflammatory bowel disease,
    among others) and in the host response to infection and cancer. Here, we demonstrate
    that human CD4+ T cells cells exposed to a Th17-differentiating milieu are significantly
    more resistant to immune suppression by CD8+ T cells compared to control Th0 cells.
    This resistance is mediated, in part, through the action of IL-17A, IL-17F, and
    IL-17AF heterodimer through their receptors (IL-17RA and IL-17RC) on CD4+ T cells
    themselves, but not through their action on CD8+ T cells or APC. We further show
    that IL-17 can directly act on non-Th17 effector CD4+ T cells to induce suppressive
    resistance, and this resistance can be reversed by blockade of IL-1β, IL-6, or
    STAT3. These studies reveal a role for IL-17 cytokines in mediating CD4-intrinsic
    immune resistance. The pathways induced in this process may serve as a critical
    target for future investigation and immunotherapeutic intervention.
'32789006':
  featured: true
  tags:
  - Single-Cell
  - TCR
  - BCR
  - Software
  links:
    code: https://github.com/BorchLab/scRepertoire
    pdf: https://github.com/ncborcherding/borcherding/blob/master/content/publication/borcherding2020screpertoire/borcherding2020screpertoire.pdf
  highlight: Single-cell sequencing is an emerging technology in the field of immunology
    and oncology that allows researchers to couple RNA quantification and other modalities,
    like immune cell receptor profiling at the level of an individual cell.
  abstract: Single-cell sequencing is an emerging technology in the field of immunology
    and oncology that allows researchers to couple RNA quantification and other modalities,
    like immune cell receptor profiling at the level of an individual cell. A number
    of workflows and software packages have been created to process and analyze single-cell
    transcriptomic data. These packages allow users to take the vast dimensionality
    of the data generated in single-cell-based experiments and distill the data into
    novel insights. Unlike the transcriptomic field, there is a lack of options for
    software that allow for single-cell immune receptor profiling. Enabling users
    to easily combine mRNA and immune profiling, scRepertoire was built to process
    data derived from 10x Genomics Chromium Immune Profiling for both T-cell receptor
    (TCR) and immunoglobulin (Ig) enrichment workflows and subsequently interacts
    with a number of popular R packages for single-cell expression, such as Seurat.
    The scRepertoire R package and processed data are open source and available on
    GitHub and provides in-depth tutorials on the capability of the package.
'33120998':
  featured: false
  tags:
  - cancer
  - Immunotherapy
  links:
    pdf: https://github.com/ncborcherding/borcherding/blob/master/content/publication/swami2020multivariable/swami2020multivariable.pdf
  highlight: Recently antibiotic exposure has been associated with worse outcomes
    in patients undergoing treatment with antibodies directed against programmed cell
    death protein-1 (PD-1).
  abstract: Recently antibiotic exposure has been associated with worse outcomes in
    patients undergoing treatment with antibodies directed against programmed cell
    death protein-1 (PD-1). We reviewed data of 1264 patients enrolled at Melanoma
    Skin and Ocular Tissue Repositories at University of Iowa Hospitals and Clinic.
    Reviewed data included patient demographics, prior medical history, baseline hematologic
    and disease parameters and outcomes including progression-free survival (PFS)
    and overall survival (OS). Cox regression models were used to determine predictive
    markers. Overall, 169 patients with advanced cutaneous melanoma received anti-PD-1
    based therapies. Median follow up was 18.46 (range 0.89 to 62.52) months. On multivariable
    analysis brain metastasis, higher absolute neutrophil count (ANC) and lower absolute
    lymphocyte count were associated with poorer PFS while brain and liver metastasis
    and lower albumin were associated with poorer OS. Prior antibiotics, radiation
    as well as age, gender, basal metabolic index (BMI), smoking status, BRAF mutation,
    line of therapy (first or latter), prior treatments (ipilimumab or BRAF inhibitors),
    hemoglobin, neutrophil-to-lymphocyte ratio, white blood cell, platelet and eosinophil
    counts were not associated with PFS or OS in multivariable analysis. Contrary
    to some prior studies BMI, radiation, and antibiotics were not associated with
    PFS or OS.
'33193343':
  featured: false
  tags:
  - Autoimmune
  links:
    pdf: https://github.com/ncborcherding/borcherding/blob/master/content/publication/renavikar202012/renavikar202012.pdf
  highlight: Autoimmune diseases are characterized by regulatory deficit in both the
    CD4+ and CD8+ T-cell compartments.
  abstract: Autoimmune diseases are characterized by regulatory deficit in both the
    CD4+ and CD8+ T-cell compartments. We have shown that CD8+ T-cells associated
    with acute relapse of multiple sclerosis are significantly deficient in their
    immune suppressive ability. We hypothesized that distinct CD8+ cytotoxic T-cell
    (Tc) lineages, determined by cytokine milieu during naïve T-cell differentiation,
    may harbor differential ability to suppress effector CD4+ T-cells. We differentiated
    purified human naïve CD8+ T-cells in vitro toward Tc0 (media control), Tc1 and
    Tc17 lineages. Using in vitro flow cytometric suppression assays, we observed
    that Tc0 and Tc17 cells had similar suppressive ability. In contrast, Tc1 cells
    showed significant loss of suppressive ability against ex vivo CD4+ T-cells and
    in vitro-differentiated Th0, Th1 and Th17 cells. Of note, Tc1 cells were also
    suboptimal in suppressing CD4-induced acute xenogeneic graft versus host disease
    (xGVHD) in vivo. Tc subtypes derived under various cytokine combinations revealed
    that IL-12-containing conditions resulted in less suppressive cells exhibiting
    dysregulated cytotoxic degranulation. RNA sequencing transcriptome analyses indicated
    differential regulation of inflammatory genes and enrichment in GM-CSF-associated
    pathways. These studies provide insights into the role of T-cell differentiation
    in CD8 suppressive biology and may reveal therapeutically targetable pathways
    to reverse suppressive deficit during immune-mediated disease.
'33239864':
  featured: false
  tags:
  - COVID-19
  - Review
  - Immune Response
  links:
    code: https://github.com/ncborcherding/COVIDreview
    pdf: https://github.com/ncborcherding/borcherding/blob/master/content/publication/borcherding2020repurposing/borcherding2020repurposing.pdf
  highlight: The novel coronavirus disease 2019 (COVID-19) pandemic has caused catastrophic
    damage to human life across the globe along with social and financial hardships.
  abstract: The novel coronavirus disease 2019 (COVID-19) pandemic has caused catastrophic
    damage to human life across the globe along with social and financial hardships.
    According to the Johns Hopkins University Coronavirus Resource Center, more than
    41.3 million people worldwide have been infected, and more than 1,133,000 people
    have died as of October 22, 2020. At present, there is no available vaccine and
    a scarcity of efficacious therapies. However, there is tremendous ongoing effort
    towards identifying effective drugs and developing novel vaccines. Early data
    from Adaptive COVID-19 Treatment Trials (ACTT) sponsored by the National Institute
    of Allergy and Infectious Diseases (NIAID) and compassionate use study have shown
    promise for remdesivir, leading to emergency authorization by the Food and Drug
    Administration (FDA) for treatment of hospitalized COVID-19 patients. However,
    several randomized studies have now shown no benefit or increased adverse events
    associated with remdesivir treatment. Drug development is a time-intensive process
    and requires extensive safety and efficacy evaluations. In contrast, drug repurposing
    is a time-saving and cost-effective drug discovery strategy geared towards using
    existing drugs instead of de novo drug discovery. Treatments for cancer and COVID-19
    often have similar goals of controlling inflammation, inhibiting cell division,
    and modulating the host microenvironment to control the disease. In this review,
    we focus on anti-cancer drugs that can potentially be repurposed for COVID-19
    and are currently being tested in clinical trials.
'33382976':
  featured: false
  tags:
  - Single-Cell
  - breast cancer
  - cancer
  links:
    pdf: https://github.com/ncborcherding/borcherding/blob/master/content/publication/gu2020ap/gu2020ap.pdf
  highlight: Mammary gland ductal morphogenesis depends on the differentiation of
    mammary stem cells (MaSCs) into basal and luminal lineages.
  abstract: Mammary gland ductal morphogenesis depends on the differentiation of mammary
    stem cells (MaSCs) into basal and luminal lineages. The AP-2γ transcription factor,
    encoded by Tfap2c, has a central role in mammary gland development but its effect
    in mammary lineages and specifically MaSCs is largely unknown. Here, we utilized
    an inducible, conditional knockout of Tfap2c to elucidate the role of AP-2γ in
    maintenance and differentiation of MaSCs. Loss of AP-2γ in the basal epithelium
    profoundly altered the transcriptomes and decreased the number of cells within
    several clusters of mammary epithelial cells, including adult MaSCs and luminal
    progenitors. AP-2γ regulated the expression of genes known to be required for
    mammary development, including Cebpb, Nfkbia, and Rspo1. As a result, AP-2γ-deficient
    mice exhibited repressed mammary gland ductal outgrowth and inhibition of regenerative
    capacity. The findings demonstrate that AP-2γ can regulate development of mammary
    gland structures potentially regulating maintenance and differentiation of multipotent
    MaSCs.
'33452311':
  featured: false
  tags:
  - cancer
  - Immunotherapy
  links:
    pdf: https://github.com/ncborcherding/borcherding/blob/master/content/publication/cheng2021anti/cheng2021anti.pdf
  highlight: The Toll-like receptor 8 (TLR8) agonist VTX-2337 (motolimod) is an anti-cancer
    immunotherapeutic agent that is believed to augment natural killer (NK) and dendritic
    cell (DC) activity.
  abstract: The Toll-like receptor 8 (TLR8) agonist VTX-2337 (motolimod) is an anti-cancer
    immunotherapeutic agent that is believed to augment natural killer (NK) and dendritic
    cell (DC) activity. The goal of this work is to examine the role of TLR8 expression/activity
    in head and neck squamous cell carcinoma (HNSCC) to facilitate the prediction
    of responders to VTX-2337-based therapy. The prognostic role of TLR8 expression
    in HNSCC patients was assessed by TCGA and tissue microarray analyses. The anti-tumor
    effect of VTX-2337 was determined in SCCVII/C3H, mEERL/C57Bl/6 and TUBO-human
    EGFR/BALB/c syngeneic mouse models. The effect of combined VTX-2337 and cetuximab
    treatment on tumor growth, survival and immune cell recruitment was assessed.
    TLR8 expression was associated with CD8+ T cell infiltration and favorable survival
    outcomes. VTX-2337 delayed tumor growth in all 3 syngeneic mouse models and significantly
    increased the survival of cetuximab-treated mice. The anti-tumor effects of VTX-2337+
    cetuximab were accompanied by increased splenic lymphoid DCs and IFNγ+ CD4+ and
    tumor-specific CD8+ T cells. Depletion of CD4+ T cells, CD8+ T cells and NK cells
    were all able to abolish the anti-tumor effect of VTX-2337+ cetuximab. Altogether,
    VTX-2337 remains promising as an adjuvant for cetuximab-based therapy however
    patients with high TLR8 expression may be more likely to derive benefit from this
    drug combination compared to patients with low TLR8 expression.
'33504936':
  featured: true
  tags:
  - cancer
  - Microenvironment
  - Single-Cell
  - TCR
  - Software
  links:
    code: https://github.com/ncborcherding/ccRCC
    pdf: https://github.com/ncborcherding/borcherding/blob/master/content/publication/borcherding2021mapping/borcherding2021mapping.pdf
  highlight: Clear cell renal cell carcinoma (ccRCC) is one of the most immunologically
    distinct tumor types due to high response rate to immunotherapies, despite low
    tumor mutational burden.
  abstract: Clear cell renal cell carcinoma (ccRCC) is one of the most immunologically
    distinct tumor types due to high response rate to immunotherapies, despite low
    tumor mutational burden. To characterize the tumor immune microenvironment of
    ccRCC, we applied single-cell-RNA sequencing (SCRS) along with T-cell-receptor
    (TCR) sequencing to map the transcriptomic heterogeneity of 25,688 individual
    CD45+ lymphoid and myeloid cells in matched tumor and blood from three patients
    with ccRCC. We also included 11,367 immune cells from four other individuals derived
    from the kidney and peripheral blood to facilitate the identification and assessment
    of ccRCC-specific differences. There is an overall increase in CD8+ T-cell and
    macrophage populations in tumor-infiltrated immune cells compared to normal renal
    tissue. We further demonstrate the divergent cell transcriptional states for tumor-infiltrating
    CD8+ T cells and identify a MKI67 + proliferative subpopulation being a potential
    culprit for the progression of ccRCC. Using the SCRS gene expression, we found
    preferential prediction of clinical outcomes and pathological diseases by subcluster
    assignment. With further characterization and functional validation, our findings
    may reveal certain subpopulations of immune cells amenable to therapeutic intervention.
'33523451':
  featured: false
  tags:
  - Treg
  - Immune Response
  links:
    pdf: https://github.com/ncborcherding/borcherding/blob/master/content/publication/kolb2021understanding/kolb2021understanding.pdf
  highlight: Regulatory T cells (Tregs) are critical in maintaining immune homeostasis
    under various pathophysiological conditions.
  abstract: Regulatory T cells (Tregs) are critical in maintaining immune homeostasis
    under various pathophysiological conditions. A growing body of evidence demonstrates
    that Tregs play an important role in cancer progression and that they do so by
    suppressing cancer-directed immune responses. Tregs have been targeted for destruction
    by exploiting antibodies against and small-molecule inhibitors of several molecules
    that are highly expressed in Tregs-including immune checkpoint molecules, chemokine
    receptors, and metabolites. To date, these strategies have had only limited antitumor
    efficacy, yet they have also created significant risk of autoimmunity because
    most of them do not differentiate Tregs in tumors from those in normal tissues.
    Currently, immune checkpoint inhibitor (ICI)-based cancer immunotherapies have
    revolutionized cancer treatment, but the resistance to ICI is common and the elevation
    of Tregs is one of the most important mechanisms. Therapeutic strategies that
    can selectively eliminate Tregs in the tumor (i.e. therapies that do not run the
    risk of causing autoimmunity by affecting normal tissue), are urgently needed
    for the development of cancer immunotherapies. This chapter discusses specific
    properties of human Tregs under the context of cancer and the various ways to
    target Treg for cancer immunotherapy.
'33627663':
  featured: false
  tags:
  - cancer
